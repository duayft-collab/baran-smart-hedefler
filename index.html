<style>
:root {
  --bg:#0c0d12; --surface:#13141c; --surface2:#1a1c27; --border:#242636;
  --text:#e8eaf2; --muted:#6b6f8a;
  --brand:#7c6eff; --brand-dim:rgba(124,110,255,0.13); --brand-glow:rgba(124,110,255,0.35);
  --green:#34d399; --amber:#fbbf24; --red:#f87171; --pink:#f472b6;
  --orange:#fb923c;
}
.light {
  --bg:#f1f2f8; --surface:#ffffff; --surface2:#eaebf5; --border:#dde0f0;
  --text:#1a1c2e; --muted:#8083a3;
  --brand:#5b4fd8; --brand-dim:rgba(91,79,216,0.09); --brand-glow:rgba(91,79,216,0.28);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:236px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;gap:2px;flex-shrink:0;overflow-y:auto;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}
.content-inner{max-width:1100px;margin:0 auto;}

.logo{display:flex;align-items:center;gap:10px;padding:6px 8px 18px;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--text);}
.logo-icon{width:34px;height:34px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;}

.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;cursor:pointer;transition:all .15s;font-size:13.5px;font-weight:500;color:var(--muted);border:none;background:none;width:100%;text-align:left;position:relative;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--brand-dim);color:var(--brand);font-weight:600;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);position:absolute;top:9px;right:10px;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.nav-sep{height:1px;background:var(--border);margin:7px 4px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;transition:border-color .2s;}
.card:hover{border-color:rgba(124,110,255,0.35);}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;}
.btn-primary{background:var(--brand);color:white;}
.btn-primary:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 18px var(--brand-glow);}
.btn-ghost{background:var(--surface2);color:var(--muted);}
.btn-ghost:hover{color:var(--text);background:var(--border);}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;border-radius:9px;}
.btn-success{background:rgba(52,211,153,0.12);color:var(--green);}
.btn-orange{background:rgba(251,146,60,0.12);color:var(--orange);}

.inp{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px 14px;font-size:13.5px;color:var(--text);font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border .15s;}
.inp:focus{border-color:var(--brand);}
.inp::placeholder{color:var(--muted);}
textarea.inp{resize:none;}
select.inp{cursor:pointer;}

.xp-bar{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--pink));border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1);}

.prog{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .8s ease;}

.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.tag-brand{background:var(--brand-dim);color:var(--brand);}
.tag-green{background:rgba(52,211,153,.1);color:var(--green);}
.tag-amber{background:rgba(251,191,36,.1);color:var(--amber);}
.tag-red{background:rgba(248,113,113,.1);color:var(--red);}
.tag-muted{background:var(--surface2);color:var(--muted);}
.tag-orange{background:rgba(251,146,60,.1);color:var(--orange);}
.tag-pink{background:rgba(244,114,182,.1);color:var(--pink);}

.cb{appearance:none;width:17px;height:17px;border-radius:5px;border:2px solid var(--border);cursor:pointer;transition:all .15s;position:relative;flex-shrink:0;background:var(--surface2);}
.cb:checked{background:var(--brand);border-color:var(--brand);}
.cb:checked::after{content:'v';position:absolute;color:white;font-size:10px;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:900;font-style:normal;}

.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fin .18s ease;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:22px;width:100%;max-width:500px;overflow:hidden;animation:sup .22s cubic-bezier(.4,0,.2,1);}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:11px;max-height:70vh;overflow-y:auto;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:9px;}

@keyframes fin{from{opacity:0;}to{opacity:1;}}
@keyframes sup{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fin .25s ease;}
.slide-up{animation:sup .25s ease;}

.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{padding:11px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);border-bottom:1px solid var(--border);}
.tbl td{padding:13px 14px;border-bottom:1px solid var(--border);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}

.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.st{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.3px;}

.rit{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;border:1px solid var(--border);background:var(--surface);transition:all .15s;cursor:pointer;}
.rit:hover{border-color:var(--brand);}
.rit.done{opacity:.35;filter:grayscale(.4);pointer-events:none;}

.step{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);transition:border .15s;}
.step:hover{border-color:var(--brand);}

.log-item{display:flex;gap:13px;padding:11px 0;border-bottom:1px solid var(--border);}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:4px;}
.ldot.xp{box-shadow:0 0 7px var(--brand-glow);}

.snd{display:flex;align-items:center;gap:13px;padding:15px 18px;border-radius:15px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;text-align:left;width:100%;}
.snd:hover{border-color:var(--brand);}
.snd.playing{background:var(--brand);border-color:var(--brand);color:white;}

.ring-svg{position:absolute;inset:0;width:100%;height:100%;}
.ring-bg{stroke:var(--surface2);}
.ring-prog{stroke:var(--brand);stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear;}
.ring-break{stroke:var(--green);}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:10px;color:var(--muted);font-size:13px;}
.frog-card{background:linear-gradient(135deg,#064e3b,#065f46)!important;border-color:#065f46!important;}
.scratch{background:rgba(251,191,36,.06)!important;border-color:rgba(251,191,36,.2)!important;}

.diff-easy{background:rgba(52,211,153,.12);color:var(--green);}
.diff-medium{background:rgba(251,191,36,.12);color:var(--amber);}
.diff-hard{background:rgba(251,146,60,.12);color:var(--orange);}
.diff-extreme{background:rgba(248,113,113,.12);color:var(--red);}

.ndot{position:absolute;top:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:var(--brand);border:2px solid var(--surface);}

@media print{
  @page{size:A4;margin:0;}
  .no-print{display:none!important;}
  .print-area{display:flex!important;}
}
.print-area{display:none;position:fixed;inset:0;background:white;z-index:9999;align-items:center;justify-content:center;padding:40mm;text-align:center;}

input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:99px;background:var(--surface2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--brand);cursor:pointer;}

@media(max-width:768px){
  .sidebar{display:none;}
  .mobile-nav{display:flex!important;}
  .content{padding:14px;}
}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 8px 14px;z-index:40;gap:2px;}

  isoWeek: function(d) {
    var dt = new Date(d.getTime());
    dt.setHours(0,0,0,0);
    dt.setDate(dt.getDate() + 3 - (dt.getDay()+6)%7);
    var w1 = new Date(dt.getFullYear(),0,4);
    return 1 + Math.round(((dt - w1) / 86400000 - 3 + (w1.getDay()+6)%7) / 7);

  quarter: function(d) { return "Q" + (Math.floor((d.getMonth()+3)/3)); },
  isActive: function(period, lastDone) {

    var last = new Date(lastDone), now = new Date();
    if (period === 'daily') return last.toDateString() !== now.toDateString();
    if (period === 'weekly') return (now - last) > (7 * 864e5);
    if (period === 'monthly') return last.getMonth() !== now.getMonth() || last.getFullYear() !== now.getFullYear();

  },

  fmtTime: function(s) {

    localStorage.setItem('focusup_theme', isDark ? 'dark' : 'light');
  }, [isDark]);

  useEffect(function() {
    var t = setInterval(function() { setNow(new Date()); }, 1000);
    return function() { clearInterval(t); };
  }, []);

  useEffect(function() {
    var t = setTimeout(function() { localStorage.setItem('focusup_v2', JSON.stringify(data)); }, 800);
    return function() { clearTimeout(t); };
  }, [data]);

  useEffect(function() { localStorage.setItem('focusup_scratch', scratch); }, [scratch]);

  useEffect(function() {
    var t;
    if (timerOn && timeLeft > 0) {
      t = setInterval(function() { setTimeLeft(function(p) { return p - 1; }); }, 1000);
    } else if (timerOn && timeLeft === 0) {
      setTimerOn(false);
      if (timerMode === 'focus') {
        gainXP(50, 'Pomodoro tamamlandi');
        setData(function(p) { return Object.assign({}, p, {stats: Object.assign({}, p.stats, {totalFocusMinutes: (p.stats.totalFocusMinutes || 0) + 25})}); });
      }
      try { new Audio(SOUNDS[4].url).play(); } catch(e) {}
    }
    return function() { clearInterval(t); };
  }, [timerOn, timeLeft]);

  function gainXP(amount, reason) {
    setData(function(p) {
      var xp = (p.stats ? p.stats.xp || 0 : 0) + amount;
      var level = Math.floor(xp / 500) + 1;
      var newLog = {time: U.localStr(), action: '+' + amount + ' XP: ' + reason};
      return Object.assign({}, p, {
        stats: Object.assign({}, p.stats, {xp: xp, level: level}),
        logs: [newLog].concat((p.logs || []).slice(0, 99))
      });
    });
  }

  var upd = useCallback(function(next, msg) {
    msg = msg || 'Degisiklik';
    setHist(function(h) { return [JSON.stringify(data)].concat(h).slice(0, 50); });
    var log = {time: U.localStr(), action: msg};
    setData(Object.assign({}, next, {logs: [log].concat((next.logs || [])).slice(0, 100)}));
  }, [data]);

  function undo() {
    if (!hist.length) return;
    setData(JSON.parse(hist[0]));
    setHist(function(h) { return h.slice(1); });
  }

  function fil(list, keys) {
    if (!q || !list) return list || [];
    var lq = q.toLowerCase();
    return list.filter(function(i) {
      return keys.some(function(k) { return i[k] && String(i[k]).toLowerCase().indexOf(lq) >= 0; });
    });
  }

  function del(item, type) {
    if (!confirm('Bu ogeyi silmek istiyor musun?')) return;
    var km = {goal:'goals',todo:'todos',book:'books',quote:'quotes',journal:'journal',principle:'principles',coaching:'coaching',question:'questions',vault:'vault',challenge:'challenges'};
    var key = km[type];
    var next = Object.assign({}, data);
    next[key] = (data[key] || []).filter(function(i) { return i.id !== item.id; });
    next.trash = [{item: item, itemType: type, deletedAt: U.localStr()}].concat(data.trash || []);
    upd(next, 'Silindi');
  }

  function submitModal(vals) {
    var type = modal.type;
    if (type === 'routine') {
      var period = vals.period || 'daily';
      var nr = {id: Date.now(), text: vals.text, lastDone: null};
      var newRoutines = Object.assign({}, data.routines);
      newRoutines[period] = (newRoutines[period] || []).concat([nr]);
      upd(Object.assign({}, data, {routines: newRoutines}), 'Yeni rutin');
      gainXP(10, 'Rutin eklendi');
      setModal({open:false});
      return;
    }
    var km = {goal:'goals',todo:'todos',book:'books',quote:'quotes',journal:'journal',principle:'principles',coaching:'coaching',question:'questions',vault:'vault'};
    var item = Object.assign({id: Date.now()}, vals);
    if (type === 'goal') { item.isFrog = !!vals.isFrog; item.steps = []; }
    if (type === 'todo') item.completed = false;
    if (type === 'book') item.status = 'Sirada';
    if (type === 'journal') item.date = U.dateStr();
    var next2 = Object.assign({}, data);
    next2[km[type]] = [item].concat(data[km[type]] || []);
    upd(next2, 'Yeni oge eklendi');
    gainXP(20, 'Yeni ' + type);
    setModal({open:false});
  }

  function startChallenge(tpl, customName, customDesc) {
    var now2 = new Date();
    var end = new Date(now2); end.setDate(end.getDate() + 90);
    var ch = {
      id: Date.now(),
      templateId: tpl.id,
      name: customName || tpl.name,
      desc: customDesc || tpl.desc,
      icon: tpl.icon, cat: tpl.cat, diff: tpl.diff,
      xpReward: tpl.xpReward,
      startDate: U.dateStr(now2),
      endDate: U.dateStr(end),
      checkins: [], status: 'active',
      quarter: U.quarter(now2)
    };
    upd(Object.assign({}, data, {challenges: [ch].concat(data.challenges || [])}), 'Yeni 90-gun mucadelesi');
    gainXP(50, 'Mucadele basladi');
  }

  function checkinChallenge(chId) {
    var today = U.dateStr();
    var chs = (data.challenges || []).map(function(c) {
      if (c.id !== chId) return c;
      if (c.checkins && c.checkins.indexOf(today) >= 0) return c;
      return Object.assign({}, c, {checkins: (c.checkins || []).concat([today])});
    });
    upd(Object.assign({}, data, {challenges: chs}), 'Mucadele check-in');
    gainXP(15, 'Gunluk mucadele check-in');
  }

  function completeChallenge(chId) {
    var ch = (data.challenges || []).find(function(c) { return c.id === chId; });
    if (!ch) return;
    var chs = (data.challenges || []).map(function(c) { return c.id === chId ? Object.assign({}, c, {status:'completed'}) : c; });
    upd(Object.assign({}, data, {challenges: chs}), 'Mucadele tamamlandi');
    gainXP(ch.xpReward || 300, 'Mucadele tamamlandi: ' + ch.name);
  }

              );
              if (f.type === 'select') return (
                <select key={f.name} className="inp" value={vals[f.name]||f.options[0]} onChange={function(e){var v={};v[f.name]=e.target.value;setVals(function(p){return Object.assign({},p,v);});}}>
                  {f.options.map(function(o){return <option key={o}>{o}</option>;})}
                </select>
              );
              if (f.type === 'textarea') return (
                <textarea key={f.name} className="inp" placeholder={f.placeholder} value={vals[f.name]||''} onChange={function(e){var v={};v[f.name]=e.target.value;setVals(function(p){return Object.assign({},p,v);});}} style={{height:90}}/>
              );
              return <input key={f.name} className="inp" type={f.type||'text'} placeholder={f.placeholder} value={vals[f.name]||''} onChange={function(e){var v={};v[f.name]=e.target.value;setVals(function(p){return Object.assign({},p,v);}); }}/>;
            })}
          </div>
          <div className="modal-foot">
            <button className="btn btn-ghost" style={{flex:1}} onClick={function(){setModal({open:false});}}>Iptal</button>
            <button className="btn btn-primary" style={{flex:2}} onClick={function(){
              var req = fields.filter(function(f){return f.required;});
              if (!req.every(function(f){return vals[f.name]&&String(vals[f.name]).trim();})) { alert('Zorunlu alanlari doldurun.'); return; }
              submitModal(vals);
            }}>Kaydet</button>
          </div>
        </div>
      </div>
    );
  }

  function PrintModal() {
    return (
      <div className="modal-bg no-print" onClick={function(e){if(e.target===e.currentTarget)setPrint({item:null});}}>
        <div className="modal-box" style={{maxWidth:560}}>
          <div className="modal-head">
            <h3 style={{fontFamily:'Syne',fontWeight:800,fontSize:15}}>Poster Baskisi</h3>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" style={{fontSize:12}} onClick={function(){window.print();}}><IK name="printer" size={13}/>Yazdir</button>
              <button className="btn btn-ghost btn-icon" onClick={function(){setPrint({item:null});}}><IK name="x" size={15}/></button>
            </div>
          </div>
          <div style={{padding:20}}>
            <div style={{border:'2px solid var(--border)',borderRadius:14,aspectRatio:'1/1.414',display:'flex',alignItems:'center',justifyContent:'center',padding:36,textAlign:'center',background:'white',color:'#1a1c2e'}}>
              <div>
                <p style={{fontFamily:'Georgia,serif',fontStyle:'italic',fontSize:20,lineHeight:1.6,marginBottom:14}}>"{print.item && (print.item.text||print.item.content)}"</p>
                {print.item && print.item.author && <p style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.14em',color:'#6366f1'}}>&mdash; {print.item.author}</p>}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function renderContent() {
    if (tab === 'dashboard') return <DashView/>;
    if (tab === 'challenges') return <ChallengesView/>;
    if (tab === 'tools') return <ToolsView/>;
    if (tab === 'vault') return <VaultView/>;
    if (tab === 'goals') return <GoalsView/>;
    if (tab === 'todos') return <TodosView/>;
    if (tab === 'books') return <BooksView/>;
    if (tab === 'routines') return <RoutinesView/>;
    if (tab === 'history') return <HistoryView/>;
    var gm = {
      quotes:    {list:data.quotes,    keys:['text','author'],    type:'quote'},
      journal:   {list:data.journal,   keys:['content','category'],type:'journal'},
      principles:{list:data.principles,keys:['content','type'],   type:'principle'},
      coaching:  {list:data.coaching,  keys:['title','content'],  type:'coaching'},
      questions: {list:data.questions, keys:['text'],             type:'question'},
    };
    var cfg = gm[tab];
    if (cfg) return <GenericList list={cfg.list} keys={cfg.keys} type={cfg.type}/>;
    return null;
  }

  return (
    <div className="app">
      <aside className="sidebar no-print">
        <div className="logo">
          <div className="logo-icon"><IK name="zap" size={16} color="white"/></div>
          FocusUp
        </div>
        <nav style={{flex:1,display:'flex',flexDirection:'column',gap:1}}>
          {NAV.map(function(n) { return (
            <button key={n.id} className={"nav-item"+(tab===n.id?' active':'')} onClick={function(){setTab(n.id);}}>
              <IK name={n.icon} size={15}/>
              {n.label}
              {n.badge && tab !== n.id && <span className="nav-dot"></span>}
            </button>
          ); })}
        </nav>
        <div className="nav-sep"/>
        <div style={{display:'flex',flexDirection:'column',gap:1}}>
          <button className={"nav-item"+(tab==='history'?' active':'')} onClick={function(){setTab('history');}}><IK name="activity" size={15}/>Gecmis &amp; XP</button>
          <button className="nav-item" onClick={undo} disabled={hist.length===0} style={{opacity:hist.length===0?0.4:1}}><IK name="undo" size={15}/>Geri Al {hist.length > 0 ? '('+hist.length+')' : ''}</button>
          <button className="nav-item" onClick={function(){U.downloadJSON(data,'FocusUp_Backup.json');}}><IK name="download" size={15}/>Yedekle</button>
        </div>
        <div style={{fontSize:9,color:'var(--muted)',textAlign:'center',paddingTop:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em'}}>{APP_VERSION}</div>
      </aside>

      <div className="main">
        <header className="topbar no-print">
          <div style={{display:'flex',flexDirection:'column',gap:2}}>
            <div style={{display:'flex',gap:6}}>
              <span className="tag tag-brand">{U.quarter(now)} Ceyrek</span>
              <span className="tag tag-muted">Hafta {U.isoWeek(now)}</span>
            </div>
            <div style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>
              {now.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})} &bull; {now.toLocaleTimeString('tr-TR')}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{position:'relative'}}>
              <IK name="search" size={13} color="var(--muted)" extraStyle={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)'}}/>
              <input className="inp" type="text" placeholder="Ara..." value={q} onChange={function(e){setQ(e.target.value);}} style={{paddingLeft:32,width:180,height:34,fontSize:12}}/>
            </div>
            <button className="btn btn-ghost btn-icon" onClick={function(){setIsDark(function(p){return !p;});}}><IK name={isDark?'sun':'moon'} size={15}/></button>
            <button className="btn btn-ghost" style={{position:'relative'}} onClick={function(){setTab('history');}}>
              <IK name="activity" size={15}/>
              {data.logs && data.logs.length > 0 && <span className="ndot"></span>}
            </button>
          </div>
        </header>
        <main className="content no-print">
          <div className="content-inner">{renderContent()}</div>
        </main>
        <nav className="mobile-nav">
          {['dashboard','challenges','goals','todos','routines'].map(function(id) {
            var n = NAV.find(function(x){return x.id===id;});
            if (!n) return null;
            return (
              <button key={id} onClick={function(){setTab(id);}} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'5px 3px',background:'none',border:'none',cursor:'pointer',color:tab===id?'var(--brand)':'var(--muted)',borderRadius:10}}>
                <IK name={n.icon} size={19} color={tab===id?'var(--brand)':'var(--muted)'}/>
                <span style={{fontSize:8,fontWeight:700,textTransform:'uppercase'}}>{n.label.split(' ')[0]}</span>
              </button>
            );
          })}
        </nav>
      </div>

      {modal.open && <ModalComp/>}
      {print.item && <PrintModal/>}

      {print.item && (
        <div className="print-area">
          <div style={{fontFamily:'Georgia,serif',fontStyle:'italic',textAlign:'center',color:'#1a1c2e'}}>
            <h1 style={{fontSize:'40pt',marginBottom:22,lineHeight:1.3}}>"{print.item.text||print.item.content}"</h1>
            {print.item.author && <p style={{fontSize:'18pt',color:'#6366f1',letterSpacing:'.18em',textTransform:'uppercase',fontWeight:700}}>&mdash; {print.item.author}</p>}
          </div>
        </div>
      )}
    </div>
  );
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
