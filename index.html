:root{
  --bg:#f5f5f7;--s:#fff;--s2:#f0f0f2;--s3:#e5e5ea;
  --t:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --blue:#0071e3;--bl:rgba(0,113,227,.1);
  --green:#34c759;--gl:rgba(52,199,89,.1);
  --orange:#ff9500;--ol:rgba(255,149,0,.11);
  --red:#ff3b30;--rl:rgba(255,59,48,.1);
  --purple:#af52de;--pl:rgba(175,82,222,.1);
  --yellow:#ffcc00;--yl:rgba(255,204,0,.13);
  --teal:#30b0c7;--tl:rgba(48,176,199,.12);
  --sw:220px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
}
.dark{
  --bg:#000;--s:#1c1c1e;--s2:#2c2c2e;--s3:#3a3a3c;
  --t:#f5f5f7;--t2:#98989d;--t3:#636366;
  --blue:#0a84ff;--green:#30d158;--orange:#ff9f0a;
  --red:#ff453a;--purple:#bf5af2;--yellow:#ffd60a;--teal:#5ac8fa;
  --bl:rgba(10,132,255,.15);--gl:rgba(48,209,88,.12);
  --ol:rgba(255,159,10,.13);--rl:rgba(255,69,58,.12);
  --pl:rgba(191,90,242,.13);--yl:rgba(255,214,10,.13);--tl:rgba(90,200,250,.12);
  --sh:0 2px 8px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px;line-height:1.5}
#shell{display:flex;min-height:100vh}
aside{width:var(--sw);background:var(--s);border-right:1px solid var(--s3);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;padding:0 0 12px}
#main{flex:1;overflow-y:auto;padding:20px 24px;max-width:960px}
.logo{padding:14px 16px 8px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--s3);margin-bottom:6px}
.logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#0071e3,#af52de);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-size:14px;font-weight:800;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--t3);font-weight:500}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.top-bar .q-pill{background:var(--s);border:1px solid var(--s3);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--t2)}
#srch{flex:1;min-width:160px;height:34px;border:1.5px solid var(--s3);border-radius:99px;padding:0 14px;background:var(--s);color:var(--t);font-size:13px;outline:none}
#srch:focus{border-color:var(--blue)}
.nsec{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 3px}
.nb{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:9px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:12.5px;font-weight:500;width:100%;text-align:left;transition:all .12s}
.nb:hover{background:var(--s2);color:var(--t)}
.nb.on{background:var(--bl);color:var(--blue);font-weight:700}
.ni{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.div{height:1px;background:var(--s3);margin:6px 10px}
.card{background:var(--s);border-radius:14px;box-shadow:var(--sh);padding:18px}
.card.cp{padding:16px 18px}
.sh{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.sh-t{font-size:22px;font-weight:800;letter-spacing:-.5px}
.sh-sub{font-size:12.5px;color:var(--t2);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;border:none;cursor:pointer;font-size:12.5px;font-weight:600;transition:all .12s;white-space:nowrap}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{opacity:.88}
.btn-s{background:var(--s2);color:var(--t)}.btn-s:hover{background:var(--s3)}
.btn-g{background:transparent;color:var(--t2);border:1.5px solid var(--s3)}.btn-g:hover{background:var(--s2)}
.btn-sm{padding:5px 10px;font-size:11.5px;border-radius:8px}
.btn-ic{padding:5px;border-radius:8px}
.p-blue{background:var(--bl);color:var(--blue)}
.p-green{background:var(--gl);color:var(--green)}
.p-orange{background:var(--ol);color:var(--orange)}
.p-red{background:var(--rl);color:var(--red)}
.p-purple{background:var(--pl);color:var(--purple)}
.p-teal{background:var(--tl);color:var(--teal)}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.inp{width:100%;padding:9px 12px;border:1.5px solid var(--s3);border-radius:10px;background:var(--s);color:var(--t);font-size:13px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--blue)}
textarea.inp{resize:vertical;min-height:72px}
select.inp{cursor:pointer}
.cb{accent-color:var(--blue);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.lbl{font-size:11.5px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.bar{height:6px;background:var(--s2);border-radius:99px;overflow:hidden}
.barf{height:100%;border-radius:99px;transition:width .4s}
.kn{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.empty{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 24px;text-align:center;color:var(--t3)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.mbox{background:var(--s);border-radius:18px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--s3)}
.mb{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.mf{padding:12px 20px;border-top:1px solid var(--s3);display:flex;gap:8px}
#dw-ov{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:2000;color:#fff}
#dw-ov.show{display:flex}
.scratch{background:var(--yl);border-radius:14px;padding:14px 16px}
.fade{animation:fd .2s ease}
@keyframes fd{from{opacity:.5;transform:translateY(4px)}to{opacity:1;transform:none}}
.lang-btn{display:flex;gap:3px;padding:3px;background:var(--s2);border-radius:8px;margin:8px 14px}
.lang-opt{flex:1;padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:var(--t3);transition:all .15s}
.lang-opt.active{background:var(--s);color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}
@media(max-width:680px){
  #shell{flex-direction:column}
  aside{width:100%;height:auto;position:relative;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--s3)}
  #main{padding:14px}
  .g4,.g5,.g6{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:1fr 1fr}
}
@media print{aside{display:none}#main{padding:0}}
</style>
</head>

    </div>
    <div class="lang-btn">

    <div id="pinner"></div>
  </main>
</div>
<div id="modal-root"></div>

    <button id="dw-btn" class="btn btn-p" style="padding:12px 28px;font-size:15px" onclick="dwToggle()">Başlat</button>

</div>

  isoWeek:function(d){var dt=new Date(d.getTime());dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);var w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7);},

  fmt:function(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');},

  ts:function(){return new Date().toLocaleString(LANG==='tr'?'tr-TR':'en-US');},
  isActive:function(p,last){
    if(!last)return true;
    var l=new Date(last),n=new Date();
    if(p==='daily')return l.toDateString()!==n.toDateString();
    if(p==='weekly')return (n-l)>7*864e5;
    if(p==='monthly')return l.getMonth()!==n.getMonth()||l.getFullYear()!==n.getFullYear();
    if(p==='quarterly')return U.quarter(l)!==U.quarter(n)||l.getFullYear()!==n.getFullYear();
    if(p==='yearly')return l.getFullYear()!==n.getFullYear();

  },

function calcStreak(checkins){
  if(!checkins||!checkins.length)return 0;
  var streak=0,d=new Date();
  for(var i=0;i<90;i++){
    var ds=d.toISOString().split('T')[0];
    if(checkins.indexOf(ds)>=0){streak++;d.setDate(d.getDate()-1);}
    else if(i===0){d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

function rndQuote(cat){
  var pool=cat?D.quotes.filter(function(q){return q.cat===cat;}):D.quotes;

  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}

function submitForm(type){
  var defs=FDEFS[type]||[],vals={},ok=true;
  for(var i=0;i<defs.length;i++){
    var p=defs[i].split(':'),n=p[0],tp=p[2],req=p[3]==='1';
    var el=ge('f_'+n);if(!el)continue;
    vals[n]=tp==='cb'?el.checked:el.value;
    if(req&&!vals[n])ok=false;
  }
  if(!ok){alert(t('required'));return;}
  snap();var id=Date.now();
  if(type==='routine'){var per=vals.period||'daily';D.routines[per]=(D.routines[per]||[]).concat([{id:id,t:vals.t,last:null}]);log('Rutin eklendi');xp(10,'Rutin');closeModal();renderPage();return;}
  if(type==='sop'){D.sops=[{id:id,title:vals.title,steps:[]}].concat(D.sops||[]);log('SOP eklendi');closeModal();renderPage();return;}
  if(type==='gtd'){D.gtdInbox=[{id:id,text:vals.text,status:'inbox',addedAt:U.today()}].concat(D.gtdInbox||[]);log('GTD eklendi');closeModal();renderPage();return;}
  var km={goal:'goals',todo:'todos',kpi:'kpis',habit:'habits',quote:'quotes',journal:'journal',principle:'principles',coaching:'coaching',vault:'vault',question:'questions'};
  var item=Object.assign({id:id},vals);
  if(type==='goal'){item.frog=false;item.steps=[];item.notes='';item.status='active';item.createdAt=U.today();}
  if(type==='todo')item.done=false;
  if(type==='kpi'){item.target=parseFloat(vals.target)||0;item.current=parseFloat(vals.current)||0;item.hist=[parseFloat(vals.current)||0];}
  if(type==='journal')item.date=U.today();
  if(km[type])D[km[type]]=[item].concat(D[km[type]]||[]);
  log(type+' eklendi');xp(20,'Yeni '+type);closeModal();renderPage();
}

function startTm(){
  if(tmInt)clearInterval(tmInt);tmOn=true;
  tmInt=setInterval(function(){
    tmLeft--;
    if(tmLeft<=0){tmLeft=0;tmOn=false;clearInterval(tmInt);tmInt=null;
      if(tmMode==='focus'){xp(50,'Pomodoro');D.stats.totalFocus=(D.stats.totalFocus||0)+25;save();}}
    renderTm();
  },1000);
}
function stopTm(){tmOn=false;if(tmInt){clearInterval(tmInt);tmInt=null;}renderTm();}
function resetTm(){stopTm();tmLeft=TDUR[tmMode];renderTm();}
function setTmMode(m){tmMode=m;tmLeft=TDUR[m];stopTm();}
window.setTmMode=setTmMode;

function renderTm(){
  var el=ge('timer-block');if(!el)return;
  var C=2*Math.PI*50,p=tmLeft/TDUR[tmMode],off=C*(1-p);
  var sc=tmMode==='focus'?'var(--blue)':'var(--green)';
  var modeLabels={focus:t('pomodoroFocus'),short:t('pomodoroShort'),long:t('pomodoroLong')};
  var h='<div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px">';
  h+='<div style="display:flex;gap:4px">';
  ['focus','short','long'].forEach(function(m){
    var a=tmMode===m;
    h+='<button class="btn btn-sm" style="background:'+(a?'var(--blue)':'var(--s2)')+';color:'+(a?'#fff':'var(--t2)')+'" data-m="'+m+'" onclick="setTmMode(this.dataset.m);renderTm()">'+modeLabels[m]+'</button>';
  });
  h+='</div>';
  h+='<div style="position:relative;width:110px;height:110px">';
  h+='<svg viewBox="0 0 108 108" style="position:absolute;inset:0;width:100%;height:100%">';
  h+='<circle cx="54" cy="54" r="50" fill="none" stroke="var(--s2)" stroke-width="5"/>';
  h+='<circle cx="54" cy="54" r="50" fill="none" stroke="'+sc+'" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'" style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear"/>';
  h+='</svg>';
  h+='<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">';
  h+='<span style="font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1">'+U.fmt(tmLeft)+'</span>';
  h+='<span style="font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">'+modeLabels[tmMode]+'</span>';
  h+='</div></div>';
  h+='<div style="display:flex;gap:7px">';
  if(tmOn){h+='<button class="btn btn-p" onclick="stopTm()">'+ic('pause',12)+' '+t('stop')+'</button>';}
  else{h+='<button class="btn btn-p" onclick="startTm()">'+ic('play',12)+' '+t('start')+'</button>';}
  h+='<button class="btn btn-s btn-ic" onclick="resetTm()">'+ic('rst',13)+'</button>';
  h+='</div></div>';
  el.innerHTML=h;
}

function enterDW(mins){
  var inp=ge('dw-task-inp');var task=inp?inp.value:'';
  dwLeft=mins*60;dwOn=false;if(dwInt){clearInterval(dwInt);dwInt=null;}
  var te=ge('dw-title'),tme=ge('dw-time'),btne=ge('dw-btn');
  if(te)te.textContent=task||t('dwTitle');
  if(tme)tme.textContent=U.fmt(dwLeft);
  if(btne)btne.textContent=t('start');
  var ov=ge('dw-ov');if(ov)ov.classList.add('show');
}
function dwToggle(){
  if(!dwOn){
    dwOn=true;var btn=ge('dw-btn');if(btn)btn.textContent=t('stop');
    dwInt=setInterval(function(){
      dwLeft--;var tme=ge('dw-time');if(tme)tme.textContent=U.fmt(dwLeft);
      if(dwLeft<=0){dwOn=false;clearInterval(dwInt);dwInt=null;D.deepWorkSessions=(D.deepWorkSessions||0)+1;xp(75,'Deep Work');save();exitDW();alert('Deep Work '+t('done')+'! +75 XP');}
    },1000);
  }else{dwOn=false;clearInterval(dwInt);dwInt=null;var btn2=ge('dw-btn');if(btn2)btn2.textContent=t('start');}
}
function exitDW(){dwOn=false;if(dwInt){clearInterval(dwInt);dwInt=null;}var ov=ge('dw-ov');if(ov)ov.classList.remove('show');}

function checkHabit(id){
  snap();var today=U.today();
  D.habits=D.habits.map(function(h){
    if(h.id!==id)return h;

}
window.checkHabit=checkHabit;

function checkRoutine(period,id){

function delRoutine(period,id){
  snap();if(!D.routines[period])return;
  D.routines[period]=D.routines[period].filter(function(r){return r.id!==id;});

function renderChallenges(){
  var today=U.today();

    h+='<div class="ga">';
    D.challenges.forEach(function(c){
      var elapsed=c.startedAt?Math.floor((new Date(today)-new Date(c.startedAt))/864e5):0;
      var prog=Math.min(100,Math.round(elapsed/90*100));
      var status=elapsed>=90?'done':c.status;
      h+='<div class="card cp">';
      h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">';
      h+='<div><p style="font-weight:700;font-size:14px;margin-bottom:4px">'+U.esc(c.title)+'</p>';

      h+='</div>';
      h+='<div style="text-align:center"><p style="font-size:22px;font-weight:800;line-height:1;color:var(--blue)">'+elapsed+'</p><p style="font-size:10px;color:var(--t3)">/ 90 gün</p></div></div>';
      h+=progBar(prog);
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">';
      h+='<span class="pill '+(status==='done'?'p-green':status==='active'?'p-blue':'p-orange')+'" style="font-size:10px">'+(status==='done'?'&#10003; '+t('done'):status==='active'?'Aktif':'Bekliyor')+'</span>';
      if(status==='active')h+='<button class="btn btn-p btn-sm" data-cid="'+c.id+'" onclick="checkChallenge(+this.dataset.cid)">'+t('today')+' &#10003;</button>';
      else if(status!=='active'&&status!=='done')h+='<button class="btn btn-s btn-sm" data-cid="'+c.id+'" onclick="startChallenge(+this.dataset.cid)">'+t('startChallenge')+'</button>';
      h+='</div></div>';
    });
    h+='</div>';
  }else{h+='<div class="empty">'+ic('trophy',32,'var(--t3)')+'<p>'+t('noData')+'</p></div>';}
  h+='</div>';sh('pinner',h);
}
function openChallengeModal(){
  var h='<div class="mh"><span style="font-weight:700">'+t('newChallenge')+'</span><button class="btn btn-g btn-ic" onclick="closeModal()">'+ic('x',14)+'</button></div>';
  h+='<div class="mb"><p class="lbl" style="margin-bottom:6px">Şablon Seç</p><div style="display:flex;flex-direction:column;gap:8px">';
  CH_TPLS.forEach(function(tpl){
    h+='<div class="card" style="padding:12px 14px;cursor:pointer" data-tid="'+tpl.id+'" onclick="startChallengeFromTpl(this.dataset.tid)">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center"><p style="font-weight:600;font-size:13px">'+U.esc(tpl.title)+'</p><span class="pill p-blue" style="font-size:10px">+'+tpl.xp+' XP</span></div>';
    h+='<p style="font-size:12px;color:var(--t2);margin-top:3px">'+U.esc(tpl.desc)+'</p></div>';
  });
  h+='</div></div>';
  showModal(h);
}
function startChallengeFromTpl(tid){
  var tpl=CH_TPLS.find(function(x){return x.id===tid;});if(!tpl)return;
  snap();D.challenges=[{id:Date.now(),title:tpl.title,cat:tpl.cat,xp:tpl.xp,status:'active',startedAt:U.today(),checkins:[]}].concat(D.challenges||[]);
  xp(10,'Mücadele başlatıldı');save();closeModal();renderPage();
}
function startChallenge(id){snap();D.challenges=(D.challenges||[]).map(function(c){return c.id===id?Object.assign({},c,{status:'active',startedAt:U.today()}):c;});save();renderPage();}
function checkChallenge(id){
  snap();var today=U.today();
  D.challenges=(D.challenges||[]).map(function(c){
    if(c.id!==id)return c;
    var checkins=(c.checkins||[]).slice();
    if(checkins.indexOf(today)<0)checkins.push(today);
    var elapsed=c.startedAt?Math.floor((new Date(today)-new Date(c.startedAt))/864e5):0;
    var status=elapsed>=90?'done':c.status;
    if(status==='done')xp(c.xp||100,'Mücadele tamamlandı!');
    return Object.assign({},c,{checkins:checkins,status:status});
  });
  xp(5,'Mücadele günlük');save();renderPage();
}
window.openChallengeModal=openChallengeModal;window.startChallengeFromTpl=startChallengeFromTpl;
window.startChallenge=startChallenge;window.checkChallenge=checkChallenge;

    }
    h+='</div>';
  }
  h+='</div></div>';sh('pinner',h);

function addTimeBlock(hr){
  var hour=hr!==undefined?hr:parseInt(prompt(t('addBlockPromptHour'),new Date().getHours())||new Date().getHours());
  if(isNaN(hour)||hour<6||hour>22)return;
  var task=prompt(t('addBlockPromptTask'));if(!task||!task.trim())return;
  snap();var today=U.today();D.timeblocks[today]=D.timeblocks[today]||[];
  D.timeblocks[today]=D.timeblocks[today].filter(function(b){return b.hour!==hour;});
  D.timeblocks[today].push({hour:hour,task:task.trim(),priority:'normal'});
  xp(5,'Zaman blok');save();renderPage();
}
function removeTimeBlock(hr){snap();var today=U.today();D.timeblocks[today]=(D.timeblocks[today]||[]).filter(function(b){return b.hour!==hr;});save();renderPage();}

function renderSOP(){
  var sops=D.sops||[];
  var h='<div class="fade"><div class="sh"><div><h1 class="sh-t">'+t('sopTitle')+'</h1></div><button class="btn btn-p" data-type="sop" onclick="openForm(this.dataset.type)">'+ic('plus',13)+' '+t('add')+'</button></div>';
  if(!sops.length){h+='<div class="empty">'+ic('layers',32,'var(--t3)')+'<p>'+t('noData')+'</p></div></div>';sh('pinner',h);return;}
  h+='<div class="ga">';
  sops.forEach(function(sop){
    h+='<div class="card cp" style="display:flex;flex-direction:column;gap:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><p style="font-weight:700;font-size:14px">'+U.esc(sop.title)+'</p><button class="btn btn-g btn-ic" style="width:26px;height:26px" data-sid="'+sop.id+'" data-dtype="sop" onclick="del(+this.dataset.sid,this.dataset.dtype)">'+ic('trash',12,'var(--t3)')+'</button></div>';
    if(sop.steps&&sop.steps.length){
      h+='<div style="display:flex;flex-direction:column;gap:6px">';
      sop.steps.forEach(function(step,i){h+='<div style="display:flex;align-items:flex-start;gap:8px"><div style="width:20px;height:20px;border-radius:99px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">'+(i+1)+'</div><span style="font-size:12.5px;padding-top:1px">'+U.esc(step)+'</span></div>';});
      h+='</div>';
    }
    h+='<button class="btn btn-s btn-sm" data-sid="'+sop.id+'" onclick="addSOPStep(+this.dataset.sid)">'+ic('plus',11)+' '+t('addSopStep')+'</button></div>';
  });
  h+='</div></div>';sh('pinner',h);
}
function addSOPStep(id){var step=prompt(t('addStepPrompt'));if(!step||!step.trim())return;snap();D.sops=(D.sops||[]).map(function(s){return s.id===id?Object.assign({},s,{steps:(s.steps||[]).concat([step.trim()])}):s;});save();renderPage();}
window.addSOPStep=addSOPStep;

// ── Geçmiş ──
function renderHistory(){
  var logs=D.logs||[];
  var h='<div class="fade"><div class="sh"><h1 class="sh-t">'+t('historyTitle')+'</h1></div>';
  if(!logs.length){h+='<div class="empty">'+ic('act',32,'var(--t3)')+'<p>'+t('noActivity')+'</p></div>';}
  else{h+='<div class="card" style="overflow:hidden">';logs.forEach(function(l){h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.05)">'+ic('act',12,'var(--t3)')+'<span style="font-size:13px;flex:1">'+U.esc(l.action)+'</span><span style="font-size:10.5px;color:var(--t3)">'+U.esc(l.time)+'</span></div>';});h+='</div>';}
  h+='</div>';sh('pinner',h);
}


function renderPage(){
  var pages={
    dashboard:renderDashboard,kpi:renderKPI,goals:renderGoals,
    todos:renderTodos,habits:renderHabits,routines:renderRoutines,
    smart:renderSMART,onething:renderOneThing,frog:renderFrog,
    timeblock:renderTimeBlock,weeklyreview:renderWeeklyReview,gtd:renderGTD,
    library:renderLibrary,mybooks:renderMyBooks,readingplan:renderReadingPlan,
    challenges:renderChallenges,deepwork:renderDeepWork,sop:renderSOP,
    tools:renderTools,history:renderHistory,
    quotes:function(){renderGenericList('quotes');},
    journal:function(){renderGenericList('journal');},
    principles:function(){renderGenericList('principles');},
    coaching:function(){renderGenericList('coaching');},
    vault:function(){renderGenericList('vault');},
    questions:function(){renderGenericList('questions');},
  };
  var fn=pages[tab];
  if(fn)fn();
  else{sh('pinner','<div class="empty">'+ic('ci',32,'var(--t3)')+'<p>'+tab+'</p></div>');}
}
function render(){renderNav();renderPage();}

// Search
var srch=document.getElementById('srch');
if(srch)srch.addEventListener('input',function(){searchQ=srch.value;renderPage();});

// Theme
var themeBtn=document.getElementById('theme-btn');
if(themeBtn)themeBtn.addEventListener('click',toggleDark);

// Boot
applyTheme();updateClock();render();

  if(tr)tr.className='lang-opt'+(LANG==='tr'?' active':'');
