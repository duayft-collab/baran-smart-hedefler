/* ══════════════════════════════════════════════════════════════════════════
   SMART P0 MOTORU — icerik-farkinda analiz, Quality Index, Coach, metric ilerleme
   Additive: yeni goal.metric alani opsiyonel; measurable string geriye uyumlu korunur.
   ══════════════════════════════════════════════════════════════════════════ */
var VAGUE_WORDS=['daha iyi','daha mutlu','daha başarılı','daha çok','daha fazla','biraz',
  'güzel','mutlu olmak','iyi olmak','pozitif olmak','gelişmek','başarılı olmak',
  'daha pozitif','daha sağlıklı','kaliteli biri'];
var GRANDIOSE=['milyarder','trilyon','dünyanın en','en zengin','milyoner','imparatorluk'];
var ACTION_VERBS=['al','bitir','yayınla','ulaş','kazan','koş','oku','yaz','tamamla','kur',
  'öğren','sertifika','geç','düş','artır','azalt','başla','sat','üret','indir','çık'];
/* Anlamsiz "neden" dolgu kaliplari — yalnizca dolu oldugu icin puan almamali. */
var WEAK_WHY=['önemli','iyi olur','iyi olsun','lazım','gerekli','hedefim','olsun',
  'istiyorum','faydalı','güzel olur','iyi bir şey','yapmalıyım'];

/* Anlamsiz/filler metin: cok kisa, yalniz rakam/noktalama, harfsiz, tek tekrar karakter. */
function isJunkText(t){
  t=String(t==null?'':t).trim();
  if(t.length<4)return true;                          // cok kisa
  if(/^[\d\s.,:;/_\-]+$/.test(t))return true;         // yalniz rakam/noktalama
  if(!/[a-zçğıöşüâîû]/i.test(t))return true;          // hic harf yok (sadece sembol)
  if(/^(.)\1{2,}$/.test(t.replace(/\s+/g,'')))return true; // aaaa / 1111 tek karakter tekrari
  return false;
}
/* Bir adim gecerli (anlamli) aksiyon mu? */
function isValidStep(s){return !isJunkText(s&&s.t!==undefined?s.t:s);}
function validStepCount(g){return ((g&&g.steps)||[]).filter(isValidStep).length;}
/* Neden gucu: 0=yok/cok kisa, 1=zayif/dolgu, 2=anlamli. */
function whyStrength(why){
  why=String(why||'').trim();
  if(why.length<12)return 0;
  var lw=why.toLowerCase();
  var onlyWeak=why.length<24&&WEAK_WHY.some(function(w){return lw.indexOf(w)>=0;});
  if(onlyWeak)return 1;
  return why.length>=28?2:1;
}
/* Clarity: uzunluk tek basina yetmez; somut fiil/nesne + belirsiz/test/filler cezasi. */
function clarityScore(title){
  title=String(title||'').trim();
  if(title.length<10||hasVague(title)||isJunkText(title))return 0;
  if(/\btest\b/i.test(title))return 2;                // test/filler basligi cezali
  var hv=hasActionVerb(title), hn=/\d/.test(title);
  if(hv&&hn)return 8;
  if(hv||hn)return 6;
  return title.length>=15?4:2;
}

/* measurable string veya goal.metric objesinden sayisal olcum cikar (dual-read) */
function readMetric(g){
  if(g&&g.metric&&typeof g.metric.target==='number'){
    return {target:g.metric.target,current:Number(g.metric.current||0),
      start:Number(g.metric.start||0),unit:g.metric.unit||'',
      direction:g.metric.direction||'up',structured:true};
  }
  // eski measurable stringinde sayi ara
  var s=String((g&&g.measurable)||'');
  var m=s.match(/-?\d[\d.,]*/);
  return {hasNumber:!!m,raw:s,structured:false};
}
function hasVague(t){t=(t||'').toLowerCase();return VAGUE_WORDS.some(function(w){return t.indexOf(w)>=0;});}
function hasActionVerb(t){t=(t||'').toLowerCase();return ACTION_VERBS.some(function(v){
  return new RegExp('(^|\\s)'+v).test(t);});}
function isGrandiose(t){t=(t||'').toLowerCase();return GRANDIOSE.some(function(w){return t.indexOf(w)>=0;});}
function daysUntil(dl){if(!dl)return null;return Math.ceil((new Date(dl)-new Date())/864e5);}

/* Icerik-farkinda SMART analizi: her harf {pass, reason, suggestion} */
function smartAnalyze(g){
  g=g||{};
  var title=g.title||'', mm=readMetric(g), dl=g.deadline, du=daysUntil(dl);
  var why=(g.desc||g.notes||'');
  var R={};
  // S — Spesifik: net, belirsiz kelime yok, eylem/nesne var
  if(!title||title.length<10)
    R.S={pass:false,reason:'Başlık çok kısa/genel',suggestion:'Neyi, ne kadar? Somut yaz.'};
  else if(hasVague(title))
    R.S={pass:false,reason:'Belirsiz ifade içeriyor',suggestion:'"'+title+'" belirsiz. Ölçülebilir bir sonuca çevir.'};
  else if(!hasActionVerb(title)&&!/\d/.test(title))
    R.S={pass:false,reason:'Somut eylem yok',suggestion:'Bir eylem fiili ekle: al, bitir, ulaş...'};
  else R.S={pass:true,reason:'Spesifik',suggestion:''};
  // M — Olculebilir: yapisal metric veya sayi+birim
  if(mm.structured)R.M={pass:true,reason:'Sayısal hedef tanımlı',suggestion:''};
  else if(mm.hasNumber)R.M={pass:true,reason:'Ölçütte sayı var',suggestion:'Hedef/mevcut değeri yapısal gir (otomatik %).'};
  else R.M={pass:false,reason:'Ölçüt sayısal değil',suggestion:'Bunu bir sayıya bağla: kaç? kaça kadar?'};
  // T — Zamanli: gelecekte tarih
  if(!dl)R.T={pass:false,reason:'Tarih yok',suggestion:'Bitiş tarihi + ara kontrol noktaları koy.'};
  else if(du!==null&&du<0)R.T={pass:false,reason:'Tarih geçmişte',suggestion:'Deadline geçmiş. Gerçekçi bir tarih seç.'};
  else R.T={pass:true,reason:'Zamanlı',suggestion:''};
  // A — Ulasilabilir: buyukluk/sure orani + parcalama
  var steps=validStepCount(g);
  if(isGrandiose(title)&&(du===null||du<180))
    R.A={pass:false,reason:'Süreye göre çok iddialı',suggestion:'Aşamalandır veya süreyi gerçekçileştir.'};
  else if(steps===0&&!(g.metric&&g.metric.checkpoints&&g.metric.checkpoints.length))
    R.A={pass:false,reason:'Geçerli aksiyon planı yok',suggestion:'İlk 1-3 somut, anlamlı adımı ekle; hedefi böl.'};
  else R.A={pass:true,reason:'Ulaşılabilir görünüyor',suggestion:''};
  // R — Anlamli: gercek bir neden
  if(!why||why.length<12)R.R={pass:false,reason:'Neden zayıf/yok',suggestion:'Bu hedef neden **senin için** önemli? Yaz.'};
  else R.R={pass:true,reason:'Anlamlı',suggestion:''};
  R.passCount=['S','M','A','R','T'].filter(function(k){return R[k].pass;}).length;
  return R;
}
/* Eski imza korunur ama artik ICERIK-FARKINDA (0-5). Tum cagiranlar calisir. */
function smartScore(g){return smartAnalyze(g).passCount;}

/* Goal Quality Index 0-100 — 14 boyut. Kalibrasyon: cop icerik taban puan almaz. */
function qualityIndex(g){
  g=g||{};var sa=smartAnalyze(g),mm=readMetric(g),title=g.title||'',why=(g.desc||g.notes||'');
  var vsteps=validStepCount(g),ws=whyStrength(why);
  var hasCheck=!!(g.metric&&g.metric.checkpoints&&g.metric.checkpoints.length);
  var p={};
  p.Specific=sa.S.pass?10:0;
  p.Measurable=sa.M.pass?(mm.structured?10:6):0;
  p.Achievable=sa.A.pass?10:0;
  p.Relevant=ws>=2?10:(ws===1?4:0);                        // neden kalitesine gore kademeli
  p.Time=sa.T.pass?10:0;
  p.Clarity=clarityScore(title);                           // uzunluk degil icerik
  p.Difficulty=mm.structured?6:(mm.hasNumber?3:0);
  p.Leverage=g.frog?6:0;                                    // kritik hedef = kaldirac
  p.OpportunityCost=4;                                      // notr (cross-goal analiz sonraki faz)
  p.Identity=/kimlik|biri olmak|insan olmak|karakter|değer/i.test(why)?6:0;
  p.Risk=(g.intel&&g.intel.risk)?6:0;
  p.SecondOrder=(g.intel&&g.intel.secondOrder)?4:0;
  p.Compound=(vsteps>0||hasCheck)?4:0;                      // gecerli adim/checkpoint
  p.ExecutionReadiness=vsteps>0?6:0;                        // gecerli adim varsa
  var score=Object.keys(p).reduce(function(a,k){return a+p[k];},0);
  // Kritik tavan: temel SMART sinyalleri eksikse yuksek puan verilmez.
  var crit=0;
  if(!sa.S.pass)crit++;
  if(!sa.M.pass)crit++;
  if(!sa.T.pass)crit++;
  if(vsteps===0&&!hasCheck)crit++;                         // gecerli aksiyon yok
  if(ws<1)crit++;                                           // gercek neden yok
  if(crit>=3)score=Math.min(score,39);
  else if(crit>=2)score=Math.min(score,49);
  score=Math.max(0,Math.min(100,score));
  var band=score>=85?'Mükemmel':score>=70?'Güçlü':score>=50?'Orta':score>=30?'Zayıf':'Çok Zayıf';
  return {score:score,band:band,parts:p};
}

/* ══ GOAL COACH P1 — deterministik teshis motoru ══
   goalDiagnose(g): yapilandirilmis teshis listesi (salt hesap; payload'a yazilmaz).
   goalCoach(g): geriye-uyumlu string[] (mevcut UI korunur). */

/* metric.current alani GERCEKTEN eksik mi? 0 gecerli bir degerdir. */
function metricCurrentMissing(g){
  if(!g||!g.metric||typeof g.metric.target!=='number')return false;
  var c=g.metric.current;
  if(c===undefined||c===null||c==='')return true;
  if(typeof c==='number')return isNaN(c);
  return isNaN(parseFloat(c));
}
/* Birlesik (coklu) hedef mi? Salt uzunluk DEGIL — bagimsiz sonuclar. */
function isMultiGoal(title){
  var t=(title||'').toLowerCase();
  if(/\bhem\b[^]*\bhem\b/.test(t))return true;                 // "hem ... hem ..."
  var parts=t.split(/\s+ve\s+|\s+ayrıca\s+|\s+bir de\s+/);
  if(parts.length>=2){
    var withNum=parts.filter(function(p){return /\d/.test(p);});
    if(withNum.length>=2)return true;                          // iki tarafta da sayisal sonuc
    var acted=parts.filter(function(p){return hasActionVerb(p)&&p.trim().length>=8;});
    if(acted.length>=2)return true;                            // iki bagimsiz eylem-cumlesi
  }
  return false;
}

/* Kural kaydi — tek otorite. when() smartAnalyze/qualityIndex ile TUTARLI. */
function coachRules(){
  return [
  {code:'junk_goal',dim:'S',severity:'high',priority:100,field:'title',
    when:function(g,x){return /\btest\b/i.test(g.title||'')||isJunkText(g.title||'');},
    title:'Taslak hedef',message:'Bu bir deneme/taslak gibi görünüyor.',action:'Gerçek, somut bir hedef yaz.'},
  {code:'vague_title',dim:'S',severity:'high',priority:92,field:'title',
    when:function(g,x){return !x.sa.S.pass&&hasVague(g.title||'');},
    title:'Belirsiz başlık',message:'Başlık belirsiz.',action:'Somut bir sonuç yaz: neyi, ne kadar?'},
  {code:'no_specificity',dim:'S',severity:'high',priority:90,field:'title',
    when:function(g,x){return !x.sa.S.pass&&!hasVague(g.title||'')&&!/\btest\b/i.test(g.title||'')&&!isJunkText(g.title||'');},
    title:'Somut değil',message:'Hedef yeterince somut değil.',action:'Bir eylem fiili ve net sonuç ekle.'},
  {code:'missing_metric',dim:'M',severity:'high',priority:88,field:'metric',
    when:function(g,x){return !x.sa.M.pass;},
    title:'Ölçüm eksik',message:'İlerlemeyi ölçemeyiz.',action:'Bir hedef değer ve birim ekle.'},
  {code:'missing_deadline',dim:'T',severity:'high',priority:82,field:'deadline',
    when:function(g,x){return !g.deadline;},
    title:'Tarih yok',message:'Bitiş tarihi yok.',action:'Gerçekçi bir bitiş tarihi seç.'},
  {code:'past_deadline',dim:'T',severity:'high',priority:82,field:'deadline',
    when:function(g,x){return !!g.deadline&&x.du!==null&&x.du<0;},
    title:'Tarih geçmiş',message:'Bitiş tarihi geçmişte.',action:'İleri bir tarih seç.'},
  {code:'unrealistic_scope',dim:'A',severity:'high',priority:78,field:'title',
    when:function(g,x){return !x.sa.A.pass&&isGrandiose(g.title||'');},
    title:'Gerçekçi değil',message:'Süreye göre çok iddialı.',action:'Aşamalandır veya süreyi gerçekçileştir.'},
  {code:'missing_valid_step',dim:'A',severity:'med',priority:74,field:'steps',
    when:function(g,x){return !x.sa.A.pass&&!isGrandiose(g.title||'');},
    title:'Uygulama planı yok',message:'Geçerli bir aksiyon adımı yok.',action:'İlk uygulanabilir adımı belirt.'},
  {code:'weak_why',dim:'R',severity:'med',priority:60,field:'desc',
    when:function(g,x){return !x.sa.R.pass;},
    title:'Neden zayıf',message:'Bu hedefin neden önemli olduğu belirsiz.',action:'Bu hedef senin için neden önemli, somutlaştır.'},
  {code:'weak_metric',dim:'M',severity:'low',priority:50,field:'metric',
    when:function(g,x){return x.sa.M.pass&&!x.mm.structured;},
    title:'Ölçüm yapısal değil',message:'Ölçüt metin içinde.',action:'Hedef/mevcut değeri sayısal gir (otomatik %).'},
  {code:'missing_start_value',dim:'M',severity:'low',priority:46,field:'metric',
    when:function(g,x){return x.mm.structured&&metricCurrentMissing(g);},
    title:'Mevcut değer eksik',message:'Başlangıç/mevcut değer girilmemiş.',action:'Mevcut değeri gir (0 da geçerlidir).'},
  {code:'multi_goal',dim:'S',severity:'low',priority:40,field:'title',
    when:function(g,x){return isMultiGoal(g.title||'');},
    title:'Birden fazla hedef',message:'Birden fazla bağımsız hedef birleşmiş.',action:'Ayrı hedeflere böl.'}
  ];
}
/* Yapilandirilmis teshis: oncelikli, deduped, banda gore capli. */
function goalDiagnose(g){
  g=g||{};
  var x={sa:smartAnalyze(g),qi:qualityIndex(g),mm:readMetric(g),du:daysUntil(g.deadline)};
  var out=[],seen={};
  coachRules().forEach(function(r){
    if(seen[r.code])return;
    var ok=false;try{ok=r.when(g,x);}catch(e){ok=false;}
    if(!ok)return;
    seen[r.code]=1;
    out.push({code:r.code,dimension:r.dim,severity:r.severity,priority:r.priority,
      title:r.title,message:r.message,action:r.action,field:r.field});
  });
  out.sort(function(a,b){return b.priority-a.priority;});
  var cap=x.qi.score>=70?1:x.qi.score>=50?3:4;                 // guclu:1, orta:3, kritik:4
  out=out.slice(0,cap);
  if(out.length===0&&x.qi.score>=70)
    out.push({code:'strong_goal',dimension:null,severity:'ok',priority:0,
      title:'Hedef güçlü',message:'Hedef güçlü görünüyor.',action:'',field:null});
  return out;
}
/* Geriye uyumlu string[] — mevcut UI (form/detay/SMART) korunur. */
function goalCoach(g){
  return goalDiagnose(g).filter(function(d){return d.code!=='strong_goal';})
    .map(function(d){return d.action||d.message;});
}
/* Kural tabanli, deterministik yeniden yazim onerisi. Uydurmaz; placeholder kullanir. Payload'i degistirmez. */
function suggestGoalRewrite(g){
  g=g||{};var mm=readMetric(g),du=daysUntil(g.deadline),missing=[];
  var core=String(g.title||'').trim();
  VAGUE_WORDS.forEach(function(w){core=core.replace(new RegExp(w,'gi'),'').trim();});
  if(!core)core='[hedefin]';
  var datePart;
  if(g.deadline&&du!==null&&du>=0){datePart=g.deadline+' tarihine kadar';}
  else{datePart='[tarih] tarihine kadar';missing.push('deadline');}
  var metricPart;
  if(mm.structured){metricPart=mm.target+' '+(mm.unit||'[birim]');if(!mm.unit)missing.push('metric');}
  else if(mm.hasNumber){metricPart=mm.raw;}
  else{metricPart='[hedef değer] [birim]';missing.push('metric');}
  var suggested=datePart+' '+core+' — '+metricPart+' seviyesine ulaş.';
  var conf=missing.length===0?'high':missing.length===1?'medium':'low';
  return {original:g.title||'',suggested:suggested,missingFields:missing,confidence:conf};
}

/* Sayisal ilerleme (metric) — yon farkindali. */
function metricPct(g){
  var m=readMetric(g);if(!m.structured||m.target===m.start)return null;
  var pct;
  if(m.direction==='down')pct=(m.start-m.current)/(m.start-m.target)*100;
  else pct=(m.current-m.start)/(m.target-m.start)*100;
  return Math.max(0,Math.min(100,Math.round(pct)));
}
/* Birlesik ilerleme: metric varsa metric%, yoksa adim%. Adim sistemi KORUNUR. */
function goalProgress(g){
  var mp=metricPct(g);
  if(mp!==null)return mp;
  return goalPct(g);
}
function goalPct(g){if(!g.steps||!g.steps.length)return 0;return Math.round(g.steps.filter(function(s){return s.done;}).length/g.steps.length*100);}
function pct(cur,tgt){return Math.min(100,Math.round((parseFloat(cur)||0)/(parseFloat(tgt)||1)*100));}
function progBar(p,color){
  var c=color||(p>=100?'var(--green)':p>=60?'var(--blue)':p>=30?'var(--orange)':'var(--red)');
  return '<div class="bar"><div class="barf" style="width:'+Math.min(100,p)+'%;background:'+c+'"></div></div>';
}
function statCard(label,val,icon,color){
  return '<div class="card" style="padding:14px 16px">'+
    '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">'+ic(icon,14,color)+
    '<span style="font-size:11px;color:var(--t2);font-weight:600">'+label+'</span></div>'+
    '<div class="kn" style="color:'+color+'">'+val+'</div></div>';
}
function calcStreak(checkins){
  if(!checkins||!checkins.length)return 0;
  var streak=0,d=new Date();
  for(var i=0;i<90;i++){
    var ds=d.toISOString().split('T')[0];
    if(checkins.indexOf(ds)>=0){streak++;d.setDate(d.getDate()-1);}
    else if(i===0){d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

function dwToggle(){
  if(!dwOn){
    dwOn=true;var btn=ge('dw-btn');if(btn)btn.textContent='Durdur';
    dwInt=setInterval(function(){
      dwLeft--;var tme=ge('dw-time');if(tme)tme.textContent=U.fmt(dwLeft);
      if(dwLeft<=0){dwOn=false;clearInterval(dwInt);dwInt=null;D.deepWorkSessions=(D.deepWorkSessions||0)+1;xp(75,'Deep Work');save();exitDW();alert('Deep Work tamamlandı! +75 XP');}
    },1000);
  }else{dwOn=false;clearInterval(dwInt);dwInt=null;var btn2=ge('dw-btn');if(btn2)btn2.textContent='Devam';}
}
function exitDW(){dwOn=false;if(dwInt){clearInterval(dwInt);dwInt=null;}var ov=ge('dw-ov');if(ov)ov.classList.remove('show');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')exitDW();});
window.enterDW=enterDW;window.dwToggle=dwToggle;window.exitDW=exitDW;

function toggleSound(url){
  if(audio&&D.activeSound===url){audio.pause();audio=null;D.activeSound=null;save();renderPage();}
  else{
    if(audio)audio.pause();
    try{audio=new Audio(url);audio.loop=true;audio.volume=D.vol;audio.play().catch(function(){});}catch(e){}
    D.activeSound=url;save();renderPage();
  }
}
function setVol(v){D.vol=parseFloat(v);if(audio)audio.volume=D.vol;var vp=ge('vol-pct');if(vp)vp.textContent=Math.round(D.vol*100)+'%';save();}
window.toggleSound=toggleSound;window.setVol=setVol;


function renderDashboard(){
  var today=U.today();
  var xpv=D.stats.xp||0,lvl=D.stats.level||1,xpInLvl=xpv%500;
  var otDone=D.oneThing&&D.oneThing.date===today&&D.oneThing.task;
  var urgentTodos=D.todos.filter(function(t){return !t.done&&t.priority==='urgent';});
  var habitsToday=(D.habits||[]).filter(function(h){return(h.checkins||[]).indexOf(today)>=0;}).length;
  var totalHabits=(D.habits||[]).length;
  var tbDone=D.timeblocks&&D.timeblocks[today]&&D.timeblocks[today].length>0;
  var rqDone=D.weeklyReview&&D.weeklyReview.updatedAt===today;
  var frog=urgentTodos[0]||D.todos.find(function(t){return !t.done;});
  var rq=D.quotes.length?D.quotes[Math.floor(Math.random()*D.quotes.length)]:null;

  var h='<div class="fade">';

  /* System status bar */
  var sysItems=[
    {label:'ONE Thing',done:!!otDone,icon:'&#9889;',tab:'onething'},
    {label:'Kurbaga',done:urgentTodos.length===0&&D.todos.some(function(t){return t.done;}),icon:'&#128056;',tab:'frog'},
    {label:'Alışkanlık',done:habitsToday>=totalHabits&&totalHabits>0,icon:'&#128260;',tab:'habits'},
    {label:'Zaman Blok',done:!!tbDone,icon:'&#128197;',tab:'timeblock'},
    {label:'Review',done:!!rqDone,icon:'&#9989;',tab:'weeklyreview'},
  ];
  h+='<div class="card" style="margin-bottom:16px;padding:14px 18px">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><p style="font-weight:700;font-size:13px">Sistem Durumu</p><span style="font-size:11px;color:var(--t2)">'+today+'</span></div>';
  h+='<div class="g5">';

    h+='<div data-tab="'+s.tab+'" onclick="gotoTab(this.dataset.tab)" style="display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:10px;background:'+bg+';cursor:pointer">';
    h+='<span style="font-size:20px">'+s.icon+'</span>';
    h+='<span style="font-size:10px;font-weight:600;color:'+tc+'">'+s.label+'</span>';
    h+='<span style="font-size:9px;color:'+tc+'">'+(s.done?'&#10003; Tamam':'Bekliyor')+'</span></div>';
  }
  h+='</div></div>';

  /* Stats */
  h+='<div class="g4" style="margin-bottom:16px">';
  h+=statCard('Seviye',lvl,'zap','var(--blue)');
  h+=statCard('XP',xpv,'star','var(--purple)');
  h+=statCard('Odak Saati',(D.stats.totalFocus||0)+'dk','brain','var(--green)');
  h+=statCard('Deep Work',D.deepWorkSessions||0,'hp','var(--orange)');
  h+='</div>';

  /* XP bar */
  h+='<div class="card cp" style="padding-top:12px;padding-bottom:12px;margin-bottom:16px">';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:7px"><span style="font-weight:600;font-size:13px">Seviye '+lvl+'</span><span style="font-size:12px;color:var(--t2)">'+xpInLvl+' / 500 XP</span></div>';
  h+=progBar(xpInLvl/5);h+='</div>';

  /* ONE Thing prompt */
  if(!otDone){
    h+='<div style="margin-bottom:16px;padding:14px 18px;border-radius:12px;background:var(--bl);border-left:4px solid var(--blue);display:flex;align-items:center;justify-content:space-between;gap:12px">';
    h+='<div><p style="font-weight:700;font-size:14px;margin-bottom:3px">&#9889; ONE Thing secilmedi!</p>';
    h+='<p style="font-size:12px;color:var(--t2)">&ldquo;Bugün yaparsam her seyi kolaylastiracak TEK sey ne?&rdquo;</p></div>';
    h+='<button class="btn btn-p" data-tab="onething" onclick="gotoTab(this.dataset.tab)">Şimdi Seç</button></div>';
  }

  /* Timer + Frog + KPI */
  h+='<div class="g3" style="margin-bottom:16px">';
  h+='<div class="card" id="timer-block"></div>';
  h+='<div class="card cp" style="background:linear-gradient(135deg,#1a3a2e,#0d2d1e);display:flex;flex-direction:column;gap:10px">';
  h+='<span style="font-size:22px">&#128056;</span>';
  h+='<p style="font-weight:700;font-size:15px;color:#a7f3d0">Kurbağayı Ye!</p>';
  h+='<p style="font-size:12.5px;color:#6ee7b7;line-height:1.6;flex:1">'+(frog?U.esc(frog.text):'Tüm görevler tamam!')+'</p>';
  h+='<button class="btn" style="background:rgba(255,255,255,.15);color:#fff;align-self:flex-start;font-size:12px" data-tab="todos" onclick="gotoTab(this.dataset.tab)">Göreve Git &#8594;</button></div>';
  if(D.kpis&&D.kpis.length){
    h+='<div class="card cp"><p class="lbl" style="margin-bottom:8px">KPI Özet</p>';
    D.kpis.slice(0,3).forEach(function(k){
      var kp=pct(k.current,k.target);
      var kc=kp>=80?'var(--green)':kp>=50?'var(--orange)':'var(--red)';

    });

  }
  h+='</div>';

  /* Scratch + Quote */
  h+='<div class="g2">';
  h+='<div class="scratch"><p class="lbl" style="color:#7a6000;margin-bottom:7px">&#9999; Karalama</p>';
  h+='<textarea class="inp" id="scratch-area" rows="4" placeholder="Aklına geleni yaz..." style="background:transparent;border:none;padding:0;font-size:13px;box-shadow:none">'+U.esc(D.scratch||'')+'</textarea></div>';
  if(rq){
    h+='<div class="card cp" style="text-align:center;display:flex;flex-direction:column;justify-content:center">';
    h+='<p style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">&#10024; Günün Sözu</p>';
    h+='<p style="font-size:14px;font-style:italic;line-height:1.75">&ldquo;'+U.esc(rq.text)+'&rdquo;</p>';
    if(rq.author)h+='<p style="margin-top:8px;font-size:11px;font-weight:700;color:var(--blue)">&mdash; '+U.esc(rq.author)+'</p>';
    if(rq.cat)h+='<span class="pill p-blue" style="font-size:9px;margin-top:8px;align-self:center">'+U.esc(rq.cat)+'</span>';
    h+='</div>';
  }
  h+='</div></div>';
  sh('pinner',h);
  renderTm();
  var sa=ge('scratch-area');
  if(sa)sa.addEventListener('input',function(){D.scratch=sa.value;save();});
}


function renderKPI(){
  var kpis=D.kpis||[];
  var reached=kpis.filter(function(k){return pct(k.current,k.target)>=100;}).length;
  var critical=kpis.filter(function(k){return pct(k.current,k.target)<50;}).length;
  var avg=kpis.length?Math.round(kpis.reduce(function(a,k){return a+pct(k.current,k.target);},0)/kpis.length):0;
  var h='<div class="fade"><div class="sh"><div><h1 class="sh-t">KPI & Metrikler</h1><p class="sh-sub">&ldquo;Ölçemedin seyi gelistiremezsin.&rdquo; &mdash; Peter Drucker</p></div><button class="btn btn-p" data-type="kpi" onclick="openForm(this.dataset.type)">'+ic('plus',13)+' KPI Ekle</button></div>';
  h+=quoteWidget('Yönetim','var(--blue)');
  h+='<div class="g4" style="margin-bottom:16px">';
  h+=statCard('Toplam',kpis.length,'kpi','var(--blue)');
  h+=statCard('Hedefe Ulasan',reached,'chk','var(--green)');
  h+=statCard('Kritik',critical,'flame','var(--red)');
  h+=statCard('Ort. Başarı',avg+'%','star','var(--orange)');
  h+='</div>';
  h+='<div class="card" style="overflow:hidden"><table class="tbl"><thead><tr><th style="padding-left:16px">Metrik</th><th>Kategori</th><th style="text-align:center">Mevcut</th><th style="text-align:center">Hedef</th><th>İlerleme</th><th style="width:80px"></th></tr></thead><tbody>';
  kpis.forEach(function(k){
    var p2=pct(k.current,k.target);
    var c=p2>=100?'var(--green)':p2>=60?'var(--orange)':'var(--red)';
    h+='<tr><td style="padding-left:16px"><p style="font-weight:600">'+U.esc(k.name)+'</p>'+(k.unit?'<p style="font-size:11px;color:var(--t3)">'+U.esc(k.unit)+'</p>':'')+'</td>';
    h+='<td><span class="pill p-blue" style="font-size:10px">'+U.esc(k.cat||'')+'</span></td>';
    h+='<td style="text-align:center;font-weight:700;font-size:15px;color:'+c+'">'+k.current+'</td>';
    h+='<td style="text-align:center;font-size:12px;color:var(--t2)">'+k.target+'</td>';
    h+='<td style="min-width:120px"><div style="display:flex;align-items:center;gap:7px">'+progBar(p2)+'<span style="font-size:11px;font-weight:700;color:'+c+';min-width:28px">'+p2+'%</span></div></td>';
    h+='<td><div style="display:flex;gap:4px"><button class="btn btn-g btn-ic" style="width:26px;height:26px" data-kid="'+k.id+'" onclick="updateKPI(+this.dataset.kid)">'+ic('edit',12,'var(--t3)')+'</button><button class="btn btn-g btn-ic" style="width:26px;height:26px" data-kid="'+k.id+'" data-dtype="kpi" onclick="del(+this.dataset.kid,this.dataset.dtype)">'+ic('trash',12,'var(--t3)')+'</button></div></td></tr>';
  });
  if(!kpis.length)h+='<tr><td colspan="6"><div class="empty">'+ic('kpi',28,'var(--t3)')+'<p>Henüz KPI eklenmedi</p></div></td></tr>';
  h+='</tbody></table></div></div>';
  sh('pinner',h);
}
function updateKPI(id){
  var k=(D.kpis||[]).find(function(x){return x.id===id;});if(!k)return;
  var v=prompt('Yeni deger ('+k.unit+'):',k.current);if(v===null)return;
  snap();D.kpis=D.kpis.map(function(x){return x.id===id?Object.assign({},x,{current:parseFloat(v)||0,hist:(x.hist||[]).concat([parseFloat(v)||0])}):x;});
  xp(5,'KPI güncellendi');save();renderPage();
}
window.updateKPI=updateKPI;



function setGView(){localStorage.setItem('gview',gView);}
function renderGoals(){
  var all=D.goals||[];
  var goals=fil(all,['title','desc','cat']);
  if(gFilter!=='all'){
    if(gFilter==='active')goals=goals.filter(function(g){return g.status!=='done';});
    else if(gFilter==='done')goals=goals.filter(function(g){return g.status==='done';});
    else goals=goals.filter(function(g){return g.quarter===gFilter;});
  }
  var doneCount=all.filter(function(g){return g.status==='done';}).length;
  var avgP=all.length?Math.round(all.reduce(function(a,g){return a+goalProgress(g);},0)/all.length):0;
  var h='<div class="fade"><div class="sh"><div><h1 class="sh-t">Hedefler</h1><p class="sh-sub">Brian Tracy SMART sistemi</p></div>';
  h+=quoteWidget('Hedef','var(--purple)');
  h+='<div style="display:flex;gap:7px;align-items:center"><div style="display:flex;gap:3px;background:var(--s2);border-radius:8px;padding:3px">';
  [{v:'grid',l:'Grid'},{v:'list',l:'Liste'}].forEach(function(vv){
    var a=gView===vv.v;
    h+='<button class="btn btn-sm" style="padding:4px 10px;background:'+(a?'var(--s)':'transparent')+';color:'+(a?'var(--t)':'var(--t2)')+'" data-v="'+vv.v+'" onclick="gView=this.dataset.v;setGView();renderPage()">'+vv.l+'</button>';
  });
  h+='</div><button class="btn btn-p" onclick="openGoalForm()">'+ic('plus',13)+' Hedef Ekle</button></div></div>';
  h+='<div class="g5" style="margin-bottom:16px">';
  h+=statCard('Toplam',all.length,'tgt','var(--blue)');
  h+=statCard('Aktif',all.length-doneCount,'zap','var(--orange)');
  h+=statCard('Tamamlandı',doneCount,'chk','var(--green)');
  h+=statCard('Kurbaga',all.filter(function(g){return g.frog;}).length,'flame','var(--red)');
  h+=statCard('Ort. İlerleme',avgP+'%','kpi',avgP>=60?'var(--green)':'var(--orange)');
  h+='</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
  [{f:'all',l:'Tumu'},{f:'active',l:'Aktif'},{f:'done',l:'Bitti'},{f:'Q1',l:'Q1'},{f:'Q2',l:'Q2'},{f:'Q3',l:'Q3'},{f:'Q4',l:'Q4'}].forEach(function(fi){
    h+='<button class="btn btn-sm" style="background:'+(gFilter===fi.f?'var(--blue)':'var(--s2)')+';color:'+(gFilter===fi.f?'#fff':'var(--t2)')+'" data-f="'+fi.f+'" onclick="gFilter=this.dataset.f;renderPage()">'+fi.l+'</button>';
  });
  h+='</div>';
  if(!goals.length){h+='<div class="card" style="padding:48px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px"><div style="width:52px;height:52px;border-radius:14px;background:var(--bl);display:flex;align-items:center;justify-content:center">'+ic('tgt',26,'var(--blue)')+'</div><p style="font-weight:700;font-size:16px">Henüz hedef yok</p><button class="btn btn-p" onclick="openGoalForm()">'+ic('plus',13)+' Ilk Hedefi Ekle</button></div></div>';sh('pinner',h);return;}

  if(gView==='list'){
    h+='<div class="card" style="overflow:hidden"><table class="tbl"><thead><tr><th style="padding-left:16px">Hedef</th><th>Kat</th><th>Çeyrek</th><th>Deadline</th><th>İlerleme</th><th style="width:40px"></th></tr></thead><tbody>';
    goals.forEach(function(g){
      var p4=goalProgress(g),pc2=p4>=100?'var(--green)':p4>=60?'var(--blue)':p4>=30?'var(--orange)':'var(--red)';
      var dl=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/864e5):null;
      var dlc=dl===null?'var(--t3)':dl<0?'var(--red)':dl<14?'var(--orange)':'var(--t2)';
      var cc=GOAL_CC[g.cat||'Diğer']||'var(--t3)';
      h+='<tr style="cursor:pointer" data-gid="'+g.id+'" onclick="openGoalDetail(+this.dataset.gid)">';
      h+='<td style="padding-left:16px"><div style="display:flex;align-items:center;gap:7px">'+(g.frog?'<span style="font-size:14px">&#128056;</span>':'')+'<div><p style="font-weight:600;font-size:13px">'+U.esc(g.title)+'</p>'+(g.measurable?'<p style="font-size:10.5px;color:var(--t2)">'+U.esc(g.measurable)+'</p>':'')+'</div></div></td>';
      h+='<td><span class="pill" style="background:'+(GOAL_CB[g.cat||'Diğer']||'var(--s2)')+';color:'+cc+';font-size:10px">'+U.esc(g.cat||'Diğer')+'</span></td>';
      h+='<td><span class="pill p-blue" style="font-size:10px">'+g.quarter+'</span></td>';
      h+='<td style="font-size:11.5px;color:'+dlc+'">'+(dl===null?'&mdash;':dl<0?'Gecti':dl+'g')+'</td>';
      h+='<td style="min-width:120px"><div style="display:flex;align-items:center;gap:7px">'+progBar(p4)+'<span style="font-size:11px;font-weight:700;color:'+pc2+';min-width:28px">'+p4+'%</span></div></td>';
      h+='<td><button class="btn btn-g btn-ic" style="width:26px;height:26px" data-gid="'+g.id+'" data-dtype="goal" onclick="event.stopPropagation();del(+this.dataset.gid,this.dataset.dtype)">'+ic('trash',12,'var(--t3)')+'</button></td></tr>';
    });
    h+='</tbody></table></div>';
  }else{
    h+='<div class="ga">';
    goals.forEach(function(g){
      var p5=goalProgress(g),pc3=p5>=100?'var(--green)':p5>=60?'var(--blue)':p5>=30?'var(--orange)':'var(--red)';
      var dl2=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/864e5):null;
      var dlc2=dl2===null?'var(--t3)':dl2<0?'var(--red)':dl2<7?'var(--orange)':'var(--t2)';
      var cc4=GOAL_CC[g.cat||'Diğer']||'var(--t3)';
      var cbg2=GOAL_CB[g.cat||'Diğer']||'var(--s2)';
      h+='<div class="card" style="display:flex;flex-direction:column;overflow:hidden;cursor:pointer" data-gid="'+g.id+'" onclick="openGoalDetail(+this.dataset.gid)">';
      h+='<div style="height:3px;background:'+cc4+'"></div><div style="padding:15px 17px;display:flex;flex-direction:column;gap:10px;flex:1">';
      h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div style="flex:1">';
      h+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">'+(g.frog?'<span style="font-size:14px">&#128056;</span>':'')+'<span class="pill" style="background:'+cbg2+';color:'+cc4+';font-size:10px">'+U.esc(g.cat||'Diğer')+'</span><span class="pill p-blue" style="font-size:10px">'+g.quarter+'</span>'+(g.status==='done'?'<span class="pill p-green" style="font-size:9px">&#10003; Bitti</span>':'')+'</div>';
      h+='<p style="font-weight:700;font-size:14px;line-height:1.3">'+U.esc(g.title)+'</p></div>';
      h+='<button class="btn btn-g btn-ic" style="width:26px;height:26px;flex-shrink:0" data-gid="'+g.id+'" data-dtype="goal" onclick="event.stopPropagation();del(+this.dataset.gid,this.dataset.dtype)">'+ic('trash',12,'var(--t3)')+'</button></div>';
      if(g.measurable)h+='<div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--s2);border-radius:8px">'+ic('kpi',13,'var(--t2)')+'<span style="font-size:12px;font-weight:600">'+U.esc(g.measurable)+'</span></div>';
      if(g.steps&&g.steps.length){
        var doneS=g.steps.filter(function(s){return s.done;}).length;
        h+=g.steps.slice(0,3).map(function(s){return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0"><input type="checkbox" class="cb" style="pointer-events:none" '+(s.done?'checked':'')+'><span style="font-size:12px;text-decoration:'+(s.done?'line-through':'none')+';color:'+(s.done?'var(--t3)':'var(--t)')+'">'+U.esc(s.t)+'</span></div>';}).join('');
        if(g.steps.length>3)h+='<p style="font-size:11px;color:var(--t3);padding-left:24px">+ '+(g.steps.length-3)+' daha</p>';
        h+='<div style="display:flex;justify-content:space-between;margin:7px 0 4px;font-size:12px"><span style="color:var(--t2)">'+doneS+'/'+g.steps.length+'</span><span style="font-weight:700;color:'+pc3+'">'+p5+'%</span></div>'+progBar(p5);
      }else{
        var mmG=readMetric(g);
        if(mmG.structured)h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin:2px 0 4px;font-size:12px"><span style="color:var(--t2)">'+mmG.current+' / '+mmG.target+' '+U.esc(mmG.unit)+'</span><span style="font-weight:700;color:'+pc3+'">'+p5+'%</span></div>'+progBar(p5);
      }
      if(dl2!==null)h+='<div style="display:flex;align-items:center;gap:5px;padding-top:5px;border-top:1px solid rgba(0,0,0,.05)"><span style="font-size:11px;color:'+dlc2+';font-weight:500">'+(dl2<0?'Deadline gecti!':dl2===0?'Bugün son gun!':dl2+' gun kaldi')+'</span></div>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  sh('pinner',h);
}

/* Form hem OLUSTURMA hem DUZENLEME icin. editId verilirse mevcut hedef doldurulur. */
function openGoalForm(editId){
  var g=editId?((D.goals||[]).find(function(x){return x.id===editId;})||{}):{};
  var m=g.metric||{};
  var v=function(x){return U.esc(x||'');};

/* Formdan gecici bir hedef nesnesi kur (canli analiz + kaydetme icin ortak). */
function goalFromForm(existing){
  var mt=ge('gf_mt')&&ge('gf_mt').value, mc=ge('gf_mc')&&ge('gf_mc').value;
  var metric=null;
  if(mt!==''&&mt!==undefined&&!isNaN(parseFloat(mt))){
    metric={target:parseFloat(mt),current:mc!==''&&!isNaN(parseFloat(mc))?parseFloat(mc):0,
      start:existing&&existing.metric?Number(existing.metric.start||0):0,
      unit:(ge('gf_mu')&&ge('gf_mu').value)||'',
      direction:(ge('gf_mdir')&&ge('gf_mdir').value)||'up'};
    if(existing&&existing.metric&&existing.metric.checkpoints)metric.checkpoints=existing.metric.checkpoints;
  }
  return {title:(ge('gf_title')&&ge('gf_title').value.trim())||'',
    desc:(ge('gf_desc')&&ge('gf_desc').value)||'',
    cat:(ge('gf_cat')&&ge('gf_cat').value)||'Gelişim',
    quarter:(ge('gf_q')&&ge('gf_q').value)||'Q1',
    deadline:(ge('gf_dl')&&ge('gf_dl').value)||'',
    measurable:(ge('gf_m')&&ge('gf_m').value)||'',
    frog:!!(ge('gf_frog')&&ge('gf_frog').checked),
    metric:metric,
    steps:(existing&&existing.steps)||[]};
}
/* Canli Goal Coach + Quality Index formda gosterir. */
function goalFormLive(){
  var box=ge('gf_coach');if(!box)return;
  var draft=goalFromForm();
  if(!draft.title){box.innerHTML='';return;}
  var qi=qualityIndex(draft),tips=goalCoach(draft);
  var bc=qi.score>=70?'var(--green)':qi.score>=50?'var(--orange)':'var(--red)';
  var h='<div style="display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--s2);border-radius:9px">';
  h+='<div style="width:38px;height:38px;border-radius:9px;background:'+bc+';display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:15px;font-weight:800;color:#fff;line-height:1">'+qi.score+'</span><span style="font-size:7px;color:rgba(255,255,255,.85)">/100</span></div>';
  h+='<div style="flex:1"><p style="font-size:11px;font-weight:700;color:'+bc+'">Kalite: '+qi.band+'</p>';

}

function submitGoalForm(){
  var d=goalFromForm();
  if(!d.title){alert('Hedef başlığı zorunlu!');return;}
  var step1=ge('gf_step')&&ge('gf_step').value.trim();
  snap();
  var goal=Object.assign({id:Date.now(),notes:'',status:'active',createdAt:U.today()},d,
    {steps:step1?[{id:Date.now()+1,t:step1,done:false}]:[]});
  if(!goal.metric)delete goal.metric;
  D.goals=[goal].concat(D.goals||[]);
  xp(25,'Yeni hedef');save();closeModal();renderPage();
}
window.submitGoalForm=submitGoalForm;

/* DUZENLEME — mevcut hedefi gunceller (adim/not/status/id KORUNUR). */
function submitGoalEdit(goalId){
  var cur=(D.goals||[]).find(function(x){return x.id===goalId;});if(!cur)return;
  var d=goalFromForm(cur);
  if(!d.title){alert('Hedef başlığı zorunlu!');return;}
  snap();
  D.goals=D.goals.map(function(g){
    if(g.id!==goalId)return g;
    var upd=Object.assign({},g,{title:d.title,desc:d.desc,cat:d.cat,quarter:d.quarter,
      deadline:d.deadline,measurable:d.measurable,frog:d.frog});
    if(d.metric)upd.metric=d.metric;else delete upd.metric;
    return upd;
  });
  save();closeModal();
  if(openGId===goalId)openGoalDetail(goalId);else renderPage();
}

function openAddStep(goalId){

function submitAddStep(goalId){
  var inp=ge('step_inp');if(!inp||!inp.value.trim()){alert('Adım adi zorunlu!');return;}
  snap();D.goals=D.goals.map(function(g){return g.id===goalId?Object.assign({},g,{steps:g.steps.concat([{id:Date.now(),t:inp.value.trim(),done:false}])}):g;});

function toggleStep(goalId,stepId){
  snap();
  D.goals=D.goals.map(function(g){
    if(g.id!==goalId)return g;
    var wasDone=(g.steps.find(function(s){return s.id===stepId;})||{}).done;
    if(!wasDone)xp(10,'Adım tamamlandı');
    return Object.assign({},g,{steps:g.steps.map(function(s){return s.id===stepId?Object.assign({},s,{done:!s.done}):s;})});
  });
  save();if(openGId===goalId)openGoalDetail(goalId);else renderPage();
}
window.toggleStep=toggleStep;

function delStep(goalId,stepId){
  snap();D.goals=D.goals.map(function(g){return g.id===goalId?Object.assign({},g,{steps:g.steps.filter(function(s){return s.id!==stepId;})}):g;});
  save();if(openGId===goalId)openGoalDetail(goalId);else renderPage();
}

function saveGoalNote(goalId){var el2=ge('gnotes_'+goalId);if(!el2)return;D.goals=D.goals.map(function(g){return g.id===goalId?Object.assign({},g,{notes:el2.value}):g;});save();}

function markGoalDone(goalId){
  var g=(D.goals||[]).find(function(x){return x.id===goalId;});if(!g)return;
  // Completion gate: dusuk kaliteli hedef tek tikla tamamlanamaz
  var qi=qualityIndex(g);
  if(qi.score<50&&!confirm('Bu hedef yeterince kaliteli görünmüyor (Kalite '+qi.score+'/100). '+
    'Anlamsız bir hedefi tamamlamak sistemin değerini düşürür. Yine de tamamlansın mı?'))return;
  snap();D.goals=D.goals.map(function(x){return x.id===goalId?Object.assign({},x,{status:'done',completedAt:U.today()}):x;});
  xp(100,'Hedef tamamlandı');save();closeModal();renderPage();
}

function startChallenge(tplId){
  var tpl=CH_TPLS.find(function(t){return t.id===tplId;});if(!tpl)return;
  snap();D.challenges=[{id:Date.now(),tplId:tplId,name:tpl.name,desc:tpl.desc,cat:tpl.cat,diff:tpl.diff,xp:tpl.xp,start:U.today(),end:null,checkins:[],status:'active'}].concat(D.challenges||[]);

function checkChallenge(id){
  var today4=U.today();
  D.challenges=(D.challenges||[]).map(function(c){
    if(c.id!==id)return c;
    if((c.checkins||[]).indexOf(today4)>=0)return c;
    var checkins=(c.checkins||[]).concat([today4]);
    var elapsed=Math.ceil((new Date()-new Date(c.start))/864e5);
    var status=elapsed>=90?'done':c.status;
    if(status==='done')xp(c.xp||100,'Mücadele tamamlandı!');
    return Object.assign({},c,{checkins:checkins,status:status});
  });
  xp(5,'Mücadele günlük');save();renderPage();
}

function addTimeBlock(hr){
  var hour=hr!==undefined?hr:parseInt(prompt('Saat (6-22):',new Date().getHours())||new Date().getHours());
  if(isNaN(hour)||hour<6||hour>22)return;
  var task=prompt('Görev:');if(!task||!task.trim())return;
  snap();
  var today=U.today();D.timeblocks[today]=D.timeblocks[today]||[];
  D.timeblocks[today]=D.timeblocks[today].filter(function(b){return b.hour!==hour;});
  D.timeblocks[today].push({hour:hour,task:task.trim(),priority:'normal'});
  xp(5,'Zaman blok');save();renderPage();
}
function removeTimeBlock(hr){snap();var today=U.today();D.timeblocks[today]=(D.timeblocks[today]||[]).filter(function(b){return b.hour!==hr;});save();renderPage();}
window.addTimeBlock=addTimeBlock;window.removeTimeBlock=removeTimeBlock;

  for(var pi=0;pi<philosophies.length;pi++){

    h+='<div style="display:flex;gap:12px;margin-bottom:12px;align-items:flex-start">';
    h+='<div style="width:34px;height:34px;border-radius:10px;background:'+ph[2]+';display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+ph[3]+'</div>';
    h+='<div><p style="font-weight:700;font-size:13px;margin-bottom:2px">'+ph[0]+'</p>';
    h+='<p style="font-size:12px;color:var(--t2);line-height:1.6">'+ph[1]+'</p></div></div>';
  }
  h+='</div>';

  /* Kurallar + istatistik */
  h+='<div class="g2">';
  h+='<div class="card cp"><p style="font-weight:700;font-size:13px;margin-bottom:10px">&#128241; Oturum Oncesi Kontrol</p><div style="display:flex;flex-direction:column;gap:7px">';
  ['Telefon sessiz, uzakta','Bildirimler kapali','Sadece 1-2 sekme acik','Su & atistirmalik hazir','Kulaklık & odak muzigi hazir','Hedef net: ne uretecegim?'].forEach(function(r,i){
    h+='<div style="display:flex;align-items:center;gap:8px"><div style="width:20px;height:20px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">'+(i+1)+'</div><span style="font-size:12px">'+r+'</span></div>';
  });
  h+='</div></div>';
  h+='<div class="card cp"><p style="font-weight:700;font-size:13px;margin-bottom:10px">&#128200; İştatistiklerin</p><div style="display:flex;flex-direction:column;gap:7px">';
  [{l:'Deep Work Oturumu',v:D.deepWorkSessions||0},{l:'Toplam Odak',v:(D.stats.totalFocus||0)+' dk'},{l:'Toplam XP',v:D.stats.xp||0},{l:'Seviye',v:'Lv. '+(D.stats.level||1)}].forEach(function(s){
    h+='<div style="display:flex;justify-content:space-between;padding:8px 10px;background:var(--s2);border-radius:8px;font-size:13px"><span style="color:var(--t2)">'+s.l+'</span><span style="font-weight:700">'+s.v+'</span></div>';
  });
  h+='</div></div></div></div>';
  sh('pinner',h);
}

function renderSOP(){
  var sops=D.sops||[];
  var h='<div class="fade"><div class="sh"><div><h1 class="sh-t">SOP Şablonları</h1><p class="sh-sub">Standart işlem prosedürleri</p></div><button class="btn btn-p" data-type="sop" onclick="openForm(this.dataset.type)">'+ic('plus',13)+' SOP Ekle</button></div>';
  if(!sops.length)h+='<div class="empty">'+ic('layers',32,'var(--t3)')+'<p>SOP eklenmedi</p></div>';
  else{
    h+='<div class="ga">';
    sops.forEach(function(sop){
      h+='<div class="card cp" style="display:flex;flex-direction:column;gap:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><p style="font-weight:700;font-size:14px">'+U.esc(sop.title)+'</p><button class="btn btn-g btn-ic" style="width:26px;height:26px" data-sid="'+sop.id+'" data-dtype="sop" onclick="del(+this.dataset.sid,this.dataset.dtype)">'+ic('trash',12,'var(--t3)')+'</button></div>';
      if(sop.steps&&sop.steps.length){
        h+='<div style="display:flex;flex-direction:column;gap:6px">';
        sop.steps.forEach(function(step,i){h+='<div style="display:flex;align-items:flex-start;gap:8px"><div style="width:20px;height:20px;border-radius:99px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">'+(i+1)+'</div><span style="font-size:12.5px;padding-top:1px">'+U.esc(step)+'</span></div>';});
        h+='</div>';
      }
      h+='<button class="btn btn-s btn-sm" data-sid="'+sop.id+'" onclick="addSOPStep(+this.dataset.sid)">'+ic('plus',11)+' Adım Ekle</button></div>';
    });
    h+='</div>';
  }
  h+='</div>';sh('pinner',h);
}
function addSOPStep(id){
  var step=prompt('Yeni adım:');if(!step||!step.trim())return;
  snap();D.sops=(D.sops||[]).map(function(s){return s.id===id?Object.assign({},s,{steps:(s.steps||[]).concat([step.trim()])}):s;});save();renderPage();
}
window.addSOPStep=addSOPStep;

function renderHistory(){
  var logs=D.logs||[];
  var h='<div class="fade"><div class="sh"><h1 class="sh-t">Aktivite Geçmişi</h1></div>';
  if(!logs.length)h+='<div class="empty">'+ic('act',32,'var(--t3)')+'<p>Henüz aktivite yok</p></div>';
  else{h+='<div class="card" style="overflow:hidden">';logs.forEach(function(l){h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.05)">'+ic('act',12,'var(--t3)')+'<span style="font-size:13px;flex:1">'+U.esc(l.action)+'</span><span style="font-size:10.5px;color:var(--t3)">'+U.esc(l.time)+'</span></div>';});h+='</div>';}
  h+='</div>';sh('pinner',h);
}


function renderPage(){
  var pages={
    dashboard:renderDashboard,kpi:renderKPI,goals:renderGoals,
    todos:renderTodos,habits:renderHabits,routines:renderRoutines,
    smart:renderSMART,onething:renderOneThing,frog:renderFrog,
    timeblock:renderTimeBlock,weeklyreview:renderWeeklyReview,gtd:renderGTD,
    library:renderLibrary,mybooks:renderMyBooks,readingplan:renderReadingPlan,
    challenges:renderChallenges,deepwork:renderDeepWork,sop:renderSOP,
    tools:renderTools,history:renderHistory,
    quotes:function(){renderGenericList('quotes');},
    journal:function(){renderGenericList('journal');},
    principles:function(){renderGenericList('principles');},
    coaching:function(){renderGenericList('coaching');},
    vault:function(){renderGenericList('vault');},
    questions:function(){renderGenericList('questions');},
  };
  var fn=pages[tab];
  if(fn)fn();
  else{sh('pinner','<div class="empty">'+ic('ci',32,'var(--t3)')+'<p>Sayfa bulunamadi: '+tab+'</p></div>');}
}
function render(){renderNav();renderPage();}
