<!DOCTYPE html>
<html lang="tr">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusUp - Performans Sistemi</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
:root {
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#f0f0f2; --bg4:#e8e8ed;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.13);
  --text:#1d1d1f; --t2:#6e6e73; --t3:#aeaeb2;
  --blue:#0071e3; --bl:rgba(0,113,227,0.1);
  --green:#34c759; --gl:rgba(52,199,89,0.1);
  --orange:#ff9500; --ol:rgba(255,149,0,0.11);
  --red:#ff3b30; --rl:rgba(255,59,48,0.1);
  --purple:#af52de; --pl:rgba(175,82,222,0.1);
  --yellow:#ffcc00; --yl:rgba(255,204,0,0.13);
  --teal:#32ade6; --tl:rgba(50,173,230,0.1);
  --sw:230px;
  --sh:0 1px 3px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.05);
}
.dark {
  --bg:#000; --bg2:#1c1c1e; --bg3:#2c2c2e; --bg4:#3a3a3c;
  --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.14);
  --text:#f5f5f7; --t2:#98989d; --t3:#636366;
  --blue:#0a84ff; --bl:rgba(10,132,255,0.14);
  --green:#30d158; --gl:rgba(48,209,88,0.12);
  --orange:#ff9f0a; --ol:rgba(255,159,10,0.13);
  --red:#ff453a; --rl:rgba(255,69,58,0.12);
  --purple:#bf5af2; --pl:rgba(191,90,242,0.12);
  --yellow:#ffd60a; --yl:rgba(255,214,10,0.12);
  --teal:#5ac8fa; --tl:rgba(90,200,250,0.12);
  --sh:0 2px 8px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* Layout */
.shell{display:flex;height:100vh;}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0;overflow-y:auto;}
.body{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
.page{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg);}
.pinner{max-width:1040px;margin:0 auto;}

/* Logo */
.logo{display:flex;align-items:center;gap:9px;padding:4px 6px 16px;}
.logo-mark{width:26px;height:26px;border-radius:7px;background:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-weight:700;font-size:14px;letter-spacing:-.3px;}
.logo-ver{font-size:10px;color:var(--t3);font-weight:500;margin-left:auto;}

/* Nav */
.nsec{font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;padding:4px 6px 5px;margin-top:6px;}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 7px;border-radius:7px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);text-align:left;transition:background .12s,color .12s;position:relative;font-family:inherit;}
.nb:hover{background:var(--bg3);color:var(--text);}
.nb.active{background:var(--bl);color:var(--blue);font-weight:600;}
.ni{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nb-badge{background:var(--orange);color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;margin-left:auto;}

/* Cards */
.card{background:var(--bg2);border-radius:14px;box-shadow:var(--sh);}
.cp{padding:16px 18px;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .12s;white-space:nowrap;}
.btn-p{background:var(--blue);color:white;}
.btn-p:hover{filter:brightness(1.1);}
.btn-p:active{transform:scale(.98);}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-s:hover{background:var(--bg4);}
.btn-g{background:none;color:var(--t2);}
.btn-g:hover{background:var(--bg3);color:var(--text);}
.btn-sm{padding:4px 9px;font-size:11.5px;border-radius:6px;}
.btn-ic{width:30px;height:30px;padding:0;justify-content:center;border-radius:7px;}
.btn-green{background:var(--green);color:white;}
.btn-green:hover{filter:brightness(1.1);}
.btn-orange{background:var(--orange);color:white;}

/* Input */
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--text);font-family:inherit;width:100%;outline:none;transition:border .12s,box-shadow .12s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bl);background:var(--bg2);}
.inp::placeholder{color:var(--t3);}
textarea.inp{resize:none;}
select.inp{cursor:pointer;}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;}
.p-blue{background:var(--bl);color:var(--blue);}
.p-green{background:var(--gl);color:var(--green);}
.p-orange{background:var(--ol);color:var(--orange);}
.p-red{background:var(--rl);color:var(--red);}
.p-purple{background:var(--pl);color:var(--purple);}
.p-gray{background:var(--bg3);color:var(--t2);}
.p-yellow{background:var(--yl);color:#7a6000;}
.dark .p-yellow{color:var(--yellow);}
.p-teal{background:var(--tl);color:var(--teal);}

/* Checkbox */
.cb{appearance:none;width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;transition:all .12s;position:relative;flex-shrink:0;}
.cb:checked{background:var(--blue);border-color:var(--blue);}
.cb:checked::after{content:'';position:absolute;left:4px;top:1.5px;width:5px;height:8px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);}

/* Modal */
.ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fin .15s ease;}
.mbox{background:var(--bg2);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:480px;overflow:hidden;animation:sup .2s cubic-bezier(.34,1.56,.64,1);}
.mh{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.mb{padding:14px 20px;display:flex;flex-direction:column;gap:9px;max-height:62vh;overflow-y:auto;}
.mf{padding:12px 20px;display:flex;gap:8px;border-top:1px solid var(--border);}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg3);}

/* Progress */
.bar{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.barf{height:100%;border-radius:99px;transition:width .6s ease;}

/* Stars */
.star{color:var(--yellow);font-size:13px;cursor:pointer;}
.star.off{color:var(--bg4);}

/* Section header */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sh-t{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.sh-sub{font-size:13px;color:var(--t2);margin-top:2px;}

/* Grid */
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.grid-auto-sm{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:48px 20px;color:var(--t3);font-size:13px;}

/* Step row */
.step-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.step-row:last-child{border-bottom:none;}

/* Routine item */
.rit{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;transition:background .1s;}
.rit:hover{background:var(--bg3);}
.rit.done{opacity:.38;pointer-events:none;}

/* Animations */
@keyframes fin{from{opacity:0}to{opacity:1}}
@keyframes sup{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fin .2s ease;}

/* KPI card */
.kpi{padding:16px 18px;display:flex;flex-direction:column;gap:5px;}
.kpi-n{font-size:30px;font-weight:700;letter-spacing:-.5px;line-height:1;}
.kpi-l{font-size:11.5px;color:var(--t2);font-weight:500;}
.kpi-delta{font-size:11px;font-weight:600;margin-top:3px;}

/* Book item */
.book-row{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:flex-start;transition:background .1s;cursor:pointer;}
.book-row:last-child{border-bottom:none;}
.book-row:hover{background:var(--bg3);}
.book-cover{width:36px;height:50px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;letter-spacing:-.3px;}

/* Reading progress ring */
.ring-sm{transform:rotate(-90deg);transform-origin:center;}

/* Divider */
.div{height:1px;background:var(--border);margin:6px 2px;}

/* Focus timer */
.timer-big{font-size:54px;font-weight:700;letter-spacing:-3px;font-variant-numeric:tabular-nums;line-height:1;}

/* System card */
.sys-card{padding:16px 18px;border-left:3px solid var(--blue);}

/* Tag row */
.tags{display:flex;flex-wrap:wrap;gap:5px;}

/* Print */
@media print{@page{size:A4;margin:0;}.no-print{display:none!important;}.for-print{display:flex!important;}}
.for-print{display:none;position:fixed;inset:0;background:white;z-index:9999;align-items:center;justify-content:center;padding:50mm;text-align:center;}

/* Scratch */
.scratch{background:var(--yl);border:1.5px solid var(--yellow);border-radius:14px;padding:14px 16px;}

/* Mobile */
@media(max-width:768px){.sidebar{display:none;}.mob-nav{display:flex!important;}.page{padding:14px;}}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:7px 4px 14px;z-index:40;gap:0;}

/* Range */
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:99px;background:var(--bg3);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid var(--bg2);box-shadow:0 1px 3px rgba(0,0,0,.2);}

/* Sound btn */
.snd{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;text-align:left;transition:all .12s;width:100%;font-family:inherit;}
.snd:hover{border-color:var(--blue);}
.snd.on{background:var(--blue);border-color:var(--blue);color:white;}

/* Label */
.lbl{font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;}

/* Reading plan */
.rp-week{border-left:2px solid var(--blue);padding:8px 0 8px 14px;margin-bottom:10px;}
.rp-week-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:4px;}

/* Kategori renkleri */
.cat-0{background:#ff6b6b;}
.cat-1{background:#4ecdc4;}
.cat-2{background:#45b7d1;}
.cat-3{background:#96ceb4;}
.cat-4{background:#ffeaa7;color:#333 !important;}
.cat-5{background:#dda0dd;}
.cat-6{background:#98d8c8;}
.cat-7{background:#f7dc6f;color:#333 !important;}
.cat-8{background:#bb8fce;}
.cat-9{background:#85c1e9;}
</style>
