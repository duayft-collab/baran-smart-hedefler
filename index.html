<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusUp Pro V.2.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0d12;
            --surface: #13141c;
            --surface2: #1a1c27;
            --border: #242636;
            --text: #e8eaf2;
            --text-muted: #6b6f8a;
            --brand: #7c6eff;
            --brand-dim: rgba(124,110,255,0.12);
            --brand-glow: rgba(124,110,255,0.35);
            --green: #34d399;
            --amber: #fbbf24;
            --red: #f87171;
            --pink: #f472b6;
            --cyan: #22d3ee;
            --radius: 20px;
            --radius-lg: 28px;
        }
        .light {
            --bg: #f4f5fa;
            --surface: #ffffff;
            --surface2: #eef0f8;
            --border: #e2e4ef;
            --text: #1a1c2e;
            --text-muted: #8a8da8;
            --brand: #5b4fd8;
            --brand-dim: rgba(91,79,216,0.08);
            --brand-glow: rgba(91,79,216,0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; overflow: hidden; }
        h1, h2, h3, h4, .syne { font-family: 'Syne', sans-serif; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        /* Layout */
        .app { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; gap: 4px; flex-shrink: 0; z-index: 30; transition: all 0.3s; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        .topbar { height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding: 28px; background: var(--bg); }
        .content-inner { max-width: 1100px; margin: 0 auto; }

        /* Logo */
        .logo { display: flex; align-items: center; gap: 10px; padding: 8px 8px 20px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); letter-spacing: -0.5px; }
        .logo-icon { width: 36px; height: 36px; background: var(--brand); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }

        /* Nav */
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; color: var(--text-muted); border: none; background: none; width: 100%; text-align: left; position: relative; }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { background: var(--brand-dim); color: var(--brand); font-weight: 600; }
        .nav-item .nav-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .nav-item.active .nav-icon { background: var(--brand-dim); }
        .nav-badge { position: absolute; top: 8px; right: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--brand); }
        .nav-badge-pulse { animation: badge-pulse 2s infinite; }
        @keyframes badge-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .nav-sep { height: 1px; background: var(--border); margin: 8px 4px; }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); transition: all 0.2s; }
        .card:hover { border-color: var(--brand); }
        .card-inner { padding: 24px; }
        .card-sm { border-radius: var(--radius); }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .btn-primary { background: var(--brand); color: white; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 8px 20px var(--brand-glow); }
        .btn-ghost { background: var(--surface2); color: var(--text-muted); }
        .btn-ghost:hover { color: var(--text); background: var(--border); }
        .btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; border-radius: 10px; }

        /* Inputs */
        .input { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; width: 100%; outline: none; transition: border 0.2s; }
        .input:focus { border-color: var(--brand); }
        .input::placeholder { color: var(--text-muted); }
        textarea.input { resize: none; }
        select.input { cursor: pointer; }

        /* XP Bar */
        .xp-bar { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, var(--brand), var(--pink)); border-radius: 99px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }

        /* Progress bar */
        .progress { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--brand); border-radius: 99px; transition: width 0.8s ease; }
        .progress-fill.green { background: var(--green); }

        /* Tag/badge */
        .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .tag-brand { background: var(--brand-dim); color: var(--brand); }
        .tag-green { background: rgba(52,211,153,0.1); color: var(--green); }
        .tag-amber { background: rgba(251,191,36,0.1); color: var(--amber); }
        .tag-red { background: rgba(248,113,113,0.1); color: var(--red); }
        .tag-muted { background: var(--surface2); color: var(--text-muted); }

        /* Checkbox */
        .cb { appearance: none; width: 18px; height: 18px; border-radius: 6px; border: 2px solid var(--border); cursor: pointer; transition: all 0.2s; position: relative; flex-shrink: 0; background: var(--surface2); }
        .cb:checked { background: var(--brand); border-color: var(--brand); }
        .cb:checked::after { content: '✓'; position: absolute; color: white; font-size: 11px; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; }

        /* Modal */
        .modal-bg { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 16px; animation: fade-in 0.2s ease; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; width: 100%; max-width: 520px; overflow: hidden; animation: slide-up 0.25s cubic-bezier(0.4,0,0.2,1); }
        .modal-head { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
        .modal-foot { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; }

        /* Animations */
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fade-in 0.3s ease; }
        .slide-up { animation: slide-up 0.3s ease; }

        /* Stat cards */
        .stat-card { padding: 20px 24px; display: flex; flex-direction: column; gap: 6px; }
        .stat-val { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; }
        .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }

        /* Timer */
        .timer-display { font-family: 'Syne', sans-serif; font-size: 64px; font-weight: 800; letter-spacing: -3px; line-height: 1; }
        .timer-ring { transition: stroke-dashoffset 1s linear; }

        /* Frog card */
        .frog-card { background: linear-gradient(135deg, #064e3b, #065f46); border-color: #065f46; }

        /* Quote card */
        .quote-display { font-size: 18px; font-weight: 500; font-style: italic; line-height: 1.6; color: var(--text); }

        /* Table */
        .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tbl th { padding: 12px 16px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .tbl td { padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .tbl tr:last-child td { border-bottom: none; }
        .tbl tr:hover td { background: var(--surface2); }

        /* Section header */
        .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .section-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

        /* Routine item */
        .routine-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); transition: all 0.2s; cursor: pointer; }
        .routine-item:hover { border-color: var(--brand); }
        .routine-item.done { opacity: 0.35; filter: grayscale(0.5); pointer-events: none; }

        /* Step item */
        .step-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); transition: border 0.2s; }
        .step-item:hover { border-color: var(--brand); }

        /* Log timeline */
        .log-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .log-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); flex-shrink: 0; margin-top: 5px; }
        .log-dot.xp { box-shadow: 0 0 8px var(--brand-glow); }

        /* Sound btn */
        .sound-btn { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.2s; text-align: left; width: 100%; }
        .sound-btn:hover { border-color: var(--brand); }
        .sound-btn.playing { background: var(--brand); border-color: var(--brand); color: white; }

        /* Volume slider */
        input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 99px; background: var(--surface2); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--brand); cursor: pointer; }

        /* Priority colors */
        .p-urgent { background: rgba(248,113,113,0.15); color: var(--red); }
        .p-important { background: rgba(251,191,36,0.12); color: var(--amber); }
        .p-normal { background: var(--surface2); color: var(--text-muted); }

        /* Print */
        @media print {
            @page { size: A4; margin: 0; }
            .no-print { display: none !important; }
            .print-area { display: flex !important; }
        }
        .print-area { display: none; position: fixed; inset: 0; background: white; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; padding: 40mm; text-align: center; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex !important; }
            .content { padding: 16px; }
        }
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 8px 16px; z-index: 40; gap: 4px; }

        /* Scratchpad */
        .scratchpad { background: rgba(251,191,36,0.06); border-color: rgba(251,191,36,0.2); }

        /* Empty state */
        .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; gap: 12px; color: var(--text-muted); font-size: 14px; }

        /* Vault card */
        .vault-card { display: flex; flex-direction: column; gap: 10px; }

        /* Pomodoro ring */
        .ring-container { position: relative; width: 200px; height: 200px; margin: 0 auto; }
        .ring-bg { stroke: var(--surface2); }
        .ring-progress { stroke: var(--brand); stroke-linecap: round; transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: center; }
        .ring-break { stroke: var(--green); }

        /* search highlight */
        .search-box { position: relative; }
        .search-box input { padding-left: 36px; }
        .search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        /* Notification dot */
        .notif-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; border-radius: 50%; background: var(--brand); border: 2px solid var(--surface); }

        /* Mood/word of week */
        .word-card { background: linear-gradient(135deg, var(--brand-dim), transparent); border-color: var(--brand); }
        .word-display { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; color: var(--brand); line-height: 1; letter-spacing: -2px; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
</head>

// ── Utils ──────────────────────────────────────────────────────────────────
const U = {
    isoWeek: (d) => {
        const date = new Date(d.getTime());
        date.setHours(0,0,0,0);
        date.setDate(date.getDate() + 3 - (date.getDay()+6)%7);
        const w1 = new Date(date.getFullYear(),0,4);
        return 1+Math.round(((date-w1)/86400000-3+(w1.getDay()+6)%7)/7);
    },
    quarter: (d) => "Q"+(Math.floor((d.getMonth()+3)/3)),
    isActive: (period, lastDone) => {
        if(!lastDone) return true;
        const last = new Date(lastDone), now = new Date();
        if(period==='daily') return last.toDateString()!==now.toDateString();
        if(period==='weekly') return (now-last)>(7*864e5);
        if(period==='monthly') return last.getMonth()!==now.getMonth()||last.getFullYear()!==now.getFullYear();
        return true;
    },
    downloadJSON: (data, fn) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
        a.download = fn; a.click();
    },
    fmtTime: (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`,
    dateStr: (d=new Date()) => d.toISOString().split('T')[0],
    localStr: (d=new Date()) => d.toLocaleString('tr-TR'),
};

};

// ── Main App ───────────────────────────────────────────────────────────────
const App = () => {
    const [data, setData] = useState(() => {
        const s = localStorage.getItem('focusup_v2');
        return s ? {...INIT, ...JSON.parse(s)} : INIT;
    });
    const [isDark, setIsDark] = useState(() => localStorage.getItem('focusup_theme') !== 'light');
    const [history, setHistory] = useState([]);
    const [tab, setTab] = useState('dashboard');
    const [now, setNow] = useState(new Date());
    const [q, setQ] = useState('');
    const [modal, setModal] = useState({ open:false, type:null, data:null });
    const [print, setPrint] = useState({ item:null, template:1 });
    const [scratch, setScratch] = useState(() => localStorage.getItem('focusup_scratch')||'');

    // Pomodoro
    const [timerMode, setTimerMode] = useState('focus');
    const [timeLeft, setTimeLeft] = useState(25*60);
    const [timerOn, setTimerOn] = useState(false);
    const TIMER_DURATIONS = { focus:25*60, short:5*60, long:15*60 };

    const audioRef = useRef(null);

    // Theme
    useEffect(() => {
        document.body.className = isDark ? '' : 'light';
        localStorage.setItem('focusup_theme', isDark ? 'dark' : 'light');
    }, [isDark]);

    // Clock
    useEffect(() => { const t = setInterval(()=>setNow(new Date()),1000); return ()=>clearInterval(t); }, []);

    // Autosave
    useEffect(() => {
        const t = setTimeout(()=>{ localStorage.setItem('focusup_v2', JSON.stringify(data)); }, 800);
        return ()=>clearTimeout(t);
    }, [data]);
    useEffect(() => { localStorage.setItem('focusup_scratch', scratch); }, [scratch]);

    // Timer
    useEffect(() => {
        let t;
        if(timerOn && timeLeft>0) { t = setInterval(()=>setTimeLeft(p=>p-1),1000); }
        else if(timerOn && timeLeft===0) {
            setTimerOn(false);
            if(timerMode==='focus') {
                gainXP(50,'Pomodoro tamamlandı');
                setData(p=>({...p, stats:{...p.stats, totalFocusMinutes:(p.stats.totalFocusMinutes||0)+25}}));
            }
            try { new Audio('https://actions.google.com/google_around_the_world/notifications/meditation_bell.ogg').play(); } catch(e){}
        }
        return ()=>clearInterval(t);
    }, [timerOn, timeLeft]);

    const gainXP = (amount, reason) => {
        setData(p=>{
            const xp = (p.stats?.xp||0)+amount;
            const level = Math.floor(xp/500)+1;
            return {...p, stats:{...p.stats,xp,level}, logs:[{time:U.localStr(),action:`+${amount} XP: ${reason}`},...(p.logs||[])].slice(0,100)};
        });
    };

    const update = useCallback((next, msg='Değişiklik') => {
        setHistory(h=>[JSON.stringify(data),...h].slice(0,50));
        const log = {time:U.localStr(),action:msg};
        setData({...next, logs:[log,...(next.logs||[])].slice(0,100)});
    }, [data]);

    const undo = () => {
        if(!history.length) return;
        setData(JSON.parse(history[0]));
        setHistory(h=>h.slice(1));
    };

    const filter = (list, keys) => {
        if(!q||!list) return list||[];
        const lq=q.toLowerCase();
        return list.filter(i=>keys.some(k=>i[k]&&String(i[k]).toLowerCase().includes(lq)));
    };

    const trash = (item, type) => {
        if(!confirm('Bu öğeyi silmek istiyor musun?')) return;
        const km={goal:'goals',todo:'todos',book:'books',quote:'quotes',journal:'journal',principle:'principles',coaching:'coaching',question:'questions',vault:'vault'};
        update({...data,[km[type]]:(data[km[type]]||[]).filter(i=>i.id!==item.id),trash:[{...item,itemType:type,deletedAt:U.localStr()},...data.trash]},'Öğe silindi');
    };

    const submitModal = (vals) => {
        const type = modal.type;
        if(type==='routine') {
            const period = vals.period||'daily';
            const newR = {id:Date.now(),text:vals.text,lastDone:null};
            update({...data, routines:{...data.routines,[period]:[...(data.routines[period]||[]),newR]}},'Yeni rutin eklendi');
            gainXP(10,'Rutin eklendi');
            setModal({open:false});
            return;
        }
        const km={goal:'goals',todo:'todos',book:'books',quote:'quotes',journal:'journal',principle:'principles',coaching:'coaching',question:'questions',vault:'vault'};
        const item={id:Date.now(),...vals};
        if(type==='goal'){item.isFrog=!!vals.isFrog;item.steps=[];}
        if(type==='todo'){item.completed=false;}
        if(type==='book'){item.status='Sırada';}
        if(type==='journal'){item.date=U.dateStr();}
        update({...data,[km[type]]:[item,...(data[km[type]]||[])]},'Yeni öğe eklendi');
        gainXP(20,`Yeni ${type}`);
        setModal({open:false});
    };

    const timerPerc = timeLeft / TIMER_DURATIONS[timerMode];
    const circumference = 2 * Math.PI * 88;

    // ── NAV items
    const NAV = [
        {id:'dashboard',label:'Dashboard',icon:'layout-dashboard'},
        {id:'tools',label:'Odak Araçları',icon:'headphones',badge:true},
        {id:'vault',label:'Bilgi Kasası',icon:'archive',badge:true},
        {id:'goals',label:'Hedefler',icon:'target'},
        {id:'todos',label:'Yapılacaklar',icon:'check-square'},
        {id:'books',label:'Kitaplık',icon:'book-open'},
        {id:'quotes',label:'Özlü Sözler',icon:'quote'},
        {id:'journal',label:'Günlük',icon:'pen-line'},
        {id:'routines',label:'Rutinler',icon:'refresh-ccw'},
        {id:'principles',label:'Prensipler',icon:'shield-check'},
        {id:'coaching',label:'Koçluk',icon:'users'},
        {id:'questions',label:'Sorular',icon:'help-circle'},
    ];

    // ── Render content
    const renderContent = () => {
        if(tab==='dashboard') return <DashView />;
        if(tab==='tools') return <ToolsView />;
        if(tab==='vault') return <VaultView />;
        if(tab==='goals') return <GoalsView />;
        if(tab==='todos') return <TodosView />;
        if(tab==='books') return <BooksView />;
        if(tab==='routines') return <RoutinesView />;
        if(tab==='history') return <HistoryView />;
        const map={quotes:{list:data.quotes,keys:['text','author'],type:'quote'},journal:{list:data.journal,keys:['content','category'],type:'journal'},principles:{list:data.principles,keys:['content','type'],type:'principle'},coaching:{list:data.coaching,keys:['title','content'],type:'coaching'},questions:{list:data.questions,keys:['text'],type:'question'}};
        const cfg=map[tab]; if(cfg) return <GenericList {...cfg} />;
        return null;
    };

    // ── Dashboard ────────────────────────────────────────────────────────────
    const DashView = () => {
        const frog = data.todos.find(t=>!t.completed&&t.priority==='Acil & Önemli')||data.todos.find(t=>!t.completed);
        const randomQuote = useMemo(()=>data.quotes[Math.floor(Math.random()*data.quotes.length)],[]);
        const xpInLevel = data.stats.xp % 500;
        const doneRoutines = (data.routines.daily||[]).filter(r=>!U.isActive('daily',r.lastDone)).length;
        return (
            <div className="slide-up" style={{display:'flex',flexDirection:'column',gap:24}}>

                        <div className="xp-fill" style={{width:`${xpInLevel/5}%`}}></div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:16}}>

                            <span style={{fontFamily:'Syne',fontWeight:800,fontSize:20,color:'white',lineHeight:1}}>{data.stats.level}</span>
                            <span style={{fontSize:9,color:'rgba(255,255,255,0.7)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>LVL</span>

                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                                <span style={{fontFamily:'Syne',fontWeight:700,fontSize:16}}>Zirve Yolcusu</span>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{data.stats.xp} XP • {500-xpInLevel} sonraki seviyeye</span>
                            </div>
                        </div>
                        <div style={{textAlign:'right',flexShrink:0}}>
                            <div style={{fontSize:13,fontWeight:600,color:'var(--brand)'}}>{data.stats.totalFocusMinutes||0} dk</div>
                            <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Odak</div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>

                            </svg>
                            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>

                            </div>
                        </div>
                        <div style={{display:'flex',gap:10}}>
                            <button className="btn btn-primary" onClick={()=>setTimerOn(p=>!p)}>{timerOn?<><Icon name="pause" size={16}/>Durdur</>:<><Icon name="play" size={16}/>Başlat</>}</button>
                            <button className="btn btn-ghost btn-icon" onClick={()=>{setTimerOn(false);setTimeLeft(TIMER_DURATIONS[timerMode]);}}><Icon name="rotate-ccw" size={16}/></button>
                        </div>
                    </div>

                    {/* Frog */}
                    <div className="card frog-card" style={{padding:24,display:'flex',flexDirection:'column',gap:12}}>
                        <div style={{fontSize:32}}>🐸</div>
                        <div>
                            <div style={{fontFamily:'Syne',fontWeight:800,fontSize:18,color:'#a7f3d0',marginBottom:6}}>Kurbağayı Ye!</div>
                            <p style={{color:'#6ee7b7',fontSize:13,lineHeight:1.5}}>
                                {frog?.text || 'Tüm öncelikli işler tamamlandı!'}
                            </p>
                        </div>
                        <button className="btn" style={{background:'rgba(255,255,255,0.15)',color:'white',marginTop:'auto'}} onClick={()=>setTab('todos')}>
                            Göreve Git <Icon name="arrow-right" size={15}/>
                        </button>
                    </div>
                </div>

                {/* Quick add + scratchpad */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                    <div className="card" style={{padding:20}}>
                        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'var(--text-muted)',marginBottom:14}}>Hızlı Ekle</div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                            {['goal','todo','book','quote','journal','principle','coaching','vault'].map(t=>(
                                <button key={t} onClick={()=>setModal({open:true,type:t})} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'10px 6px',borderRadius:12,background:'var(--surface2)',border:'1px solid var(--border)',cursor:'pointer',transition:'all .2s',color:'var(--text-muted)'}}>
                                    <Icon name="plus" size={14} color="var(--brand)"/>
                                    <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em'}}>{t}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="card scratchpad" style={{padding:20}}>
                        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'var(--amber)',marginBottom:10}}>✏️ Karalama Defteri</div>
                        <textarea className="input" value={scratch} onChange={e=>setScratch(e.target.value)} placeholder="Aklına geleni buraya yaz…" style={{height:120,background:'transparent',border:'none',padding:0,fontSize:13,resize:'none'}}/>
                        <div style={{fontSize:9,color:'var(--text-muted)',textAlign:'right',marginTop:4,fontWeight:700,textTransform:'uppercase'}}>Otomatik kaydedilir</div>
                    </div>
                </div>

                {/* Quote */}
                {randomQuote && (
                    <div className="card" style={{padding:24,textAlign:'center'}}>
                        <p className="quote-display">"{randomQuote.text}"</p>
                        {randomQuote.author && <p style={{marginTop:12,fontSize:12,fontWeight:700,color:'var(--brand)',textTransform:'uppercase',letterSpacing:'0.1em'}}>— {randomQuote.author}</p>}
                    </div>
                )}
            </div>
        );
    };

    // ── Goals ────────────────────────────────────────────────────────────────
    const GoalsView = () => (
        <div className="slide-up">
            <div className="section-head">
                <h2 className="section-title"><Icon name="target" size={22} color="var(--brand)" style={{marginRight:8}}/> Hedefler</h2>
                <button className="btn btn-primary" onClick={()=>setModal({open:true,type:'goal'})}><Icon name="plus" size={16}/> Hedef Ekle</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:20}}>
                {filter(data.goals,['title','description']).map(goal=>{
                    const done=goal.steps.filter(s=>s.done).length;
                    const perc=goal.steps.length?Math.round(done/goal.steps.length*100):0;
                    return (
                        <div key={goal.id} className="card" style={{padding:24,display:'flex',flexDirection:'column',gap:16}}>
                            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
                                <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
                                    {goal.isFrog&&<span style={{fontSize:22}}>🐸</span>}
                                    <div>
                                        <h3 style={{fontFamily:'Syne',fontWeight:800,fontSize:16,lineHeight:1.3}}>{goal.title}</h3>
                                        <span className="tag tag-brand" style={{marginTop:6}}>{goal.quarter}</span>
                                    </div>
                                </div>
                                <button onClick={()=>trash(goal,'goal')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',padding:4}} title="Sil"><Icon name="trash-2" size={15}/></button>
                            </div>
                            <p style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.6,borderLeft:'2px solid var(--border)',paddingLeft:12}}>{goal.description}</p>
                            {/* Steps */}

                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                                    <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--text-muted)'}}>Aksiyon Planı</span>
                                    <button onClick={()=>{const t=prompt('Aksiyon adımı?');if(t){update({...data,goals:data.goals.map(g=>g.id===goal.id?{...g,steps:[...g.steps,{id:Date.now(),text:t,done:false}]}:g)},'Adım eklendi');}}} style={{fontSize:10,fontWeight:700,color:'var(--brand)',background:'var(--brand-dim)',border:'none',cursor:'pointer',padding:'3px 10px',borderRadius:99}}>+ Adım</button>
                                </div>
                                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                                    {goal.steps.map(s=>(
                                        <div key={s.id} className="step-item">
                                            <input type="checkbox" className="cb" checked={s.done} onChange={()=>{if(!s.done)gainXP(10,'Adım tamamlandı');update({...data,goals:data.goals.map(g=>g.id===goal.id?{...g,steps:g.steps.map(ss=>ss.id===s.id?{...ss,done:!ss.done}:ss)}:g)},'Adım güncellendi');}}/>
                                            <span style={{fontSize:12,fontWeight:500,textDecoration:s.done?'line-through':'none',color:s.done?'var(--text-muted)':'var(--text)',flex:1}}>{s.text}</span>

                                    </div>

    // ── Books ────────────────────────────────────────────────────────────────
    const BooksView = () => (
        <div className="slide-up">

                <h2 className="section-title"><Icon name="book-open" size={22} color="var(--brand)" style={{marginRight:8}}/> Kitaplık</h2>

                {data.books.length===0&&<div className="empty"><Icon name="book-open" size={32} color="var(--text-muted)"/><span>Henüz kitap eklenmedi</span></div>}
            </div>
        </div>
    );

    // ── Tools ────────────────────────────────────────────────────────────────
    const ToolsView = () => (
        <div className="slide-up">
            <div className="section-head">
                <h2 className="section-title"><Icon name="headphones" size={22} color="var(--brand)" style={{marginRight:8}}/> Odaklanma Araçları</h2>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>
                {SOUNDS.map(s=>(
                    <button key={s.name} className={`sound-btn${data.sounds.active===s.url?' playing':''}`} onClick={()=>{
                        if(audioRef.current&&data.sounds.active===s.url){audioRef.current.pause();update({...data,sounds:{...data.sounds,active:null}},'Ses durduruldu');}
                        else{if(audioRef.current)audioRef.current.pause();audioRef.current=new Audio(s.url);audioRef.current.loop=true;audioRef.current.volume=data.sounds.volume;audioRef.current.play();update({...data,sounds:{...data.sounds,active:s.url}},'Ses başlatıldı');}
                    }}>
                        <div style={{width:44,height:44,borderRadius:12,background:data.sounds.active===s.url?'rgba(255,255,255,0.2)':'var(--surface2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                            <Icon name={s.icon} size={22} color={data.sounds.active===s.url?'white':'var(--brand)'}/>
                        </div>
                        <div style={{flex:1,textAlign:'left'}}>
                            <div style={{fontWeight:700,fontSize:14,color:data.sounds.active===s.url?'white':'var(--text)'}}>{s.name}</div>
                            <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',color:data.sounds.active===s.url?'rgba(255,255,255,0.7)':'var(--text-muted)',marginTop:2}}>{data.sounds.active===s.url?'▶ Çalıyor':'Dinlemek için tıkla'}</div>
                        </div>
                        {data.sounds.active===s.url&&<div style={{width:8,height:8,borderRadius:50,background:'white',animation:'badge-pulse 1.5s infinite'}}></div>}
                    </button>
                ))}
            </div>
            <div className="card" style={{padding:'16px 24px',marginTop:20,display:'flex',alignItems:'center',gap:16}}>
                <Icon name="volume-2" size={18} color="var(--text-muted)"/>
                <input type="range" min="0" max="1" step="0.05" value={data.sounds.volume} onChange={e=>{const v=parseFloat(e.target.value);if(audioRef.current)audioRef.current.volume=v;update({...data,sounds:{...data.sounds,volume:v}},'Ses seviyesi');}} style={{flex:1}}/>
                <span style={{fontSize:12,color:'var(--text-muted)',fontWeight:700,minWidth:32,textAlign:'right'}}>{Math.round(data.sounds.volume*100)}%</span>
            </div>
        </div>
    );

    // ── Vault ────────────────────────────────────────────────────────────────
    const VaultView = () => (
        <div className="slide-up">
            <div className="section-head">
                <h2 className="section-title"><Icon name="archive" size={22} color="var(--brand)" style={{marginRight:8}}/> Bilgi Kasası</h2>
                <button className="btn btn-primary" onClick={()=>setModal({open:true,type:'vault'})}><Icon name="plus" size={16}/> Not Ekle</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                {filter(data.vault,['title','content']).map(note=>(
                    <div key={note.id} className="card vault-card" style={{padding:20}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                            <span className="tag tag-brand">{note.category||'Genel'}</span>
                            <div style={{display:'flex',gap:6}}>
                                <button onClick={()=>setPrint({item:note,template:1})} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',padding:4}}><Icon name="printer" size={14}/></button>
                                <button onClick={()=>trash(note,'vault')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',padding:4}}><Icon name="trash-2" size={14}/></button>
                            </div>
                        </div>
                        <h3 style={{fontFamily:'Syne',fontWeight:700,fontSize:15,marginTop:10}}>{note.title}</h3>
                        <p style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.6,marginTop:6,flex:1}}>{note.content}</p>
                        <div style={{fontSize:10,color:'var(--text-muted)',marginTop:10,fontWeight:600}}>{new Date(note.id).toLocaleDateString('tr-TR')}</div>
                    </div>
                ))}
                {data.vault.length===0&&<Empty icon="archive" text="Bilgi kasası boş"/>}
            </div>
        </div>
    );

    // ── Routines ─────────────────────────────────────────────────────────────
    const RoutinesView = () => (
        <div className="slide-up">
            <div className="section-head">
                <h2 className="section-title"><Icon name="refresh-ccw" size={22} color="var(--brand)" style={{marginRight:8}}/> Rutin Çarkı</h2>
                <button className="btn btn-primary" onClick={()=>setModal({open:true,type:'routine'})}><Icon name="plus" size={16}/> Rutin Ekle</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16}}>
                {Object.entries(data.routines).map(([period,items])=>(
                    <div key={period} className="card" style={{padding:20}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                            <Icon name="clock" size={16} color="var(--brand)"/>
                            <span style={{fontFamily:'Syne',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',fontSize:13}}>{period}</span>
                            <span className="tag tag-muted" style={{marginLeft:'auto'}}>{(items||[]).filter(r=>!U.isActive(period,r.lastDone)).length}/{(items||[]).length}</span>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:6}}>
                            {(items||[]).map(item=>{
                                const active=U.isActive(period,item.lastDone);
                                return (
                                    <div key={item.id} className={`routine-item${active?'':' done'}`} onClick={()=>{if(active){gainXP(10,'Rutin tamamlandı');update({...data,routines:{...data.routines,[period]:data.routines[period].map(r=>r.id===item.id?{...r,lastDone:new Date().toISOString()}:r)}},'Rutin tamamlandı');}}}>
                                        <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
                                            <div style={{width:28,height:28,borderRadius:8,background:active?'var(--brand-dim)':'var(--surface2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                                <Icon name={active?'circle':'check-circle'} size={14} color={active?'var(--brand)':'var(--green)'}/>
                                            </div>
                                            <span style={{fontSize:13,fontWeight:500}}>{item.text}</span>
                                        </div>
                                        <button onClick={e=>{e.stopPropagation();update({...data,routines:{...data.routines,[period]:(data.routines[period]||[]).filter(i=>i.id!==item.id)}},'Rutin silindi');}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',padding:'2px 4px',pointerEvents:'auto'}}><Icon name="x" size={12}/></button>
                                    </div>
                                );
                            })}
                            {(items||[]).length===0&&<p style={{fontSize:12,color:'var(--text-muted)',fontStyle:'italic',textAlign:'center',padding:'8px 0'}}>Henüz rutin yok</p>}
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );

    // ── History ──────────────────────────────────────────────────────────────
    const HistoryView = () => (
        <div className="slide-up">
            <div className="section-head">
                <h2 className="section-title"><Icon name="activity" size={22} color="var(--brand)" style={{marginRight:8}}/> Sistem Geçmişi</h2>
                <span className="tag tag-muted">{data.logs?.length||0} kayıt</span>
            </div>
            <div className="card" style={{padding:'8px 20px',maxHeight:'70vh',overflowY:'auto'}}>
                {(data.logs||[]).map((log,i)=>(
                    <div key={i} className="log-item">
                        <div className={`log-dot${log.action.includes('XP')?' xp':''}`}></div>
                        <div>
                            <div style={{fontSize:11,color:'var(--brand)',fontWeight:600,marginBottom:2}}>{log.time}</div>
                            <div style={{fontSize:13,fontWeight:500}}>{log.action}</div>
                        </div>
                    </div>
                ))}
                {(!data.logs||data.logs.length===0)&&<div className="empty"><Icon name="activity" size={32} color="var(--text-muted)"/><span>Henüz aktivite yok</span></div>}
            </div>
        </div>
    );

    // ── Generic list ─────────────────────────────────────────────────────────
    const GenericList = ({list,keys,type}) => {
        const LABELS={quotes:'Özlü Sözler',journal:'Günlük',principles:'Prensipler',coaching:'Koçluk',questions:'Sorular'};
        const ICONS={quotes:'quote',journal:'pen-line',principles:'shield-check',coaching:'users',questions:'help-circle'};
        return (
            <div className="slide-up">
                <div className="section-head">
                    <h2 className="section-title"><Icon name={ICONS[tab]||'list'} size={22} color="var(--brand)" style={{marginRight:8}}/> {LABELS[tab]||tab}</h2>
                    <button className="btn btn-primary" onClick={()=>setModal({open:true,type})}><Icon name="plus" size={16}/> Ekle</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                    {filter(list,keys).map(item=>(
                        <div key={item.id} className="card" style={{padding:20,display:'flex',flexDirection:'column',gap:10}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                                <span className="tag tag-brand">{item.category||item.type||''}</span>
                                <div style={{display:'flex',gap:4}}>
                                    <button onClick={()=>setPrint({item,template:1})} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',padding:4}}><Icon name="printer" size={14}/></button>
                                    <button onClick={()=>trash(item,type)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',padding:4}}><Icon name="trash-2" size={14}/></button>
                                </div>
                            </div>
                            {item.title&&<h3 style={{fontFamily:'Syne',fontWeight:700,fontSize:14}}>{item.title}</h3>}
                            <p style={{fontSize:13,color:'var(--text)',lineHeight:1.6,fontStyle:'italic'}}>"{item.text||item.content}"</p>
                            {item.author&&<p style={{fontSize:11,color:'var(--text-muted)',fontWeight:600}}>— {item.author}</p>}
                            {item.date&&<p style={{fontSize:10,color:'var(--text-muted)'}}>{item.date}</p>}
                        </div>
                    ))}
                    {(!list||list.length===0)&&<Empty icon={ICONS[tab]||'list'} text="Henüz içerik eklenmedi"/>}
                </div>
            </div>
        );
    };

    // ── Empty state ──────────────────────────────────────────────────────────
    const Empty = ({icon,text}) => (
        <div className="empty" style={{gridColumn:'1/-1'}}>
            <Icon name={icon} size={40} color="var(--text-muted)"/>
            <span>{text}</span>
        </div>
    );

    // ── Modal ────────────────────────────────────────────────────────────────
    const Modal = () => {
        const [vals, setVals] = useState({});
        const fields = FORM_FIELDS[modal.type]||[];
        const TITLES={goal:'Hedef',todo:'Görev',book:'Kitap',quote:'Söz',journal:'Günlük',principle:'Prensip',coaching:'Koçluk',vault:'Not',question:'Soru',routine:'Rutin'};
        return (
            <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setModal({open:false});}}>
                <div className="modal">
                    <div className="modal-head">
                        <h3 style={{fontFamily:'Syne',fontWeight:800,fontSize:16}}>{TITLES[modal.type]||modal.type} Ekle</h3>
                        <button className="btn btn-ghost btn-icon" onClick={()=>setModal({open:false})}><Icon name="x" size={16}/></button>
                    </div>
                    <div className="modal-body">
                        {fields.map(f=>{
                            if(f.type==='checkbox') return (
                                <label key={f.name} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',fontSize:14,color:'var(--text)'}}>
                                    <input type="checkbox" className="cb" checked={!!vals[f.name]} onChange={e=>setVals(p=>({...p,[f.name]:e.target.checked}))}/>
                                    {f.label}
                                </label>
                            );
                            if(f.type==='select') return (
                                <select key={f.name} className="input" value={vals[f.name]||f.options[0]} onChange={e=>setVals(p=>({...p,[f.name]:e.target.value}))}>
                                    {f.options.map(o=><option key={o}>{o}</option>)}
                                </select>
                            );
                            if(f.type==='textarea') return (
                                <textarea key={f.name} className="input" placeholder={f.placeholder} value={vals[f.name]||''} onChange={e=>setVals(p=>({...p,[f.name]:e.target.value}))} style={{height:100}}/>
                            );
                            return (
                                <input key={f.name} className="input" type={f.type||'text'} placeholder={f.placeholder} value={vals[f.name]||''} onChange={e=>setVals(p=>({...p,[f.name]:e.target.value}))}/>
                            );
                        })}
                    </div>
                    <div className="modal-foot">
                        <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal({open:false})}>İptal</button>
                        <button className="btn btn-primary" style={{flex:2}} onClick={()=>{const req=fields.filter(f=>f.required);const ok=req.every(f=>vals[f.name]&&String(vals[f.name]).trim());if(!ok){alert('Zorunlu alanları doldurun.');return;}submitModal(vals);}}>Kaydet</button>
                    </div>
                </div>
            </div>
        );
    };

    // ── Print modal ──────────────────────────────────────────────────────────
    const PrintModal = () => (
        <div className="modal-bg no-print" onClick={e=>{if(e.target===e.currentTarget)setPrint({item:null,template:1});}}>
            <div className="modal" style={{maxWidth:600}}>
                <div className="modal-head">
                    <h3 style={{fontFamily:'Syne',fontWeight:800,fontSize:16}}>Poster Baskısı</h3>
                    <div style={{display:'flex',gap:8}}>
                        <button className="btn btn-primary" style={{fontSize:12}} onClick={()=>window.print()}><Icon name="printer" size={14}/> Yazdır</button>
                        <button className="btn btn-ghost btn-icon" onClick={()=>setPrint({item:null,template:1})}><Icon name="x" size={16}/></button>
                    </div>
                </div>
                <div style={{padding:24}}>
                    <div style={{border:'2px solid var(--border)',borderRadius:16,aspectRatio:'1/1.414',display:'flex',alignItems:'center',justifyContent:'center',padding:40,textAlign:'center',background:'white',color:'#1a1c2e'}}>
                        <div>
                            <p style={{fontFamily:'Georgia,serif',fontStyle:'italic',fontSize:22,lineHeight:1.6,marginBottom:16}}>"{print.item?.text||print.item?.content}"</p>
                            {print.item?.author&&<p style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',color:'#6366f1'}}>— {print.item.author}</p>}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );

    return (
        <div className="app">
            {/* Sidebar */}
            <aside className="sidebar no-print">
                <div className="logo">
                    <div className="logo-icon"><Icon name="zap" size={18} color="white"/></div>
                    FocusUp
                </div>
                <nav style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
                    {NAV.map(n=>(
                        <button key={n.id} className={`nav-item${tab===n.id?' active':''}`} onClick={()=>setTab(n.id)}>
                            <span className="nav-icon"><Icon name={n.icon} size={16}/></span>
                            {n.label}
                            {n.badge&&<span className={`nav-badge nav-badge-pulse`}></span>}
                        </button>
                    ))}
                </nav>
                <div className="nav-sep"/>
                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    <button className="nav-item" onClick={()=>setTab('history')}>
                        <span className="nav-icon"><Icon name="activity" size={16}/></span>
                        Geçmiş & XP
                    </button>
                    <button className={`nav-item${history.length===0?' ':''}`} onClick={undo} disabled={history.length===0}>
                        <span className="nav-icon"><Icon name="undo" size={16}/></span>
                        Geri Al {history.length>0&&`(${history.length})`}
                    </button>
                    <button className="nav-item" onClick={()=>U.downloadJSON(data,'FocusUp_Backup_V2.json')}>
                        <span className="nav-icon"><Icon name="download" size={16}/></span>
                        Yedekle
                    </button>
                </div>
                <div style={{fontSize:9,color:'var(--text-muted)',textAlign:'center',paddingTop:12,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em'}}>{APP_VERSION}</div>
            </aside>

            {/* Main */}
            <div className="main">
                {/* Topbar */}
                <header className="topbar no-print">
                    <div style={{display:'flex',flexDirection:'column',gap:2}}>
                        <div style={{display:'flex',gap:8}}>
                            <span className="tag tag-brand">{U.quarter(now)} Çeyrek</span>
                            <span className="tag tag-muted">Hafta {U.isoWeek(now)}</span>
                        </div>
                        <div style={{fontSize:12,color:'var(--text-muted)',fontWeight:500}}>
                            {now.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})} • {now.toLocaleTimeString('tr-TR')}
                        </div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                        <div className="search-box">
                            <Icon name="search" size={14} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}/>
                            <input className="input" type="text" placeholder="Ara…" value={q} onChange={e=>setQ(e.target.value)} style={{paddingLeft:36,width:200,height:36,fontSize:13}}/>
                        </div>
                        <button className="btn btn-ghost btn-icon" onClick={()=>setIsDark(p=>!p)} title="Tema">
                            <Icon name={isDark?'sun':'moon'} size={16}/>
                        </button>
                        <button className="btn btn-ghost" style={{position:'relative'}} onClick={()=>setTab('history')}>
                            <Icon name="activity" size={16}/>
                            {data.logs?.length>0&&<span className="notif-dot"></span>}
                        </button>
                    </div>
                </header>

                {/* Content */}
                <main className="content no-print">
                    <div className="content-inner">
                        {renderContent()}
                    </div>
                </main>

                {/* Mobile nav */}
                <nav className="mobile-nav">
                    {['dashboard','goals','todos','routines','tools'].map(id=>{
                        const n=NAV.find(x=>x.id===id);
                        return n?(
                            <button key={id} onClick={()=>setTab(id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'6px 4px',background:'none',border:'none',cursor:'pointer',color:tab===id?'var(--brand)':'var(--text-muted)',borderRadius:12}}>
                                <Icon name={n.icon} size={20} color={tab===id?'var(--brand)':'var(--text-muted)'}/>
                                <span style={{fontSize:9,fontWeight:600,textTransform:'uppercase'}}>{n.label.split(' ')[0]}</span>
                            </button>
                        ):null;
                    })}
                </nav>
            </div>

            {/* Modals */}
            {modal.open&&<Modal/>}
            {print.item&&<PrintModal/>}

            {/* Print area */}
            {print.item&&(
                <div className="print-area">
                    <div style={{fontFamily:'Georgia,serif',fontStyle:'italic',textAlign:'center',color:'#1a1c2e'}}>
                        <h1 style={{fontSize:'42pt',marginBottom:24,lineHeight:1.3}}>"{print.item.text||print.item.content}"</h1>
                        {print.item.author&&<p style={{fontSize:'20pt',color:'#6366f1',letterSpacing:'0.2em',textTransform:'uppercase',fontWeight:700}}>— {print.item.author}</p>}
                    </div>
                </div>
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
