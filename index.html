<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusUp Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--s:#fff;--s2:#f0f0f2;--s3:#e5e5ea;
  --t:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --blue:#0071e3;--bl:rgba(0,113,227,.1);
  --green:#34c759;--gl:rgba(52,199,89,.1);
  --orange:#ff9500;--ol:rgba(255,149,0,.11);
  --red:#ff3b30;--rl:rgba(255,59,48,.1);
  --purple:#af52de;--pl:rgba(175,82,222,.1);
  --yellow:#ffcc00;--yl:rgba(255,204,0,.13);
  --sw:218px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
}
.dark{
  --bg:#000;--s:#1c1c1e;--s2:#2c2c2e;--s3:#3a3a3c;
  --t:#f5f5f7;--t2:#98989d;--t3:#636366;
  --blue:#0a84ff;--bl:rgba(10,132,255,.14);
  --green:#30d158;--gl:rgba(48,209,88,.12);
  --orange:#ff9f0a;--ol:rgba(255,159,10,.13);
  --red:#ff453a;--rl:rgba(255,69,58,.12);
  --purple:#bf5af2;--pl:rgba(191,90,242,.12);
  --yellow:#ffd60a;--yl:rgba(255,214,10,.12);
  --sh:0 2px 8px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:99px;}
::-webkit-scrollbar-track{background:transparent;}

/* Layout */
#shell{display:flex;height:100vh;}
#sidebar{width:var(--sw);background:var(--s);border-right:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;padding:16px 10px 12px;flex-shrink:0;overflow-y:auto;}
.dark #sidebar{border-right-color:rgba(255,255,255,.09);}
#body{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#topbar{height:50px;background:var(--s);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
.dark #topbar{border-bottom-color:rgba(255,255,255,.09);}
#page{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg);}
#pinner{max-width:1040px;margin:0 auto;}

/* Logo */
.logo{display:flex;align-items:center;gap:9px;padding:4px 6px 16px;}
.logo-mark{width:26px;height:26px;border-radius:7px;background:var(--t);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-weight:700;font-size:14px;letter-spacing:-.3px;}

/* Nav */
.nsec{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;padding:3px 6px 4px;margin-top:7px;}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 7px;border-radius:7px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);text-align:left;transition:background .12s,color .12s;font-family:inherit;}
.nb:hover{background:var(--s2);color:var(--t);}
.nb.active{background:var(--bl);color:var(--blue);font-weight:600;}
.ni{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.8;}
.nb.active .ni{opacity:1;}
.nb-new{background:var(--orange);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;margin-left:auto;}

/* Cards */
.card{background:var(--s);border-radius:14px;box-shadow:var(--sh);}
.cp{padding:16px 18px;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .12s;white-space:nowrap;font-family:inherit;}
.btn-p{background:var(--blue);color:#fff;}
.btn-p:hover{filter:brightness(1.1);}
.btn-p:active{transform:scale(.98);}
.btn-s{background:var(--s2);color:var(--t);border:1px solid rgba(0,0,0,.08);}
.btn-s:hover{background:var(--s3);}
.dark .btn-s{border-color:rgba(255,255,255,.09);}
.btn-g{background:none;color:var(--t2);}
.btn-g:hover{background:var(--s2);color:var(--t);}
.btn-sm{padding:4px 9px;font-size:11.5px;border-radius:6px;}
.btn-ic{width:30px;height:30px;padding:0;justify-content:center;border-radius:7px;}
.btn-green{background:var(--green);color:#fff;}
.btn-orange{background:var(--orange);color:#fff;}

/* Inputs */
.inp{background:var(--s2);border:1px solid rgba(0,0,0,.08);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--t);font-family:inherit;width:100%;outline:none;transition:border .12s,box-shadow .12s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bl);background:var(--s);}
.inp::placeholder{color:var(--t3);}
textarea.inp{resize:none;}
select.inp{cursor:pointer;}
.dark .inp{border-color:rgba(255,255,255,.09);}

/* Pills */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;}
.p-blue{background:var(--bl);color:var(--blue);}
.p-green{background:var(--gl);color:var(--green);}
.p-orange{background:var(--ol);color:var(--orange);}
.p-red{background:var(--rl);color:var(--red);}
.p-purple{background:var(--pl);color:var(--purple);}
.p-gray{background:var(--s2);color:var(--t2);}
.p-yellow{background:var(--yl);color:#7a6000;}
.dark .p-yellow{color:var(--yellow);}

/* Progress */
.bar{height:4px;background:var(--s2);border-radius:99px;overflow:hidden;}
.barf{height:100%;border-radius:99px;transition:width .6s ease;}

/* Checkbox */
.cb{appearance:none;-webkit-appearance:none;width:16px;height:16px;border-radius:5px;border:1.5px solid rgba(0,0,0,.2);cursor:pointer;transition:all .12s;position:relative;flex-shrink:0;background:transparent;vertical-align:middle;}
.dark .cb{border-color:rgba(255,255,255,.25);}
.cb:checked{background:var(--blue);border-color:var(--blue);}
.cb:checked::after{content:'';position:absolute;left:4px;top:1.5px;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);}

/* Modal */
.ov{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;}
.mbox{background:var(--s);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:480px;overflow:hidden;}
.mh{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.06);}
.dark .mh{border-bottom-color:rgba(255,255,255,.08);}
.mb{padding:14px 20px;display:flex;flex-direction:column;gap:9px;max-height:60vh;overflow-y:auto;}
.mf{padding:12px 20px;display:flex;gap:8px;border-top:1px solid rgba(0,0,0,.06);}
.dark .mf{border-top-color:rgba(255,255,255,.08);}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid rgba(0,0,0,.06);}
.dark .tbl th{border-bottom-color:rgba(255,255,255,.08);}
.tbl td{padding:11px 14px;border-bottom:1px solid rgba(0,0,0,.05);font-size:13px;}
.dark .tbl td{border-bottom-color:rgba(255,255,255,.06);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--s2);}

/* Section header */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sh-t{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.sh-sub{font-size:13px;color:var(--t2);margin-top:2px;}

/* Grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.gas{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:48px 20px;color:var(--t3);font-size:13px;text-align:center;}

/* Step row */
.srow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.dark .srow{border-bottom-color:rgba(255,255,255,.06);}
.srow:last-child{border-bottom:none;}

/* Routine row */
.rrow{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;transition:background .1s;}
.rrow:hover{background:var(--s2);}
.rrow.done{opacity:.35;pointer-events:none;}

/* Label */
.lbl{font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;}

/* Divider */
.div{height:1px;background:rgba(0,0,0,.07);margin:6px 2px;}
.dark .div{background:rgba(255,255,255,.08);}

/* Range */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:99px;background:var(--s2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid var(--s);box-shadow:0 1px 3px rgba(0,0,0,.2);}

/* Sound btn */
.snd{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.08);background:var(--s);cursor:pointer;text-align:left;transition:all .12s;width:100%;font-family:inherit;}
.dark .snd{border-color:rgba(255,255,255,.09);}
.snd:hover{border-color:var(--blue);}
.snd.on{background:var(--blue);border-color:var(--blue);color:#fff;}

/* KPI */
.kpi-n{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-top:6px;}
.kpi-l{font-size:11.5px;color:var(--t2);font-weight:500;margin-top:4px;}

/* Scratch */
.scratch{background:var(--yl);border:1.5px solid var(--yellow);border-radius:14px;padding:14px 16px;}

/* Star */
.star{cursor:pointer;font-size:14px;}

/* Print */
@media print{@page{size:A4;margin:0;}.no-print{display:none!important;}.for-print{display:flex!important;}}
.for-print{display:none;position:fixed;inset:0;background:#fff;z-index:9999;align-items:center;justify-content:center;padding:50mm;text-align:center;}

/* Mobile */
@media(max-width:768px){#sidebar{display:none;}#mob-nav{display:flex!important;}#page{padding:14px;}}
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid rgba(0,0,0,.08);padding:7px 4px 14px;z-index:40;}

/* Timer ring SVG */
#timer-ring{transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear;}

/* Fade */
.fade{animation:fin .2s ease;}
@keyframes fin{from{opacity:0}to{opacity:1}}

/* Book cat colors */
.bc0{background:#ff6b6b;}.bc1{background:#4ecdc4;}.bc2{background:#45b7d1;}.bc3{background:#96ceb4;}
.bc4{background:#ffeaa7;color:#555!important;}.bc5{background:#dda0dd;}.bc6{background:#98d8c8;}
.bc7{background:#f7dc6f;color:#555!important;}.bc8{background:#bb8fce;}.bc9{background:#85c1e9;}
</style>
</head>

<div id="shell">
  <aside id="sidebar" class="no-print">
    <div class="logo">
      <div class="logo-mark">

    <div class="div" style="margin-top:auto"></div>

  </aside>
  <div id="body">
    <header id="topbar" class="no-print">

      </div>
      <div style="display:flex;gap:7px;align-items:center">
        <div style="position:relative">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" style="position:absolute;left:9px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><path d="M21 21l-6-6"/></svg>
          <input id="search-inp" class="inp" type="text" placeholder="Ara..." style="padding-left:28px;width:150px;height:30px;font-size:12px">
        </div>
        <button id="dark-btn" class="btn btn-s btn-ic" title="Tema"></button>
        <button class="btn btn-s btn-ic" onclick="setTab('history')" title="Aktivite">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </button>
      </div>
    </header>
    <main id="page" class="no-print"><div id="pinner"></div></main>
    <nav id="mob-nav"></nav>
  </div>
</div>
<div id="modal-root"></div>
<div class="for-print" id="print-area"></div>

<script>
// ============================================================
// FocusUp Pro V4 — Pure Vanilla JS, Zero Dependencies
// ============================================================

// --- Utils ---
var U = {
  isoWeek: function(d) {
    var dt = new Date(d.getTime()); dt.setHours(0,0,0,0);
    dt.setDate(dt.getDate() + 3 - (dt.getDay() + 6) % 7);
    var w1 = new Date(dt.getFullYear(), 0, 4);
    return 1 + Math.round(((dt - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
  },
  quarter: function(d) { return 'Q' + Math.floor((d.getMonth() + 3) / 3); },
  fmt: function(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); },
  today: function() { return new Date().toISOString().split('T')[0]; },
  ts: function() { return new Date().toLocaleString('tr-TR'); },
  isActive: function(p, last) {
    if (!last) return true;
    var l = new Date(last), n = new Date();
    if (p === 'daily') return l.toDateString() !== n.toDateString();
    if (p === 'weekly') return (n - l) > 7 * 864e5;
    if (p === 'monthly') return l.getMonth() !== n.getMonth() || l.getFullYear() !== n.getFullYear();
    return true;
  },
  escape: function(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },
  dl: function(data, fn) {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
    a.download = fn; a.click();
  }
};

  ref: '<path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>',

function fil(list, keys) {

  return list.filter(function(i){ return keys.some(function(k){ return i[k]&&String(i[k]).toLowerCase().indexOf(lq)>=0; }); });
}

function submitForm(type) {
  var defs = FORM_DEFS[type]||[], vals = {};
  var ok = true;
  for(var i=0;i<defs.length;i++) {
    var parts=defs[i].split(':'),n=parts[0],tp=parts[2],req=parts[3]==='1';
    var el2=$('f_'+n); if(!el2)continue;
    vals[n] = tp==='cb'?el2.checked:el2.value;
    if(req&&!vals[n]){ok=false;}
  }
  if(!ok){alert('Zorunlu alanlari doldurun.');return;}
  snapshot();
  var id = Date.now();
  if(type==='routine') {
    var per=vals.period||'daily';
    D.routines[per] = (D.routines[per]||[]).concat([{id:id,t:vals.t,last:null}]);
    addLog('Rutin eklendi'); gainXP(10,'Rutin eklendi'); closeModal(); renderPage(); return;
  }
  var KM2={goal:'goals',todo:'todos',kpi:'kpis',quote:'quotes',journal:'journal',principle:'principles',coaching:'coaching',question:'questions',vault:'vault'};
  var item = Object.assign({id:id},vals);
  if(type==='goal'){item.frog=!!vals.frog;item.steps=[];}
  if(type==='todo')item.done=false;
  if(type==='kpi'){item.target=parseFloat(vals.target)||0;item.current=parseFloat(vals.current)||0;item.hist=[parseFloat(vals.current)||0];}
  if(type==='journal')item.date=U.today();
  D[KM2[type]] = [item].concat(D[KM2[type]]||[]);
  addLog(type+' eklendi'); gainXP(20,'Yeni '+type); closeModal(); renderPage();
}

function statCard(label, val, iname, color) {

function progressPill(pct) {
  var c = pct>=100?'var(--green)':pct>=70?'var(--orange)':'var(--red)';

function pct(cur,tgt) { return Math.min(100,Math.round((parseFloat(cur)||0)/(parseFloat(tgt)||1)*100)); }

// --- Timer ---
function startTimer() {
  if(timerInterval) clearInterval(timerInterval);
  timerOn = true;
  timerInterval = setInterval(function(){
    timerLeft--;
    if(timerLeft<=0){
      timerLeft=0;timerOn=false;clearInterval(timerInterval);timerInterval=null;
      if(timerMode==='focus'){gainXP(50,'Pomodoro tamamlandi');D.stats.focus=(D.stats.focus||0)+25;save();}
      try{new Audio(SOUNDS[4].url).play();}catch(e){}
    }
    renderTimer();
  },1000);
}
function stopTimer(){timerOn=false;if(timerInterval){clearInterval(timerInterval);timerInterval=null;}renderTimer();}
function resetTimer(){stopTimer();timerLeft=TDUR[timerMode];renderTimer();}
function setTimerMode(m){timerMode=m;timerLeft=TDUR[m];stopTimer();}

function renderTimer() {
  var el2 = $('timer-block'); if(!el2) return;
  var perc = timerLeft/TDUR[timerMode];
  var C = 2*Math.PI*50; var off = C*(1-perc);
  var strokeColor = timerMode==='focus'?'var(--blue)':'var(--green)';
  el2.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 16px">'
    +'<div style="display:flex;gap:4px">'
    +['focus','short','long'].map(function(m){return '<button class="btn btn-sm" style="background:'+(timerMode===m?'var(--blue)':'var(--s2)')+';color:'+(timerMode===m?'#fff':'var(--t2)')+'" onclick="setTimerMode(\''+m+'\');renderTimer()">'+(m==='focus'?'Odak':(m==='short'?'Kisa':'Uzun'))+'</button>';}).join('')
    +'</div>'
    +'<div style="position:relative;width:116px;height:116px">'
    +'<svg viewBox="0 0 108 108" style="position:absolute;inset:0;width:100%;height:100%">'
    +'<circle cx="54" cy="54" r="50" fill="none" stroke="var(--s2)" stroke-width="5"/>'
    +'<circle cx="54" cy="54" r="50" fill="none" stroke="'+strokeColor+'" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'" style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear"/>'
    +'</svg>'
    +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">'
    +'<span style="font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1">'+U.fmt(timerLeft)+'</span>'
    +'<span style="font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">'+(timerMode==='focus'?'Odak':'Mola')+'</span>'
    +'</div></div>'
    +'<div style="display:flex;gap:7px">'
    +(timerOn
      ? '<button class="btn btn-p" onclick="stopTimer()">'+ic('pause',12)+' Durdur</button>'
      : '<button class="btn btn-p" onclick="startTimer()">'+ic('play',12)+' Baslat</button>'
    )
    +'<button class="btn btn-s btn-ic" onclick="resetTimer()">'+ic('rst',13)+'</button>'
    +'</div></div>';
}

function activatePlan(planId) {
  var plan = RPLANS.find(function(p){return p.id===planId;}); if(!plan)return;
  if(!confirm(plan.name+' planini baslat?'))return;
  var today = new Date();
  var daysPerBook = Math.floor(90/plan.books.length);
  var planBooks = plan.books.map(function(bid,i){
    var lb = LIB.find(function(b){return b.id===bid;}); if(!lb)return null;
    var s = new Date(today); s.setDate(s.getDate()+i*daysPerBook);
    var e = new Date(s); e.setDate(e.getDate()+daysPerBook-2);
    return {libId:bid,title:lb.t,author:lb.a,start:s.toISOString().split('T')[0],end:e.toISOString().split('T')[0]};
  }).filter(Boolean);
  snapshot();
  D.readingPlan = {id:planId,name:plan.name,books:planBooks,startedAt:U.today()};
  addLog('Okuma plani basladi: '+plan.name); gainXP(30,'Okuma plani'); save(); renderPage();
}
window.activatePlan = activatePlan;

function delStep(goalId,stepId){snapshot();D.goals=D.goals.map(function(g){return g.id===goalId?Object.assign({},g,{steps:g.steps.filter(function(s){return s.id!==stepId;})}):g;});addLog('Adim silindi');save();renderPage();}

  var done=(D.challenges||[]).filter(function(c){return c.status==='done';});
  var html = '<div class="fade"><div class="sh"><div><h1 class="sh-t">90-Gun Mucadelesi</h1><p class="sh-sub">Sinirlarini as, XP kazan</p></div>'
    +'<button class="btn btn-p" onclick="openChallengePicker()">'+ic('plus',13)+' Mucadele Baslat</button></div>';
  if(active.length) {
    html += '<p class="lbl" style="margin-bottom:9px">Aktif ('+active.length+')</p><div class="ga">';
    active.forEach(function(ch){
      var cis=ch.checkins||[],today=U.today();
      var total=cis.length,p=Math.round(total/90*100);
      var elapsed=Math.max(0,Math.ceil((new Date()-new Date(ch.start))/864e5));
      var left=Math.max(0,Math.ceil((new Date(ch.end)-new Date())/864e5));
      var todayDone=cis.indexOf(today)>=0;
      var dc=DIFF[ch.diff]||DIFF.medium;
      var c=p>=100?'var(--green)':p>=70?'var(--orange)':'var(--red)';
      html += '<div class="card cp" style="display:flex;flex-direction:column;gap:12px">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between">'
        +'<div style="display:flex;gap:9px;align-items:center">'
        +'<div style="width:36px;height:36px;border-radius:9px;background:var(--bl);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic(ch.icon||'trophy',17,'var(--blue)')+'</div>'
        +'<div><p style="font-weight:700;font-size:13px">'+U.escape(ch.name)+'</p>'
        +'<div style="display:flex;gap:4px;margin-top:3px"><span class="pill '+dc.cls+'" style="font-size:9px">'+dc.l+'</span><span class="pill p-gray" style="font-size:9px">'+ch.cat+'</span></div></div></div>'
        +'<button class="btn btn-g btn-ic" style="width:26px;height:26px" onclick="del('+ch.id+',\'challenge\')">'+ic('trash',12,'var(--t3)')+'</button></div>'
        +'<p style="font-size:12px;color:var(--t2);line-height:1.5">'+U.escape(ch.desc)+'</p>'
        +'<div><div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px"><span style="color:var(--t2);font-weight:500">'+total+' / 90</span><span style="color:var(--blue);font-weight:700">'+p+'%</span></div>'
        +'<div class="bar"><div class="barf" style="width:'+p+'%;background:var(--blue)"></div></div></div>'
        +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px">';
      [{l:'Check-in',v:total,c:'var(--green)'},{l:'Gecen',v:elapsed+'g',c:'var(--blue)'},{l:'Kalan',v:left+'g',c:left<14?'var(--red)':'var(--orange)'}].forEach(function(s){
        html += '<div style="background:var(--s2);border-radius:7px;padding:7px 9px;text-align:center"><div style="font-weight:700;font-size:17px;letter-spacing:-.3px;color:'+s.c+'">'+s.v+'</div><div style="font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;margin-top:1px">'+s.l+'</div></div>';
      });
      html += '</div><div style="display:flex;gap:7px">';
      if(todayDone) html += '<button class="btn btn-green" style="flex:1;justify-content:center" disabled>'+ic('chk',13)+' Bugun Yapildi</button>';
      else html += '<button class="btn btn-p" style="flex:1;justify-content:center" onclick="doCheckin('+ch.id+')">'+ic('chk',13)+' Check-in Yap</button>';
      if(p>=100) html += '<button class="btn btn-orange" onclick="finishCh('+ch.id+')">'+ic('trophy',13)+' Bitir</button>';
      html += '</div></div>';
    });
    html += '</div>';
  }
  if(done.length) {
    html += '<p class="lbl" style="margin-top:16px;margin-bottom:9px">Tamamlanan ('+done.length+')</p><div class="gas">';
    done.forEach(function(ch){
      html += '<div class="card" style="padding:13px 15px;display:flex;gap:10px;align-items:center;opacity:.65">'
        +'<div style="width:32px;height:32px;border-radius:8px;background:var(--gl);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic('trophy',15,'var(--green)')+'</div>'
        +'<div style="flex:1"><p style="font-weight:600;font-size:13px">'+U.escape(ch.name)+'</p><p style="font-size:11px;color:var(--t2);margin-top:1px">+'+ch.xp+' XP</p></div>'
        +'<span class="pill p-green" style="font-size:10px">Bitti</span></div>';
    });
    html += '</div>';
  }
  if(!active.length&&!done.length) {
    html += '<div class="card" style="padding:48px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px">'
      +'<div style="width:52px;height:52px;border-radius:14px;background:var(--ol);display:flex;align-items:center;justify-content:center">'+ic('trophy',26,'var(--orange)')+'</div>'
      +'<p style="font-weight:700;font-size:16px">Hic mucadeleniz yok</p>'
      +'<p style="font-size:13px;color:var(--t2);max-width:260px;line-height:1.6">90 gunluk bir mucadele baslatin ve her gun check-in yaparak XP kazanin!</p>'
      +'<button class="btn btn-p" onclick="openChallengePicker()">'+ic('plus',13)+' Baslat</button></div>';
  }
  html += '</div>';
  show('pinner',html);
}
function doCheckin(id){snapshot();var today=U.today();D.challenges=(D.challenges||[]).map(function(c){if(c.id!==id||(c.checkins&&c.checkins.indexOf(today)>=0))return c;return Object.assign({},c,{checkins:(c.checkins||[]).concat([today])});});addLog('Check-in');gainXP(15,'Check-in');save();renderPage();}
function finishCh(id){var ch=(D.challenges||[]).find(function(c){return c.id===id;});if(!ch)return;snapshot();D.challenges=(D.challenges||[]).map(function(c){return c.id===id?Object.assign({},c,{status:'done'}):c;});addLog('Mucadele bitti');gainXP(ch.xp||300,'Mucadele: '+ch.name);save();renderPage();}
window.doCheckin=doCheckin;window.finishCh=finishCh;

var _selTpl=null;
function openChallengePicker(){_selTpl=null;_renderPicker();}
function _renderPicker(){
  var html;
  if(!_selTpl){
    html = '<div class="mh"><span style="font-weight:700;font-size:15px">90-Gun Mucadele Sec</span><button class="btn btn-g btn-ic" onclick="closeModal()">'+ic('x',14)+'</button></div>'
      +'<div class="mb" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    CH_TPLS.forEach(function(tpl){
      var dc=DIFF[tpl.diff]||DIFF.medium;
      html += '<button style="display:flex;gap:9px;padding:11px 12px;border-radius:9px;background:var(--s2);border:1px solid rgba(0,0,0,.07);cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:border .12s" onmouseenter="this.style.borderColor=\'var(--blue)\'" onmouseleave="this.style.borderColor=\'rgba(0,0,0,.07)\'" onclick="window._selTpl=CH_TPLS.find(function(t){return t.id===\''+tpl.id+'\'});_renderPicker()">'
        +'<div style="width:32px;height:32px;border-radius:8px;background:var(--bl);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic(tpl.icon,15,'var(--blue)')+'</div>'
        +'<div><p style="font-weight:600;font-size:12.5px;color:var(--t)">'+U.escape(tpl.name)+'</p>'
        +'<div style="display:flex;gap:4px;margin-top:3px"><span class="pill '+dc.cls+'" style="font-size:9px">'+dc.l+'</span><span style="font-size:10px;color:var(--t2);font-weight:500">+'+tpl.xp+' XP</span></div></div></button>';
    });
    html += '</div>';
  } else {
    var tpl=_selTpl,dc=DIFF[tpl.diff]||DIFF.medium;
    html = '<div class="mh"><span style="font-weight:700;font-size:15px">Mucadeleyi Onayla</span><button class="btn btn-g btn-ic" onclick="closeModal()">'+ic('x',14)+'</button></div>'
      +'<div class="mb">'
      +'<div style="background:var(--s2);border-radius:9px;padding:11px 13px;display:flex;gap:10px">'
      +'<div style="width:36px;height:36px;border-radius:9px;background:var(--bl);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic(tpl.icon,17,'var(--blue)')+'</div>'
      +'<div><p style="font-weight:700;font-size:13px">'+U.escape(tpl.name)+'</p><p style="font-size:11.5px;color:var(--t2);margin-top:2px;line-height:1.5">'+U.escape(tpl.desc)+'</p></div></div>'
      +(tpl.id==='custom'?'<input type="text" class="inp" id="ch_name" placeholder="Mucadele adi"><textarea class="inp" id="ch_desc" placeholder="Tanim" rows="2"></textarea>':'')
      +'<div style="background:var(--gl);border:1px solid rgba(52,199,89,.25);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--green);font-weight:500">Basarirsan +'+tpl.xp+' XP kazanacaksin!</div>'
      +'</div><div class="mf"><button class="btn btn-s" style="flex:1" onclick="window._selTpl=null;_renderPicker()">Geri</button>'
      +'<button class="btn btn-p" style="flex:2" onclick="confirmChallenge()">'+ic('play',12)+' Mucadeleyi Baslat!</button></div>';
  }
  showModal(html);
}
function confirmChallenge(){
  var tpl=_selTpl; if(!tpl)return;
  var cname=tpl.id==='custom'&&$('ch_name')?$('ch_name').value:'';
  var cdesc=tpl.id==='custom'&&$('ch_desc')?$('ch_desc').value:'';
  var s=new Date(),e=new Date(s);e.setDate(e.getDate()+90);
  snapshot();
  D.challenges=[{id:Date.now(),tplId:tpl.id,name:cname||tpl.name,desc:cdesc||tpl.desc,icon:tpl.icon,cat:tpl.cat,diff:tpl.diff,xp:tpl.xp,start:U.today(),end:e.toISOString().split('T')[0],checkins:[],status:'active'}].concat(D.challenges||[]);
  addLog('Mucadele basladi: '+(cname||tpl.name));gainXP(50,'Mucadele basladi');save();closeModal();renderPage();
}
window.openChallengePicker=openChallengePicker;window._renderPicker=_renderPicker;window.confirmChallenge=confirmChallenge;

function renderTools() {
  var html = '<div class="fade"><div class="sh"><h1 class="sh-t">Odaklanma Araclari</h1></div><div class="gas">';
  SOUNDS.forEach(function(s){
    var on=D.activeSound===s.url;
    html += '<button class="snd'+(on?' on':'')+'" onclick="toggleSound(\''+s.url+'\')">'
      +'<div style="width:36px;height:36px;border-radius:8px;background:'+(on?'rgba(255,255,255,.2)':'var(--bl)')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+ic(s.icon,17,on?'#fff':'var(--blue)')+'</div>'
      +'<div style="flex:1;text-align:left"><p style="font-weight:600;font-size:13px">'+s.name+'</p><p style="font-size:11px;margin-top:1px;opacity:.7">'+(on?'Caliniyor...':'Dinlemek icin tikla')+'</p></div></button>';
  });
  html += '</div><div class="card cp" style="margin-top:12px;display:flex;align-items:center;gap:12px">'+ic('vol',15,'var(--t2)')
    +'<input type="range" min="0" max="1" step=".05" value="'+D.vol+'" oninput="setVol(this.value)" style="flex:1">'
    +'<span id="vol-pct" style="font-size:12px;color:var(--t2);font-weight:500;min-width:30px;text-align:right">'+Math.round(D.vol*100)+'%</span></div></div>';
  show('pinner',html);
}
function toggleSound(url){if(audio&&D.activeSound===url){audio.pause();audio=null;D.activeSound=null;save();renderPage();}else{if(audio)audio.pause();try{audio=new Audio(url);audio.loop=true;audio.volume=D.vol;audio.play().catch(function(){});}catch(e){}D.activeSound=url;save();renderPage();}}
function setVol(v){D.vol=parseFloat(v);if(audio)audio.volume=D.vol;var e=$('vol-pct');if(e)e.textContent=Math.round(D.vol*100)+'%';save();}
window.toggleSound=toggleSound;window.setVol=setVol;

function renderGenericList(key, keyTitle, type, icon, searchKeys) {
  var list = fil(D[key]||[], searchKeys);
  var html = '<div class="fade"><div class="sh"><h1 class="sh-t">'+keyTitle+'</h1><button class="btn btn-p" onclick="openForm(\''+type+'\')">'+ic('plus',13)+' Ekle</button></div><div class="ga">';
  list.forEach(function(item){
    html += '<div class="card cp" style="display:flex;flex-direction:column;gap:9px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
      +'<span class="pill p-blue" style="font-size:10px">'+U.escape(item.cat||item.type||item.category||'')+'</span>'
      +'<div style="display:flex;gap:3px">'
      +'<button class="btn btn-g btn-ic" style="width:26px;height:26px" onclick="printItem('+item.id+',\''+key+'\')">'+ic('prn',12,'var(--t3)')+'</button>'
      +'<button class="btn btn-g btn-ic" style="width:26px;height:26px" onclick="del('+item.id+',\''+type+'\')">'+ic('trash',12,'var(--t3)')+'</button></div></div>'
      +(item.title?'<p style="font-weight:700;font-size:13.5px">'+U.escape(item.title)+'</p>':'')
      +'<p style="font-size:12.5px;color:var(--t2);line-height:1.6;font-style:italic;flex:1">&ldquo;'+U.escape(item.text||item.content||'')+'&rdquo;</p>'
      +(item.author?'<p style="font-size:11px;color:var(--t3);font-weight:500">&mdash; '+U.escape(item.author)+'</p>':'')
      +(item.date?'<p style="font-size:10.5px;color:var(--t3)">'+item.date+'</p>':'')
      +'</div>';
  });
  if(!list.length) html += '<div class="empty" style="grid-column:1/-1">'+ic(icon,32,'var(--t3)')+'<p>Henuz icerik yok</p></div>';
  html += '</div></div>';
  show('pinner',html);
}
function printItem(id,key){
  var list=D[key]||[];
  var item=list.find(function(i){return i.id===id;}); if(!item)return;
  var pa=$('print-area');
  pa.innerHTML='<div style="font-family:Georgia,serif;font-style:italic;text-align:center;color:#1d1d1f">'
    +'<h1 style="font-size:38pt;margin-bottom:20px;line-height:1.4">&ldquo;'+U.escape(item.text||item.title||'')+'&rdquo;</h1>'
    +(item.author?'<p style="font-size:15pt;color:#0071e3;text-transform:uppercase;letter-spacing:.18em;font-weight:700">&mdash; '+U.escape(item.author)+'</p>':'')
    +'</div>';
  pa.style.display='flex';
  window.print();
  setTimeout(function(){pa.style.display='none';},500);
}
window.printItem=printItem;

function renderHistory() {
  var logs=D.logs||[];
  var html='<div class="fade"><div class="sh"><h1 class="sh-t">Aktivite Gecmisi</h1><span class="pill p-gray">'+logs.length+' kayit</span></div>'
    +'<div class="card" style="padding:4px 16px;max-height:72vh;overflow-y:auto">';
  logs.forEach(function(lg,i){
    var isXP=lg.action.indexOf('XP')>=0;
    html+='<div style="display:flex;gap:11px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05)">'
      +'<div style="width:7px;height:7px;border-radius:50%;background:'+(isXP?'var(--green)':'var(--blue)')+';flex-shrink:0;margin-top:4px'+(isXP?';box-shadow:0 0 5px var(--green)':'')+'"></div>'
      +'<div><p style="font-size:10.5px;color:var(--t2);font-weight:500;margin-bottom:1px">'+lg.time+'</p><p style="font-size:13px;font-weight:500">'+U.escape(lg.action)+'</p></div></div>';
  });
  if(!logs.length) html+='<div class="empty">'+ic('act',28,'var(--t3)')+'<p>Henuz aktivite yok</p></div>';
  html+='</div></div>';
  show('pinner',html);
}

// --- Main renderer ---
function renderPage() {
  switch(currentTab){
    case 'dashboard': renderDashboard(); break;
    case 'kpi': renderKPI(); break;
    case 'library': renderLibrary(); break;
    case 'mybooks': renderMyBooks(); break;
    case 'readingplan': renderReadingPlan(); break;
    case 'goals': renderGoals(); break;
    case 'todos': renderTodos(); break;
    case 'routines': renderRoutines(); break;
    case 'challenges': renderChallenges(); break;
    case 'tools': renderTools(); break;
    case 'vault': renderGenericList('vault','Bilgi Kasasi','vault','arc',['title','text']); break;
    case 'quotes': renderGenericList('quotes','Ozlu Sozler','quote','qt',['text','author']); break;
    case 'journal': renderGenericList('journal','Gunluk','journal','pen',['text','cat']); break;
    case 'principles': renderGenericList('principles','Prensipler','principle','sh',['text','type']); break;
    case 'coaching': renderGenericList('coaching','Kocluk','coaching','us',['title','text']); break;
    case 'questions': renderGenericList('questions','Sorular','question','hlp',['text']); break;
    case 'history': renderHistory(); break;
    default: renderDashboard();
  }
  renderNav();
}

function render() { renderPage(); }

// --- Init ---
applyTheme();
renderNav();
renderPage();

$('dark-btn').addEventListener('click', function(){ toggleDark(); renderPage(); });
$('search-inp').addEventListener('input', function(e){ searchQ=e.target.value; renderPage(); });
</script>
