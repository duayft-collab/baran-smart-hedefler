<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FocusUp Pro V7</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--s:#fff;--s2:#f0f0f2;--s3:#e5e5ea;
  --t:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --blue:#0071e3;--bl:rgba(0,113,227,.1);
  --green:#34c759;--gl:rgba(52,199,89,.1);
  --orange:#ff9500;--ol:rgba(255,149,0,.11);
  --red:#ff3b30;--rl:rgba(255,59,48,.1);
  --purple:#af52de;--pl:rgba(175,82,222,.1);
  --yellow:#ffcc00;--yl:rgba(255,204,0,.13);
  --teal:#30b0c7;--tl:rgba(48,176,199,.12);
  --sw:218px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
}
.dark{
  --bg:#000;--s:#1c1c1e;--s2:#2c2c2e;--s3:#3a3a3c;
  --t:#f5f5f7;--t2:#98989d;--t3:#636366;
  --blue:#0a84ff;--green:#30d158;--orange:#ff9f0a;
  --red:#ff453a;--purple:#bf5af2;--yellow:#ffd60a;--teal:#5ac8fa;
  --bl:rgba(10,132,255,.15);--gl:rgba(48,209,88,.12);
  --ol:rgba(255,159,10,.13);--rl:rgba(255,69,58,.12);
  --pl:rgba(191,90,242,.13);--yl:rgba(255,214,10,.13);--tl:rgba(90,200,250,.12);
  --sh:0 2px 8px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:99px}
#shell{display:flex;height:100vh}
#sidebar{width:var(--sw);background:var(--s);border-right:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;padding:14px 8px 10px;flex-shrink:0;overflow-y:auto}
.dark #sidebar{border-right-color:rgba(255,255,255,.09)}
#body{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:50px;background:var(--s);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.dark #topbar{border-bottom-color:rgba(255,255,255,.09)}
#page{flex:1;overflow-y:auto;padding:22px 26px;background:var(--bg)}
#pinner{max-width:1060px;margin:0 auto}
#hamburger{display:none;width:34px;height:34px;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;color:var(--t);border-radius:8px;flex-shrink:0}
#hamburger:hover{background:var(--s2)}
#nav-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150}
@media(max-width:820px){
  #hamburger{display:flex}
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 46px rgba(0,0,0,.35);width:260px}
  #shell.nav-open #sidebar{transform:translateX(0)}
  #shell.nav-open #nav-scrim{display:block}
  #page{padding:16px 13px}
  #pinner{max-width:100%}
  #topbar{padding:0 12px}
  #topbar #top-cl{display:none}
  #srch{width:96px!important}
}
@media(max-width:480px){
  .g5{grid-template-columns:repeat(2,1fr)!important}
  #srch{width:70px!important}
}
.logo{display:flex;align-items:center;gap:8px;padding:4px 6px 14px}
.logo-mark{width:26px;height:26px;border-radius:7px;background:var(--t);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-weight:800;font-size:14px;letter-spacing:-.3px}
.logo-v{font-size:9px;font-weight:700;background:var(--orange);color:#fff;padding:1px 5px;border-radius:4px;margin-left:2px}
.nsec{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;padding:3px 6px 4px;margin-top:6px}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 7px;border-radius:7px;border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--t2);text-align:left;transition:background .12s,color .12s;font-family:inherit}
.nb:hover{background:var(--s2);color:var(--t)}
.nb.on{background:var(--bl);color:var(--blue);font-weight:600}
.ni{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card{background:var(--s);border-radius:14px;box-shadow:var(--sh)}
.cp{padding:16px 18px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .12s;white-space:nowrap;font-family:inherit;text-decoration:none}
.btn-p{background:var(--blue);color:#fff}
.btn-p:hover{filter:brightness(1.1)}
.btn-s{background:var(--s2);color:var(--t);border:1px solid rgba(0,0,0,.08)}
.btn-s:hover{background:var(--s3)}
.dark .btn-s{border-color:rgba(255,255,255,.09)}
.btn-g{background:none;color:var(--t2)}
.btn-g:hover{background:var(--s2);color:var(--t)}
.btn-sm{padding:4px 9px;font-size:11.5px;border-radius:6px}
.btn-ic{width:30px;height:30px;padding:0;justify-content:center;border-radius:7px}
.inp{background:var(--s2);border:1px solid rgba(0,0,0,.08);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--t);font-family:inherit;width:100%;outline:none;transition:border .12s,box-shadow .12s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bl);background:var(--s)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical}
select.inp{cursor:pointer}
.dark .inp{border-color:rgba(255,255,255,.09)}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.p-blue{background:var(--bl);color:var(--blue)}.p-green{background:var(--gl);color:var(--green)}
.p-orange{background:var(--ol);color:var(--orange)}.p-red{background:var(--rl);color:var(--red)}
.p-purple{background:var(--pl);color:var(--purple)}.p-gray{background:var(--s2);color:var(--t2)}
.p-yellow{background:var(--yl);color:#7a6000}.dark .p-yellow{color:var(--yellow)}
.bar{height:5px;background:var(--s2);border-radius:99px;overflow:hidden}
.barf{height:100%;border-radius:99px;transition:width .6s}
.cb{appearance:none;-webkit-appearance:none;width:16px;height:16px;border-radius:5px;border:1.5px solid rgba(0,0,0,.2);cursor:pointer;transition:all .12s;position:relative;flex-shrink:0;background:transparent}
.dark .cb{border-color:rgba(255,255,255,.25)}
.cb:checked{background:var(--blue);border-color:var(--blue)}
.cb:checked::after{content:'';position:absolute;left:4px;top:1.5px;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.ov{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:var(--s);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:500px;overflow:hidden;max-height:92vh;display:flex;flex-direction:column}
.mh{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0}
.dark .mh{border-bottom-color:rgba(255,255,255,.08)}
.mb{padding:14px 20px;display:flex;flex-direction:column;gap:9px;overflow-y:auto}
.mf{padding:12px 20px;display:flex;gap:8px;border-top:1px solid rgba(0,0,0,.06);flex-shrink:0}
.dark .mf{border-top-color:rgba(255,255,255,.08)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh-t{font-size:20px;font-weight:700;letter-spacing:-.3px}
.sh-sub{font-size:12.5px;color:var(--t2);margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.gas{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:52px 20px;color:var(--t3);font-size:13px;text-align:center}
.lbl{font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase}
.div{height:1px;background:rgba(0,0,0,.07);margin:6px 2px}
.dark .div{background:rgba(255,255,255,.08)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid rgba(0,0,0,.06)}
.dark .tbl th{border-bottom-color:rgba(255,255,255,.08)}
.tbl td{padding:11px 14px;border-bottom:1px solid rgba(0,0,0,.05);font-size:13px}
.dark .tbl td{border-bottom-color:rgba(255,255,255,.06)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--s2)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:99px;background:var(--s2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--blue);cursor:pointer}
.kn{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1;margin-top:6px}
.kl{font-size:11.5px;color:var(--t2);font-weight:500;margin-top:4px}
.scratch{background:var(--yl);border:1.5px solid var(--yellow);border-radius:14px;padding:14px 16px}
.fade{animation:fin .2s ease}@keyframes fin{from{opacity:0}to{opacity:1}}
.dw-ov{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.dw-ov.show{display:flex}
.bc0{background:#ff6b6b}.bc1{background:#4ecdc4}.bc2{background:#45b7d1}.bc3{background:#96ceb4}
.bc4{background:#ffeaa7}.bc5{background:#dda0dd}.bc6{background:#98d8c8}
.bc7{background:#f7dc6f}.bc8{background:#bb8fce}.bc9{background:#85c1e9}
.snd-btn{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.08);background:var(--s);cursor:pointer;text-align:left;transition:all .12s;width:100%;font-family:inherit;font-size:13px;color:var(--t)}
.dark .snd-btn{border-color:rgba(255,255,255,.09)}
.snd-btn:hover{border-color:var(--blue)}
.snd-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
@media print{.no-print{display:none!important}}

.lang-sw{display:flex;gap:3px;padding:3px;background:var(--s2);border-radius:8px;margin:4px 14px 8px}
.lang-sw button{flex:1;padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:var(--t3);transition:all .15s}
.lang-sw button.on{background:var(--s);color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}

</style>
</head>
<body>
<div id="shell">
  <div id="nav-scrim" onclick="toggleNav()"></div>
  <aside id="sidebar" class="no-print">
    <div class="logo">
      <div class="logo-mark"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <span class="logo-name">FocusUp</span><span class="logo-v">V7</span>
    </div>
    <div class="lang-sw">
      <button data-lang="tr" class="on" onclick="setLang('tr')">🇹🇷 Türkçe</button>
      <button data-lang="en" onclick="setLang('en')">🇬🇧 English</button>
    </div>
    <div id="nav-root"></div>
    <div style="flex:1"></div>
    <div id="nav-bot"></div>
    <p style="font-size:9px;color:var(--t3);text-align:center;padding-top:8px">FocusUp Pro V7 &mdash; 2026</p>
  </aside>
  <div id="body">
    <header id="topbar" class="no-print">
      <div style="display:flex;gap:7px;align-items:center">
        <button id="hamburger" type="button" onclick="toggleNav()" aria-label="Menü"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <span id="top-q" class="pill p-blue" style="font-size:10.5px"></span>
        <span id="top-w" class="pill p-gray" style="font-size:10.5px"></span>
        <span id="top-cl" style="font-size:11px;color:var(--t2)"></span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <div style="position:relative">
          <input id="srch" class="inp" type="text" placeholder="Ara..." style="padding-left:26px;width:140px;height:30px;font-size:12px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" style="position:absolute;left:8px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><path d="M21 21l-6-6"/></svg>
        </div>
        <button id="google-auth-btn" class="btn btn-s" type="button" title="Google hesabına bağlan" style="height:30px;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Google ile bağla</button>
        <button id="theme-btn" class="btn btn-s btn-ic"></button>
      </div>
    </header>
    <main id="page" class="no-print"><div id="pinner"></div></main>
  </div>
</div>
<div id="modal-root"></div>
<div class="dw-ov" id="dw-ov">
  <p style="color:#fff;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:12px">Derin Çalışma</p>
  <h2 id="dw-title" style="color:#fff;font-size:22px;font-weight:700;margin-bottom:20px"></h2>
  <div id="dw-time" style="font-size:80px;font-weight:800;letter-spacing:-4px;color:#fff;line-height:1;margin-bottom:28px;font-variant-numeric:tabular-nums">00:00</div>
  <div style="display:flex;gap:10px">
    <button id="dw-btn" onclick="dwToggle()" style="padding:10px 24px;border-radius:10px;border:none;background:#fff;color:#000;font-weight:700;font-size:14px;cursor:pointer">Baslat</button>
    <button onclick="exitDW()" style="padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,.3);background:none;color:#fff;font-size:13px;cursor:pointer">Çıkış (Esc)</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-auth-compat.js"></script>

window.setLang = setLang;

// ─── Quote helpers ───────────────────────────────────────────────────────────
function rndQuote(cat){
  var pool = cat ? D.quotes.filter(function(q){return q.cat===cat;}) : D.quotes;
  if(!pool.length) pool = D.quotes;
  return pool.length ? pool[Math.floor(Math.random()*pool.length)] : null;
}
function quoteWidget(cat, accent){
  var q = rndQuote(cat);
  if(!q) return '';
  var ac = accent || 'var(--blue)';
  return '<div style="padding:14px 18px;border-radius:12px;background:var(--s2);border-left:3px solid '+ac+';margin-bottom:16px">'
    + '<p style="font-size:13px;font-style:italic;line-height:1.7;color:var(--t)">&ldquo;'+U.esc(q.text)+'&rdquo;</p>'
    + (q.author ? '<p style="font-size:11px;font-weight:700;color:'+ac+';margin-top:6px">&mdash; '+U.esc(q.author)+'</p>' : '')
    + '<p style="font-size:10px;color:var(--t3);margin-top:3px">'+U.esc(q.cat)+'</p></div>';
}

    if(p==='weekly')return(n-l)>7*864e5;

    return true;
  },

/* ══════════════════════════════════════════════════════════════════════════
   D5 — RESTORE LOCK DURUM MAKINESI
   Geri yukleme sirasinda tum mutasyon yollarini bloke eder. Kilit yalniz
   bellektedir; localStorage'a kalici kilit yazilmaz (sekme cokerse kilit kalmaz).
   Bu turda GERCEK restore YOK; yalniz altyapi ve kilit.
   ══════════════════════════════════════════════════════════════════════════ */
var RESTORE_WATCHDOG_MS=60000;
var RESTORE_STATES=['IDLE','PREPARING','VERIFYING','PREVIEW','AWAITING_CONFIRM',
  'SAFEGUARDING','COMMITTING','FINALIZING','FAILED'];
// Gecis matrisi tek yerde. FAILED her aktif asamadan failRestoreSession ile erisilir.
var RESTORE_TRANSITIONS={
  IDLE:['PREPARING'],
  PREPARING:['VERIFYING','FAILED','IDLE'],
  VERIFYING:['PREVIEW','FAILED','IDLE'],
  PREVIEW:['AWAITING_CONFIRM','FAILED','IDLE'],
  AWAITING_CONFIRM:['SAFEGUARDING','FAILED','IDLE'], // kullanici iptal -> IDLE
  SAFEGUARDING:['COMMITTING','FAILED'],
  COMMITTING:['FINALIZING','FAILED'],
  FINALIZING:['IDLE','FAILED'],
  FAILED:['IDLE']
};
// Asama basi watchdog. AWAITING_CONFIRM kullanici karari bekler -> watchdog kapali.
// COMMITTING gercek transaction; Firestore 270s ustunde tutulur, korlemesine kesilmez.
var RESTORE_WATCHDOG={PREPARING:RESTORE_WATCHDOG_MS,VERIFYING:RESTORE_WATCHDOG_MS,
  PREVIEW:RESTORE_WATCHDOG_MS,AWAITING_CONFIRM:0,SAFEGUARDING:RESTORE_WATCHDOG_MS,
  COMMITTING:300000,FINALIZING:RESTORE_WATCHDOG_MS};
var RESTORE_TEXT={PREPARING:'Geri yükleme hazırlanıyor',VERIFYING:'Yedek doğrulanıyor',
  PREVIEW:'Geri yükleme önizlemesi hazırlanıyor',AWAITING_CONFIRM:'Onay bekleniyor',
  SAFEGUARDING:'Güvenlik yedeği alınıyor',COMMITTING:'Geri yükleme uygulanıyor',
  FINALIZING:'Son kontroller yapılıyor',FAILED:'Geri yükleme başarısız',IDLE:null};

var RESTORE={state:'IDLE',startedAt:0,stageStartedAt:0,lastError:null,watchdogTimer:null,
  operationId:null,context:null,deferredRemoteSnapshot:null,commitUncertain:false,lastResult:null};

var _restoreBadgeState=null;
function restoreBadge(state){
  if(_restoreBadgeState===state)return;     // ayni state icin tekrar basma
  _restoreBadgeState=state;
  var t=RESTORE_TEXT[state];
  if(t)cloudBadge(t,'restore');
  else if(state==='IDLE')setSync(navigator.onLine?'ok':'offline'); // normale don
}
function getRestoreState(){return RESTORE.state;}
function isRestoreLocked(){return RESTORE.state!=='IDLE';}
function canTransitionRestore(from,to){
  if(RESTORE_STATES.indexOf(to)<0)return false;
  return (RESTORE_TRANSITIONS[from]||[]).indexOf(to)>=0;
}
function transitionRestore(next,context){
  if(RESTORE_STATES.indexOf(next)<0)throw new Error('Bilinmeyen restore durumu: '+next);
  var cur=RESTORE.state;
  if(next===cur)return false;               // gereksiz tekrar gecis
  if(!canTransitionRestore(cur,next))throw new Error('Geçersiz restore geçişi: '+cur+' -> '+next);
  RESTORE.state=next;
  RESTORE.stageStartedAt=Date.now();
  if(context!==undefined)RESTORE.context=context;
  restoreBadge(next);
  if(next==='IDLE'||next==='FAILED')stopRestoreWatchdog();
  else startRestoreWatchdog();
  console.log('[RESTORE] '+cur+' -> '+next);
  return true;
}
function beginRestoreSession(context){
  if(RESTORE.state!=='IDLE')throw new Error('Zaten bir geri yükleme oturumu var: '+RESTORE.state);
  RESTORE.operationId=newMutationId();
  RESTORE.startedAt=Date.now();
  RESTORE.lastError=null;RESTORE.commitUncertain=false;RESTORE.lastResult=null;
  RESTORE.deferredRemoteSnapshot=null;
  transitionRestore('PREPARING',context||null);
  console.log('[RESTORE] Oturum başladı:',RESTORE.operationId);
  return RESTORE.operationId;
}
function failRestoreSession(error){
  RESTORE.lastError=error||new Error('Bilinmeyen geri yükleme hatası');
  if(RESTORE.state!=='FAILED'&&RESTORE.state!=='IDLE'){
    RESTORE.state='FAILED';RESTORE.stageStartedAt=Date.now();
    stopRestoreWatchdog();restoreBadge('FAILED');
    console.error('[RESTORE] Başarısız:',RESTORE.lastError.message);
  }
  return RESTORE.state;
}
function finishRestoreSession(result){
  RESTORE.lastResult=result||'success';
  if(result==='uncertain')RESTORE.commitUncertain=true; // kor basari deme
  console.log('[RESTORE] Oturum sonucu:',RESTORE.lastResult);
  resetRestoreSession();
  return RESTORE.lastResult;
}
function resetRestoreSession(){
  stopRestoreWatchdog();
  RESTORE.state='IDLE';RESTORE.stageStartedAt=Date.now();
  RESTORE.operationId=null;RESTORE.context=null;RESTORE.deferredRemoteSnapshot=null;
  restoreBadge('IDLE');
}
function startRestoreWatchdog(){
  stopRestoreWatchdog();
  var ms=RESTORE_WATCHDOG[RESTORE.state];
  if(!ms)return;                            // IDLE / AWAITING_CONFIRM / FAILED -> watchdog yok
  var opId=RESTORE.operationId;
  RESTORE.watchdogTimer=setTimeout(function(){
    if(opId!==RESTORE.operationId)return;    // eski timer yeni oturumu etkilemez
    console.warn('[RESTORE] Watchdog: '+RESTORE.state+' zaman aşımı');
    if(RESTORE.state==='COMMITTING'){
      // gercek transaction devam ediyor olabilir; korlemesine IDLE yapma
      RESTORE.commitUncertain=true;
      RESTORE.lastError=new Error('Commit zaman aşımı; sonuç belirsiz');
    }else{
      failRestoreSession(new Error(RESTORE.state+' aşamasında zaman aşımı'));
    }
  },ms);
}
function stopRestoreWatchdog(){
  if(RESTORE.watchdogTimer){clearTimeout(RESTORE.watchdogTimer);RESTORE.watchdogTimer=null;}
}
var _restoreWarnAt=0;
function assertRestoreIdle(actionName){
  if(RESTORE.state==='IDLE')return true;
  var now=Date.now();
  if(now-_restoreWarnAt>2000){              // ayni olay icin tekrar toast basma
    _restoreWarnAt=now;
    cloudBadge('Geri yükleme devam ediyor','restore');
    console.warn('[RESTORE] Engellendi ('+RESTORE.state+'):',actionName);
  }
  return false;
}
function withRestoreLock(stage,fn){
  return Promise.resolve().then(function(){
    if(!canTransitionRestore(RESTORE.state,stage))
      throw new Error('withRestoreLock geçersiz aşama: '+RESTORE.state+' -> '+stage);
    transitionRestore(stage);
    return fn();
  }).then(function(res){return {status:'success',result:res};})
    .catch(function(e){failRestoreSession(e);return {status:'failed',error:e};});
}

/* Uzak payload'dan yerel state uretir. Saf: D'ye dokunmaz.
   Karsilastirmada da kullanilir; boylece INIT ile birlesmeden dogan alan farki
   sahte tutarsizlik uretmez. */
function buildStateFromPayload(payload){
  return Object.assign({},INIT,payload||{}, {
    routines:Object.assign({},INIT.routines,(payload&&payload.routines)||{}),
    stats:Object.assign({},INIT.stats,(payload&&payload.stats)||{}),
    compat:Object.assign({},INIT.compat,(payload&&payload.compat)||{})
  });
}
function mergeRemotePayload(payload){D=buildStateFromPayload(payload);}
/* Uzak payload ile mevcut yerel state ayni mi? Anahtar sirasina duyarli
   JSON.stringify kullanilmaz. Her iki taraf da bir kez serilestirlir. */
function samePayloadAsLocal(payload){
  try{return canonicalStringify(buildStateFromPayload(payload))===canonicalStringify(D);}
  catch(e){console.warn('[SYNC] Payload karşılaştırılamadı',e);return false;}
}
function stateRef(uid){return CLOUD.db.collection('users').doc(uid).collection('app').doc('state');}
/* ── Pending mutation ──────────────────────────────────────────────────────
   CLOUD.revision YALNIZ dogrulanmis sunucu revision'ini temsil eder.
   Yerel kayitta asla erken artirilmaz; yalniz basarili commit sonrasi guncellenir. */
function newPendingMutation(){
  var now=Date.now();
  return {id:newMutationId(),expectedRevision:CLOUD.revision||0,
    payload:JSON.parse(JSON.stringify(D)),createdAt:now,updatedAt:now};
}
function savePending(){
  try{
    if(CLOUD.pendingMutation)localStorage.setItem('fu7_pending_mutation',JSON.stringify(CLOUD.pendingMutation));
    else localStorage.removeItem('fu7_pending_mutation');
  }catch(e){console.warn('[SYNC] Bekleyen değişiklik saklanamadı',e);}
}
function loadPending(){
  try{
    var s=localStorage.getItem('fu7_pending_mutation');
    if(!s)return null;
    var m=JSON.parse(s);
    if(!m||!m.id||typeof m.expectedRevision!=='number'||!m.payload)return null;
    return m;
  }catch(e){return null;}
}

/* Transaction. Callback SAF olmalidir: DOM/render/localStorage/yeni id YOK.
   Firestore contention'da callback'i tekrar calistirabilir. */
function commitMutation(m){
  var ref=stateRef(CLOUD.uid),uid=CLOUD.uid,dev=deviceId();
  return CLOUD.db.runTransaction(function(t){
    return t.get(ref).then(function(doc){
      var d=doc.exists?(doc.data()||{}):null;
      var serverRev=d?Number(d.revision||0):0;
      // Ayni mutation zaten yazilmis: tekrar yazma, basarili say
      if(d&&d.lastMutationId&&d.lastMutationId===m.id)return {status:'duplicate',revision:serverRev};
      // schemaVersion 2 belgesinde revision yok -> 0 kabul edilir, geriye uyumlu
      if(serverRev!==m.expectedRevision)return {status:'conflict',serverData:d,serverRevision:serverRev};
      t.set(ref,{
        payload:m.payload,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        revision:serverRev+1,
        updatedByUid:uid,
        updatedByDeviceId:dev,
        lastMutationId:m.id,
        schemaVersion:SCHEMA_VERSION,
        clientUpdatedAt:m.createdAt // debug amacli
      },{merge:true});
      return {status:'ok',revision:serverRev+1};
    });
  });
}
function scheduleRetry(ms){
  clearTimeout(CLOUD.retryTimer);
  CLOUD.retryTimer=setTimeout(flushPending,ms||8000);
}
function flushPending(){
  if(RESTORE.state!=='IDLE')return;         // restore kilidi: transaction/retry yok
  if(CLOUD.flushing||!CLOUD.pendingMutation)return;
  if(!CLOUD.ready||!CLOUD.db||!CLOUD.uid)return;
  if(CLOUD.conflict){setSync('conflict');return;}
  if(!navigator.onLine){setSync('offline');scheduleRetry();return;} // offline'da transaction zorlanmaz
  CLOUD.flushing=true;
  var m=CLOUD.pendingMutation;
  commitMutation(m).then(function(res){
    CLOUD.flushing=false;
    if(res.status==='conflict'){
      console.warn('[SYNC] Çakışma: sunucu revision',res.serverRevision,'beklenen',m.expectedRevision);
      enterConflict(res.serverData,m);
      return;
    }
    CLOUD.revision=Number(res.revision||0);
    localStorage.setItem('fu7_rev',String(CLOUD.revision));
    // Commit sirasinda yeni kullanici degisikligi geldiyse pending'i silme
    if(CLOUD.pendingMutation&&CLOUD.pendingMutation.id===m.id){CLOUD.pendingMutation=null;savePending();}
    else savePending();
    console.log('[SYNC] Commit '+res.status+'. revision:',CLOUD.revision);
    setSync('ok');
    if(CLOUD.pendingMutation)flushPending(); // birikmis yeni degisiklik varsa devam et
  }).catch(function(e){
    CLOUD.flushing=false;CLOUD.lastError=e;
    console.error('[FIRESTORE] Transaction hatası',e);
    setSync(navigator.onLine?'error':'offline');
    scheduleRetry();
  });
}
function queueCloudSave(bypassLock){
  if(RESTORE.state!=='IDLE'&&!bypassLock)return; // restore kilidi: yeni pending/yazma yok
  if(!CLOUD.ready||!CLOUD.db||!CLOUD.uid)return;
  if(CLOUD.applyingRemote)return;         // uzak veri uygulanirken geri yazma yok
  // Pending payload HER durumda tazelenir. Cakismada yalniz BULUT YAZMASI bloke edilir;
  // boylece cakisma acikken yapilan degisiklik pending'e islenir ve kaybolmaz.
  if(CLOUD.pendingMutation){
    CLOUD.pendingMutation.payload=JSON.parse(JSON.stringify(D)); // derin kopya, D ile paylasimsiz
    // Payload degisti -> bu artik yeni bir mantiksal mutation. Ayni id ile gonderilirse
    // sunucudaki lastMutationId eslesmesi yeni veriyi yanlislikla duplicate sayabilir.
    CLOUD.pendingMutation.id=newMutationId();
    CLOUD.pendingMutation.updatedAt=Date.now();
  }else{
    CLOUD.pendingMutation=newPendingMutation();
  }
  savePending();
  if(CLOUD.conflict){                     // cakisma cozulmeden buluta yazilmaz
    CLOUD.conflict.mutation=CLOUD.pendingMutation;
    setSync('conflict');
    return;
  }
  clearTimeout(CLOUD.timer);
  setSync('saving');
  CLOUD.timer=setTimeout(flushPending,500);
}
function save(opts){
  opts=opts||{};
  // Restore kilidi. Bypass yalniz dogrulanmis dahili restore cagrisi icin (operationId eslesmeli).
  // Kullanici aksiyonlari save()'i argumansiz cagirir; bypass edemez.
  var bypass=opts.source==='restore'&&opts.bypassRestoreLock===true&&
    RESTORE.operationId&&opts.operationId===RESTORE.operationId;
  if(RESTORE.state!=='IDLE'&&!bypass){assertRestoreIdle('save');return;}
  writeLocal(Date.now());
  queueCloudSave(bypass);
}

function stopDocListener(){
  if(CLOUD.unsubDoc){
    console.log('[SYNC] Listener kapatıldı:',CLOUD.listenerUid);
    CLOUD.unsubDoc();
  }
  CLOUD.unsubDoc=null;CLOUD.listenerUid=null;
}
function startDocListener(uid){
  if(CLOUD.listenerUid===uid&&CLOUD.unsubDoc)return; // tekrar kurulum yok
  stopDocListener();
  CLOUD.listenerUid=uid;
  console.log('[SYNC] Listener kuruldu:',uid);
  CLOUD.unsubDoc=stateRef(uid).onSnapshot({includeMetadataChanges:true},onRemoteSnapshot,function(e){
    CLOUD.lastError=e;
    console.error('[SYNC] Listener hatası',e);
    setSync('error');
  });
}
function onRemoteSnapshot(snap){
  var md=snap.metadata;
  if(md.hasPendingWrites)return;            // kendi yazmamiz, sunucuya ulasmadi
  if(md.fromCache){setSync('offline');return;} // sunucu dogrulamasi yok
  if(RESTORE.state!=='IDLE'){
    // Restore kilidi: uzak veri uygulanmaz, revision degismez, render tetiklenmez.
    // Yalniz en son sunucu-dogrulanmis payload tamponlanir (D6 karar verir).
    if(snap.exists){var d0=snap.data()||{};
      if(d0.payload)RESTORE.deferredRemoteSnapshot={
        payload:JSON.parse(JSON.stringify(d0.payload)),revision:Number(d0.revision||0),at:Date.now()};}
    return;
  }
  if(!snap.exists){setSync('ok');return;}
  var data=snap.data()||{};
  if(!data.payload){setSync('ok');return;}
  var remoteRev=Number(data.revision||0);
  if(data.updatedByDeviceId===deviceId()){  // kendi yazmamizin sunucu yankisi
    CLOUD.revision=Math.max(CLOUD.revision||0,remoteRev);
    localStorage.setItem('fu7_rev',String(CLOUD.revision));
    setSync('ok');return;
  }
  if(remoteRev<=(CLOUD.revision||0)){setSync('ok');return;} // eski/ilk snapshot yereli ezmez
  if(CLOUD.conflict)return;                 // kullanici karar veriyor, uzerine yazma
  // Bekleyen yerel degisiklik varken uzak veri KORLEMESINE uygulanmaz
  if(CLOUD.pendingMutation){enterConflict(data,CLOUD.pendingMutation);return;}
  applyRemoteState(data);
}

function enterConflict(serverData,m){
  CLOUD.conflict={serverData:serverData||null,mutation:m};

function conflictLoadRemote(){
  if(!assertRestoreIdle('conflictLoadRemote'))return; // restore kilidi

  if(!srv||!srv.payload){console.warn('[SYNC] Sunucu sürümü okunamadı');return;}
  // Ezmeden once yerel state'in guvenli kopyasi
  try{localStorage.setItem('fu7_conflict_backup',JSON.stringify({at:Date.now(),payload:D}));}catch(e){}
  CLOUD.applyingRemote=true;
  try{
    mergeRemotePayload(srv.payload);
    CLOUD.revision=Number(srv.revision||0);

    writeLocal(Date.now());

  }catch(e){
    CLOUD.lastError=e;console.error('[SYNC] Sunucu sürümü uygulanamadı',e);setSync('error');
  }finally{CLOUD.applyingRemote=false;}

function conflictKeepLocal(){
  if(!assertRestoreIdle('conflictKeepLocal'))return; // restore kilidi
  if(!CLOUD.conflict)return;
  var srv=CLOUD.conflict.serverData,m=CLOUD.conflict.mutation;
  // Yeni sunucu revision'i baz alinarak yeniden dene. Payload en guncel yerel state'tir;
  // icerik degistigi icin yeni mutationId uretilir (duplicate yanlis eslesmesini onler).
  m.expectedRevision=srv?Number(srv.revision||0):0;

  CLOUD.conflict=null;hideConflictUI();
  console.log('[SYNC] Yerel değişiklik yeniden deneniyor. expectedRevision:',m.expectedRevision);

/* Acilis uzlasmasi. Otorite sirasi: revision > eski belgelerde clientUpdatedAt > yerel. */
async function bootstrapUser(user){
  CLOUD.ready=false;
  CLOUD.revision=localRevision();
  CLOUD.pendingMutation=loadPending(); // sayfa yenilemesinde korunan bekleyen degisiklik
  var ref=stateRef(user.uid);
  var snap=await ref.get();
  var remote=snap.exists?snap.data():null;
  var remoteRev=remote?Number(remote.revision||0):0;

  // Bekleyen degisiklik varsa yerel state onun payload'idir; buluta korlemesine devretme.
  if(CLOUD.pendingMutation&&remote&&remote.payload){
    CLOUD.ready=true;
    if(remoteRev===CLOUD.pendingMutation.expectedRevision){
      CLOUD.revision=remoteRev;
      console.log('[SYNC] Bekleyen değişiklik geri yüklendi, gönderiliyor.');
      if(!user.isAnonymous)startDocListener(user.uid);
      flushPending();
      return;
    }
    CLOUD.revision=remoteRev;
    if(!user.isAnonymous)startDocListener(user.uid);
    enterConflict(remote,CLOUD.pendingMutation); // sunucu ilerlemis
    return;
  }

  if(remote&&remote.payload){
    /* Karar matrisi:
       B  remoteRev > localRev            -> uzak otorite, uygula, YAZMA YOK
       D  remoteRev === localRev, ayni    -> HICBIR YAZMA, yalniz listener
       E  remoteRev === localRev, farkli  -> veri tutarsizligi, sessiz ezme YOK
       C  remoteRev < localRev            -> yerel gercekten yeni, transaction */
    var takeRemote,equalRev=false;
    if(remoteRev>0){
      takeRemote=remoteRev>CLOUD.revision;
      equalRev=remoteRev===CLOUD.revision;
    }else{
      // schemaVersion 2 belgesi: revision yok, eski davranisa geri dus
      takeRemote=Number(remote.clientUpdatedAt||0)>localStamp();
    }
    if(CLOUD.revision===0&&localStamp()===0){takeRemote=true;equalRev=false;} // bos cihaz dolu bulutu ezmez
    if(takeRemote){
      CLOUD.applyingRemote=true;
      try{
        mergeRemotePayload(remote.payload);
        CLOUD.revision=remoteRev;
        writeLocal(Date.now());
        render();
      }finally{CLOUD.applyingRemote=false;}
      console.log('[SYNC] Açılışta bulut verisi alındı. revision:',CLOUD.revision);
    }else if(equalRev){
      CLOUD.revision=remoteRev;
      CLOUD.ready=true;
      if(samePayloadAsLocal(remote.payload)){
        // D: sunucu ve yerel ayni. Yazma yok, revision artmaz, mutationId uretilmez.
        if(!user.isAnonymous)startDocListener(user.uid);
        else console.log('[SYNC] Anonim oturum, gerçek zamanlı listener kurulmadı');
        console.log('[SYNC] Açılışta yerel ve bulut aynı. revision:',CLOUD.revision);
        setSync(navigator.onLine?'ok':'offline');
        return;
      }
      // E: ayni revision farkli icerik -> hangisinin dogru oldugu bilinemez
      console.warn('[SYNC] Aynı revision, farklı içerik. Kullanıcı kararı isteniyor.');
      if(!user.isAnonymous)startDocListener(user.uid);
      enterConflict(remote,newPendingMutation());
      return;
    }else{
      // C: yerel daha yeni, transaction ile yukselt
      CLOUD.revision=remoteRev;
      CLOUD.ready=true;
      CLOUD.pendingMutation=newPendingMutation();savePending();
      if(!user.isAnonymous)startDocListener(user.uid);
      flushPending();
      return;
    }
  }else{
    // Belge yok: ilk kurulum, expectedRevision 0
    CLOUD.revision=0;
    CLOUD.ready=true;
    CLOUD.pendingMutation=newPendingMutation();savePending();
    if(!user.isAnonymous)startDocListener(user.uid);
    flushPending();
    return;
  }

  CLOUD.ready=true;
  // Listener yalnizca Google kullanicisi icin. Anonim oturumda kurulmaz.
  if(!user.isAnonymous)startDocListener(user.uid);
  else console.log('[SYNC] Anonim oturum, gerçek zamanlı listener kurulmadı');
  setSync(navigator.onLine?'ok':'offline');
}

/* ── D1: kanonik JSON ─────────────────────────────────────────────────────
   Ayni veri her cihazda ayni bayt dizisine serilesmelidir; aksi halde hash
   dogrulamasi saglam yedekleri bozuk sanar. */
function canonicalize(v,seen){
  seen=seen||[];
  var t=typeof v;
  if(t==='function'||t==='symbol')throw new Error('Desteklenmeyen tip: '+t);
  if(t==='number'&&!isFinite(v))throw new Error('NaN/Infinity serilestirilemez');
  if(v===null||t!=='object')return v;
  if(seen.indexOf(v)>=0)throw new Error('Dairesel referans');
  seen=seen.concat([v]);
  if(Array.isArray(v))return v.map(function(x){
    return x===undefined?null:canonicalize(x,seen); });   // dizide undefined -> null
  var out={},keys=Object.keys(v).sort();
  for(var i=0;i<keys.length;i++){
    var val=v[keys[i]];
    if(val===undefined)continue;                          // nesnede undefined -> alan dusurulur
    out[keys[i]]=canonicalize(val,seen);
  }
  return out;
}
function canonicalStringify(v){return JSON.stringify(canonicalize(v));}

/* ── D1: SHA-256 (secure context zorunlu) ────────────────────────────────── */
async function sha256Hex(input){
  if(!(window.crypto&&window.crypto.subtle))
    throw new Error('Bu tarayıcı ortamında güvenli özet (SHA-256) kullanılamıyor');
  var bytes=typeof input==='string'?new TextEncoder().encode(input):input;
  var buf=await window.crypto.subtle.digest('SHA-256',bytes);
  var out='',view=new Uint8Array(buf);
  for(var i=0;i<view.length;i++)out+=view[i].toString(16).padStart(2,'0');
  return out;
}

/* ── D1: sikistirma + geri dusus ─────────────────────────────────────────── */
async function compressPayload(text){
  var raw=new TextEncoder().encode(text);
  if(typeof CompressionStream==='undefined')return {encoding:'json',bytes:raw};
  try{
    var cs=new CompressionStream('gzip');
    var w=cs.writable.getWriter();w.write(raw);w.close();
    var buf=await new Response(cs.readable).arrayBuffer();
    return {encoding:'gzip',bytes:new Uint8Array(buf)};
  }catch(e){
    console.warn('[BACKUP] gzip başarısız, düz JSON kullanılıyor',e);
    return {encoding:'json',bytes:raw};
  }
}
async function decompressPayload(bytes,encoding){
  if(encoding==='json')return new TextDecoder().decode(bytes);
  if(encoding!=='gzip')throw new Error('Bilinmeyen kodlama: '+encoding);
  if(typeof DecompressionStream==='undefined')
    throw new Error('Bu tarayıcı sıkıştırılmış yedeği açamıyor');
  var ds=new DecompressionStream('gzip');
  var w=ds.writable.getWriter();w.write(bytes);w.close();
  var buf=await new Response(ds.readable).arrayBuffer();
  return new TextDecoder().decode(buf);
}
/* Firestore ikili veri: compat Blob varsa onu, yoksa base64 string kullan */
function bytesToStore(u8){
  if(firebase.firestore&&firebase.firestore.Blob)
    return firebase.firestore.Blob.fromUint8Array(u8);
  var s='';for(var i=0;i<u8.length;i++)s+=String.fromCharCode(u8[i]);
  return {__b64:btoa(s)};
}
function storeToBytes(v){
  if(v&&typeof v.toUint8Array==='function')return v.toUint8Array();
  if(v&&typeof v.__b64==='string'){
    var s=atob(v.__b64),u=new Uint8Array(s.length);
    for(var i=0;i<s.length;i++)u[i]=s.charCodeAt(i);
    return u;
  }
  if(v instanceof Uint8Array)return v;
  throw new Error('Yedek verisi okunamadı');
}

/* ── D1: ortam yetenekleri ───────────────────────────────────────────────── */
function getBackupCapabilities(){
  return {
    secureContext:typeof isSecureContext!=='undefined'?!!isSecureContext:false,
    crypto:!!(window.crypto&&window.crypto.subtle),
    compression:typeof CompressionStream!=='undefined',

    authenticated:!!(CLOUD.user&&!CLOUD.user.isAnonymous)

}
function assertCanBackup(){

  if(!c.crypto)throw new Error('Güvenli özet kullanılamıyor; yedek doğrulanamayacağı için oluşturulmadı');

}

function sanitizeText(s,max){
  if(s===undefined||s===null)return '';
  // kontrol karakterleri acik escape ile temizlenir (literal karakter kullanilmaz)
  return String(s).replace(/[\u0000-\u001f\u007f]/g,'').trim().slice(0,max);
}
function countRecords(p){
  p=p||{};
  var n=function(k){var v=p[k];
    return Array.isArray(v)?v.length:(v&&typeof v==='object'?Object.keys(v).length:0);};
  var c={goals:n('goals'),todos:n('todos'),habits:n('habits'),journal:n('journal'),
    quotes:n('quotes'),routines:n('routines'),kpis:n('kpis'),logs:n('logs')};
  var t=0;Object.keys(p).forEach(function(k){
    var v=p[k];
    if(Array.isArray(v))t+=v.length;
    else if(v&&typeof v==='object')t+=Object.keys(v).length;

  c.totalRecords=t;

}
/* Yedek zaman damgasi oturum icinde KESIN ARTAN olmalidir. Ayni milisaniyede iki
   yedek olusursa hem Firestore hem yerel siralama esitligi belge kimligiyle bozar;
   kimlik hash tabanli oldugu icin kronolojik degildir ve zincir/rotasyon sirasi
   belirsizlesir. Monotonik damga bu belirsizligi tamamen kaldirir. */
var lastBackupTs=0;
function nextBackupTs(){

  if(t<=lastBackupTs)t=lastBackupTs+1;
  lastBackupTs=t;
  return t;
}

}
function stagingRemove(id){
  try{localStorage.setItem(STAGING_KEY,
    JSON.stringify(stagingList().filter(function(x){return x.id!==id;})));}catch(e){}
}

/* Suspect: bozulmus bir state'in otomatik yedeklenip iyi yedekleri
   rotasyonla silmesini onler. */
function detectSuspect(counts,plainBytes,prev){
  if(!prev)return {suspect:false,reason:''};
  var pc=prev.counts||{},pb=Number(prev.plainBytes||0);
  var reasons=[];
  if(pc.totalRecords>0&&counts.totalRecords<pc.totalRecords*0.5)
    reasons.push('kayıt sayısı %50\'den fazla düştü ('+pc.totalRecords+' -> '+counts.totalRecords+')');
  if(pb>0&&plainBytes<pb*0.4)
    reasons.push('veri boyutu %60\'tan fazla düştü ('+pb+' -> '+plainBytes+' bayt)');
  ['goals','todos','habits','quotes'].forEach(function(k){
    if((pc[k]||0)>0&&(counts[k]||0)===0)reasons.push(k+' alanı sıfırlandı');
  });
  return {suspect:reasons.length>0,reason:reasons.join('; ')};
}

/* ── D2: yedek olustur ───────────────────────────────────────────────────── */
async function createBackup(reason,options){
  options=options||{};
  if(BACKUP_REASONS.indexOf(reason)<0)throw new Error('Geçersiz yedek nedeni: '+reason);
  // Restore kilidi: yalniz dogrulanmis dahili before_restore izinli (operationId eslesmeli).
  if(RESTORE.state!=='IDLE'){
    var okBefore=reason==='before_restore'&&options.__restoreOperationId&&
      options.__restoreOperationId===RESTORE.operationId;
    if(!okBefore)throw new Error('Geri yükleme sırasında yedek oluşturulamaz');
  }
  assertCanBackup();
  var uid=CLOUD.uid;

  var payload=JSON.parse(JSON.stringify(options.payload||D));      // derin snapshot
  var plain=canonicalStringify(payload);
  var plainSha256=await sha256Hex(plain);
  var plainBytes=new TextEncoder().encode(plain).length;
  var counts=countRecords(payload);

  var prev=await lastCompleteBackup(uid);

  // Dedup: ayni icerik + ayni reason kisa sure icinde tekrar yazilmaz
  if(!options.force&&prev&&prev.plainSha256===plainSha256&&prev.reason===reason&&
     (Date.now()-Number(prev.createdAtClient||0))<BACKUP.DEDUP_WINDOW_MS){
    console.log('[BACKUP] Aynı içerik zaten yedeklenmiş, atlandı:',prev.id);
    return {skipped:true,reason:'duplicate',id:prev.id};
  }

  var comp=await compressPayload(plain);
  var blobSha256=await sha256Hex(comp.bytes);
  var sus=detectSuspect(counts,plainBytes,prev);
  var now=nextBackupTs();
  var id=now+'-'+plainSha256.slice(0,8)+'-'+Math.random().toString(36).slice(2,6);

  stagingAdd(id);
  // 1) once blob
  await blobRef(uid,id).set({
    data:bytesToStore(comp.bytes), encoding:comp.encoding,
    blobSha256:blobSha256, storedBytes:comp.bytes.length, backupVersion:BACKUP_VERSION,
    status:'staging'
  });
  // 2) blob'un gercekten yazildigini dogrula
  var check=await blobRef(uid,id).get();
  if(!check.exists)throw new Error('Yedek verisi yazılamadı');

  // 3) metadata SON: commit isareti
  var meta={
    backupVersion:BACKUP_VERSION, manifestVersion:BACKUP_VERSION,
    schemaVersion:SCHEMA_VERSION, appVersion:APP_VERSION,
    createdAt:firebase.firestore.FieldValue.serverTimestamp(), createdAtClient:now,
    createdByUid:uid, createdByDeviceId:deviceId(),
    reason:reason,
    label:sanitizeText(options.label,BACKUP.LABEL_MAX),
    note:sanitizeText(options.note,BACKUP.NOTE_MAX),
    sourceRevision:Number(CLOUD.revision||0),
    pinned:!!options.pinned, suspect:sus.suspect, suspectReason:sus.reason,
    encoding:comp.encoding, plainSha256:plainSha256, blobSha256:blobSha256,
    plainBytes:plainBytes, storedBytes:comp.bytes.length,
    compressionRatio:plainBytes>0?Number((comp.bytes.length/plainBytes).toFixed(4)):1,
    counts:counts,
    previousBackupHash:prev?prev.plainSha256:null,
    status:'complete'
  };
  meta.labelLower=meta.label.toLowerCase();
  meta.noteLower=meta.note.toLowerCase();
  await backupsRef(uid).doc(id).set(meta);
  stagingRemove(id);
  console.log('[BACKUP] Oluşturuldu:',id,reason,counts.totalRecords+' kayıt',
    comp.encoding,comp.bytes.length+'B'+(sus.suspect?' SUSPECT':''));

  try{await rotateBackups();}catch(e){console.warn('[BACKUP:ROTATE] Rotasyon başarısız',e);}
  return {skipped:false,id:id,meta:meta};
}
async function lastCompleteBackup(uid){
  var q=await backupsRef(uid).orderBy('createdAtClient','desc').limit(5).get();
  var found=null;
  q.forEach(function(d){
    if(found)return;
    var m=d.data()||{};
    if(m.status==='complete'&&!m.suspect){found=Object.assign({id:d.id},m);}
  });
  return found;
}

/* ── D2: rotasyon ────────────────────────────────────────────────────────── */
function backupClass(m){
  if(m.reason==='manual')return 'manual';
  if(m.reason==='daily')return 'daily';
  if(String(m.reason||'').indexOf('before_')===0)return 'emergency';
  return 'other';
}
async function rotateBackups(){
  if(!CLOUD.uid)return {deleted:0};
  var uid=CLOUD.uid;
  var q=await backupsRef(uid).orderBy('createdAtClient','desc').get();
  var all=[];
  q.forEach(function(d){var m=d.data()||{};if(m.status==='complete')all.push(Object.assign({id:d.id},m));});
  if(all.length<=1)return {deleted:0};

  var groups={manual:[],daily:[],emergency:[],other:[]};
  all.forEach(function(m){groups[backupClass(m)].push(m);});

  var doomed=[],now=Date.now();
  function mark(list,keep){
    for(var i=keep;i<list.length;i++)doomed.push(list[i]);
  }
  mark(groups.manual,BACKUP.KEEP.manual);
  mark(groups.other,BACKUP.KEEP.manual);
  // acil yedekler: sayi siniri VE 30 gunluk dokunulmazlik
  groups.emergency.forEach(function(m,i){
    if(i>=BACKUP.KEEP.emergency&&(now-Number(m.createdAtClient||0))>BACKUP.KEEP.emergencyMinAgeMs)
      doomed.push(m);
  });
  // daily: GFS-lite
  var kept={},dailyKeep=[];
  groups.daily.forEach(function(m){
    var d=new Date(Number(m.createdAtClient||0));
    var day=d.toISOString().slice(0,10), wk=d.getUTCFullYear()+'-W'+U.isoWeek(d), mo=d.toISOString().slice(0,7);
    var age=now-Number(m.createdAtClient||0);
    var tag=null;
    if(age<=7*864e5)tag='d:'+day; else if(age<=35*864e5)tag='w:'+wk; else tag='m:'+mo;
    if(!kept[tag]){kept[tag]=1;dailyKeep.push(m);}else doomed.push(m);
  });
  if(dailyKeep.length>BACKUP.KEEP.dailyDaily+BACKUP.KEEP.dailyWeekly+BACKUP.KEEP.dailyMonthly)
    mark(dailyKeep,BACKUP.KEEP.dailyDaily+BACKUP.KEEP.dailyWeekly+BACKUP.KEEP.dailyMonthly);

  // Muafiyetler ve invaryant
  doomed=doomed.filter(function(m){return !m.pinned&&!m.suspect;});
  var newestOf={};
  all.forEach(function(m){var c=backupClass(m);if(!newestOf[c]&&!m.suspect)newestOf[c]=m.id;});
  doomed=doomed.filter(function(m){return newestOf[backupClass(m)]!==m.id;});
  var survivors=all.length-doomed.length;
  if(survivors<1)return {deleted:0,blocked:'invaryant'};
  doomed=doomed.slice(0,BACKUP.ROTATE_MAX_DELETE);

  var deleted=0;
  for(var i=0;i<doomed.length;i++){
    var m=doomed[i];
    try{
      await blobRef(uid,m.id).delete();          // once blob
      await backupsRef(uid).doc(m.id).delete();  // sonra metadata
      deleted++;
      console.log('[BACKUP:ROTATE] Silindi:',m.id,m.reason);
    }catch(e){
      console.warn('[BACKUP:ROTATE] Silinemedi, metadata korundu:',m.id,e);
    }
  }
  return {deleted:deleted,considered:doomed.length};
}

/* ── D2: orphan temizligi ────────────────────────────────────────────────── */
async function cleanupOrphanBackups(){
  if(!CLOUD.uid)return {cleaned:0};
  var uid=CLOUD.uid,now=Date.now(),cleaned=0,keep=[];
  var list=stagingList();
  for(var i=0;i<list.length;i++){
    var e=list[i];
    if(now-Number(e.at||0)<24*3600*1000){keep.push(e);continue;}
    try{
      var meta=await backupsRef(uid).doc(e.id).get();
      if(meta.exists&&(meta.data()||{}).status==='complete'){continue;} // aslinda tamamlanmis
      await blobRef(uid,e.id).delete();
      try{await backupsRef(uid).doc(e.id).delete();}catch(x){}
      cleaned++;
      console.log('[BACKUP:ORPHAN] Temizlendi:',e.id);
    }catch(err){keep.push(e);console.warn('[BACKUP:ORPHAN] Temizlenemedi',e.id,err);}
  }
  try{localStorage.setItem(STAGING_KEY,JSON.stringify(keep));}catch(e){}
  return {cleaned:cleaned};
}

/* ── D3: listeleme (blob indirmez) ───────────────────────────────────────── */
async function listBackups(options){
  options=options||{};
  if(!CLOUD.uid)throw new Error('Bulut bağlantısı hazır değil');
  var q=await backupsRef(CLOUD.uid).orderBy('createdAtClient','desc')
    .limit(options.limit||30).get();
  var out=[];
  q.forEach(function(d){
    var m=d.data()||{};
    if(m.status!=='complete')return;
    out.push(Object.assign({id:d.id},m));
  });
  if(options.search){
    var s=String(options.search).toLowerCase();
    out=out.filter(function(m){
      return (m.labelLower||'').indexOf(s)>=0||(m.noteLower||'').indexOf(s)>=0||
             (m.reason||'').indexOf(s)>=0;});
  }
  if(options.reason)out=out.filter(function(m){return m.reason===options.reason;});
  return out;
}

/* ── D3: saglik degerlendirmesi ──────────────────────────────────────────── */
function scoreHealth(r){
  // Hash basarisizligi PUANLA MASKELENMEZ: dogrudan Corrupted.
  if(r.blobHashOk===false||r.plainHashOk===false||r.parseOk===false)
    return {status:'Corrupted',score:0};
  if(r.incomplete)return {status:'Incomplete',score:0};
  if(r.futureSchema)return {status:'Unsupported Future Schema',score:0};
  var s=0;
  s+=r.blobHashOk?30:0;
  s+=r.plainHashOk?25:0;
  s+=r.schemaEqual?15:(r.schemaMigratable?8:0);
  s+=r.metaOk?10:0;
  s+=r.plausible?10:0;
  var age=r.lastVerifiedAt?Date.now()-r.lastVerifiedAt:null;
  s+=(age!==null&&age<BACKUP.VERIFY_FRESH_MS)?10:((age!==null&&age<BACKUP.VERIFY_STALE_MS)?5:0);
  var status='Healthy';
  if(r.suspect||!r.plausible||r.countsMismatch||r.chainStatus==='broken')status='Suspect';
  else if(!r.schemaEqual&&r.schemaMigratable)status='Migration Required';
  else if(r.legacy)status='Legacy';
  else if(r.blobHashOk&&r.plainHashOk)status='Verified';
  return {status:status,score:Math.max(0,Math.min(100,s))};
}

/* ── D3: tek yedegi dogrula (hicbir state degistirmez) ───────────────────── */
async function verifyBackup(backupId,options){
  options=options||{};
  if(!CLOUD.uid)throw new Error('Bulut bağlantısı hazır değil');
  var uid=CLOUD.uid,r={id:backupId,checkedAt:Date.now()};
  var metaSnap=await backupsRef(uid).doc(backupId).get();
  if(!metaSnap.exists){r.incomplete=true;r.error='Metadata bulunamadı';
    return Object.assign(r,scoreHealth(r));}
  var m=metaSnap.data()||{};
  r.reason=m.reason;r.label=m.label;r.suspect=!!m.suspect;
  r.lastVerifiedAt=Number(m.lastVerifiedAt||0)||null;
  if(m.status!=='complete'){r.incomplete=true;r.error='Yedek tamamlanmamış';
    return Object.assign(r,scoreHealth(r));}
  r.metaOk=!!(m.plainSha256&&m.blobSha256&&m.encoding&&m.counts);
  r.legacy=!m.plainSha256||!m.blobSha256;

  var blobSnap=await blobRef(uid,backupId).get();
  if(!blobSnap.exists){r.incomplete=true;r.error='Yedek verisi bulunamadı';
    return Object.assign(r,scoreHealth(r));}
  var b=blobSnap.data()||{};

  try{
    var bytes=storeToBytes(b.data);
    r.blobHashOk=(await sha256Hex(bytes))===m.blobSha256;
    if(!r.blobHashOk){r.error='Sıkıştırılmış veri özeti uyuşmuyor';
      return Object.assign(r,scoreHealth(r));}
    var text=await decompressPayload(bytes,m.encoding||b.encoding);
    r.plainHashOk=(await sha256Hex(text))===m.plainSha256;
    if(!r.plainHashOk){r.error='Veri özeti uyuşmuyor';
      return Object.assign(r,scoreHealth(r));}
    var parsed=JSON.parse(text);
    r.parseOk=true;
    // kanonik yeniden uretim: serilestirme kararliligini dogrular
    r.canonicalStable=canonicalStringify(parsed)===text;
    var recount=countRecords(parsed);
    // Firestore map alanlarinin anahtar sirasini KORUMAZ. JSON.stringify siraya
    // duyarli oldugu icin ayni degerleri farkli sirada gelince yanlis uyusmazlik
    // uretiyordu. Kanonik karsilastirma sira bagimsizdir.
    r.countsMismatch=canonicalStringify(recount)!==canonicalStringify(m.counts||{});
    r.counts=recount;
    r.plausible=recount.totalRecords>0&&!r.countsMismatch;
  }catch(e){
    r.parseOk=false;r.error=e.message;
    return Object.assign(r,scoreHealth(r));
  }

  var sv=Number(m.schemaVersion||0);
  r.schemaEqual=sv===SCHEMA_VERSION;
  r.schemaMigratable=sv>0&&sv<SCHEMA_VERSION;
  r.futureSchema=sv>SCHEMA_VERSION;
  r.chainStatus=options.chainStatus||'unknown';

  var h=scoreHealth(r);
  Object.assign(r,h);
  if(options.cache!==false){
    // Degistirilemezlik payload ve hash alanlarina aittir; yalniz dogrulama
    // sonucu alanlari guncellenir.
    try{await backupsRef(uid).doc(backupId).update({
      lastVerifiedAt:Date.now(),verifyResult:r.error?String(r.error):'ok',
      healthStatus:h.status,healthScore:h.score});}catch(e){
      console.warn('[BACKUP:VERIFY] Sonuç önbelleğe yazılamadı',e);}
  }
  console.log('[BACKUP:VERIFY]',backupId,h.status,h.score);
  return r;
}

/* Zincir: rotasyon eski yedegi sildiginde kirik degil 'pruned' sayilir. */
function evaluateChain(list){
  var byHash={};list.forEach(function(m){byHash[m.plainSha256]=true;});
  var oldest=list.length?Number(list[list.length-1].createdAtClient||0):0;
  return list.map(function(m){
    var st;
    if(!m.previousBackupHash)st='root';
    else if(byHash[m.previousBackupHash])st='ok';
    else if(Number(m.createdAtClient||0)<=oldest)st='pruned';
    else st='pruned';   // referans listeden once budanmis
    return {id:m.id,chainStatus:st};
  });
}

/* ── D3: toplu dogrulama (kota dostu, sirali) ────────────────────────────── */
async function verifyAllBackups(options){
  options=options||{};
  var limit=options.limit||10;
  var list=await listBackups({limit:Math.max(limit,30)});
  var chain={};evaluateChain(list).forEach(function(c){chain[c.id]=c.chainStatus;});
  var targets=list.slice(0,limit),results=[];
  for(var i=0;i<targets.length;i++){
    try{
      var r=await verifyBackup(targets[i].id,{chainStatus:chain[targets[i].id],cache:options.cache});
      results.push(r);
    }catch(e){
      results.push({id:targets[i].id,status:'Corrupted',score:0,error:e.message});
    }
    if(options.onProgress)try{options.onProgress(i+1,targets.length,results[results.length-1]);}catch(e){}
  }
  var bad=results.filter(function(r){return r.status==='Corrupted'||r.status==='Incomplete';});
  console.log('[BACKUP:VERIFY] '+results.length+' yedek denetlendi, '+bad.length+' sorunlu');
  return {checked:results.length,problems:bad.length,results:results};
}

/* ══════════════════════════════════════════════════════════════════════════
   D4 — DIFF MOTORU VE RESTORE PREVIEW (saf fonksiyonlar)
   Firestore erisimi yalnizca diffBackups seviyesinde. diffPayloads saftir.
   ══════════════════════════════════════════════════════════════════════════ */

/* Tek kaynak: payload tip haritasi. 15 dizi + 7 nesne + 5 skaler = 27 alan.
   logs kayitlarinda kararli id yoktur; icerik tabanli eslenir (indeks DEGIL). */
var DIFF_SCHEMA={
  arrays:[
    {field:'goals',identity:'id',critical:true},
    {field:'todos',identity:'id',critical:true},
    {field:'habits',identity:'id',critical:true},
    {field:'quotes',identity:'id'},
    {field:'kpis',identity:'id'},
    {field:'journal',identity:'id'},
    {field:'principles',identity:'id'},
    {field:'coaching',identity:'id'},
    {field:'sops',identity:'id'},
    {field:'gtdInbox',identity:'id'},
    {field:'questions',identity:'id'},
    {field:'mybooks',identity:'id'},
    {field:'challenges',identity:'id'},
    {field:'vault',identity:'id'},
    {field:'logs',identity:'content'}
  ],
  objects:['routines','timeblocks','weeklyReview','oneThing','compat','savedResources','stats'],
  scalars:['readingPlan','scratch','vol','activeSound','deepWorkSessions']
};
var DIFF_LIMITS={detailLimit:100, previewMax:120, missingLow:5};
var IMPACT_RULES={highDeletePct:0.20, criticalModules:['goals','todos','habits'],
  criticalDropPct:0.5};

function getDiffSchema(){return JSON.parse(JSON.stringify(DIFF_SCHEMA));}
function allSchemaFields(){
  return DIFF_SCHEMA.arrays.map(function(a){return a.field;})
    .concat(DIFF_SCHEMA.objects).concat(DIFF_SCHEMA.scalars);
}
function recHash(r){return canonicalStringify(r);}

/* ── D4.2: dizi diff ──────────────────────────────────────────────────────── */
function diffArrayRecords(source,target,opts){
  opts=opts||{};
  var identity=opts.identity||'id', limit=opts.detailLimit||DIFF_LIMITS.detailLimit;
  source=source||[]; target=target||[];
  var res={added:0,removed:0,changed:0,unchanged:0,
    addedDetail:[],removedDetail:[],changedDetail:[],
    duplicateIds:[],missingIds:[],truncated:false,totalDetailCount:0,confidence:'high'};

  if(identity==='content'){
    // Icerik tabanli coklu-kume: yalniz added/removed, changed YOK, missingIds YOK
    var ms=function(list){var m={};list.forEach(function(r){var k=recHash(r);m[k]=(m[k]||0)+1;});return m;};
    var sm=ms(source), tm=ms(target), keys={};
    Object.keys(sm).forEach(function(k){keys[k]=1;});Object.keys(tm).forEach(function(k){keys[k]=1;});
    Object.keys(keys).forEach(function(k){
      var s=sm[k]||0,t=tm[k]||0;
      if(t>s){res.added+=t-s;pushDetail(res.addedDetail,{hash:k},limit,res);}
      else if(s>t){res.removed+=s-t;pushDetail(res.removedDetail,{hash:k},limit,res);}
      var min=Math.min(s,t);res.unchanged+=min;
    });
    return res;
  }

  var idx=function(list){
    var byId={},dups={},missing=[];
    list.forEach(function(r,i){
      var id=(r&&typeof r==='object')?r.id:undefined;
      if(id===undefined||id===null){missing.push({index:i,hash:recHash(r)});return;}
      id=String(id);
      if(byId.hasOwnProperty(id)){
        if(!dups[id])dups[id]=[byId[id].hash];
        dups[id].push(recHash(r));
      }else byId[id]={rec:r,hash:recHash(r)};
    });
    return {byId:byId,dups:dups,missing:missing};
  };
  var S=idx(source),T=idx(target);
  var seenDup={};
  [S,T].forEach(function(side,si){
    Object.keys(side.dups).forEach(function(id){
      if(seenDup[id])return;seenDup[id]=1;
      res.duplicateIds.push({field:opts.field||null,id:id,
        sourceCount:(source.filter(function(r){return r&&String(r.id)===id;})).length,
        targetCount:(target.filter(function(r){return r&&String(r.id)===id;})).length,
        sourceHashes:S.dups[id]||(S.byId[id]?[S.byId[id].hash]:[]),
        targetHashes:T.dups[id]||(T.byId[id]?[T.byId[id].hash]:[])});
    });
  });
  S.missing.forEach(function(m){res.missingIds.push(Object.assign({side:'source'},m));});
  T.missing.forEach(function(m){res.missingIds.push(Object.assign({side:'target'},m));});

  var allIds={};
  Object.keys(S.byId).forEach(function(id){allIds[id]=1;});
  Object.keys(T.byId).forEach(function(id){allIds[id]=1;});
  Object.keys(allIds).forEach(function(id){
    if(seenDup[id])return; // cakisan id -> changed KESIN sayilmaz
    var s=S.byId[id],t=T.byId[id];
    if(s&&t){
      if(s.hash===t.hash)res.unchanged++;
      else{res.changed++;pushDetail(res.changedDetail,{id:id},limit,res);}
    }else if(t){res.added++;pushDetail(res.addedDetail,{id:id},limit,res);}
    else{res.removed++;pushDetail(res.removedDetail,{id:id},limit,res);}
  });

  var missCount=res.missingIds.length, dupCount=res.duplicateIds.length;
  if(dupCount>0||missCount>DIFF_LIMITS.missingLow)res.confidence='low';
  else if(missCount>0)res.confidence='medium';
  return res;
}
function pushDetail(list,item,limit,res){
  res.totalDetailCount++;
  if(list.length<limit)list.push(item);
  else res.truncated=true;
}

/* ── D4.3: nesne diff (noktali yol) ───────────────────────────────────────── */
function diffObjects(source,target,opts,prefix,depth){
  opts=opts||{};prefix=prefix||'';depth=depth||0;
  var res={changedKeys:[],addedKeys:[],removedKeys:[],unchangedKeys:[],nestedChanges:[]};
  // Firestore ic ice sinir 20; 40 gecilirse dairesel yapi kabul edip guvenli durur.
  if(depth>40){res.nestedChanges.push({path:prefix,error:'çok derin veya dairesel yapı'});return res;}
  source=source||{};target=target||{};
  var keys={};Object.keys(source).forEach(function(k){keys[k]=1;});
  Object.keys(target).forEach(function(k){keys[k]=1;});
  Object.keys(keys).forEach(function(k){
    var path=prefix?prefix+'.'+k:k, a=source[k], b=target[k];
    var inA=source.hasOwnProperty(k), inB=target.hasOwnProperty(k);
    if(!inA){res.addedKeys.push(path);return;}
    if(!inB){res.removedKeys.push(path);return;}
    var aObj=a&&typeof a==='object'&&!Array.isArray(a);
    var bObj=b&&typeof b==='object'&&!Array.isArray(b);
    if(aObj&&bObj){
      var sub=diffObjects(a,b,opts,path,depth+1);
      ['changedKeys','addedKeys','removedKeys','unchangedKeys'].forEach(function(kk){
        res[kk]=res[kk].concat(sub[kk]);});
      res.nestedChanges=res.nestedChanges.concat(sub.nestedChanges);
      return;
    }
    var ha,hb;
    try{ha=recHash(a);hb=recHash(b);}
    catch(e){res.nestedChanges.push({path:path,error:'karşılaştırılamadı: '+e.message});return;}
    if(ha===hb)res.unchangedKeys.push(path);
    else{res.changedKeys.push(path);res.nestedChanges.push({path:path,changed:true});}
  });
  return res;
}

/* ── D4.4: skaler diff ────────────────────────────────────────────────────── */
function scalarPreview(v){
  if(v===undefined)return {type:'undefined',preview:null};
  if(v===null)return {type:'null',preview:null};
  if(typeof v==='string'){
    if(v.length>DIFF_LIMITS.previewMax)
      return {type:'string',preview:v.slice(0,DIFF_LIMITS.previewMax)+'…',length:v.length,truncated:true};
    return {type:'string',preview:v,length:v.length};
  }
  return {type:typeof v,preview:v};
}
function diffScalars(before,after){
  var changed;
  try{changed=recHash(before)!==recHash(after);}
  catch(e){changed=true;}
  return {before:scalarPreview(before),after:scalarPreview(after),changed:changed};
}

/* ── D4.6: payload diff (saf) ─────────────────────────────────────────────── */
function diffPayloads(source,target,opts){
  opts=opts||{};
  var detailLimit=opts.detailLimit||DIFF_LIMITS.detailLimit;
  source=source||{};target=target||{};
  var out={arrays:{},objects:{},scalars:{},unknownFields:[]};
  DIFF_SCHEMA.arrays.forEach(function(a){
    out.arrays[a.field]=diffArrayRecords(source[a.field],target[a.field],
      {identity:a.identity,field:a.field,detailLimit:detailLimit});
  });
  DIFF_SCHEMA.objects.forEach(function(f){
    out.objects[f]=diffObjects(source[f],target[f],{});
  });
  DIFF_SCHEMA.scalars.forEach(function(f){
    out.scalars[f]=diffScalars(source[f],target[f]);
  });
  var known={};allSchemaFields().forEach(function(f){known[f]=1;});
  var seen={};[source,target].forEach(function(p){
    Object.keys(p||{}).forEach(function(k){
      if(!known[k]&&!seen[k]){seen[k]=1;out.unknownFields.push(k);}});});
  return out;
}

/* ── D4.5: hizli diff (yalniz metadata, blob YOK) ────────────────────────── */
function diffBackupMetadata(aMeta,bMeta){
  aMeta=aMeta||{};bMeta=bMeta||{};
  var ac=aMeta.counts||{},bc=bMeta.counts||{};
  var modules={},keys={};
  Object.keys(ac).forEach(function(k){if(k!=='totalRecords')keys[k]=1;});
  Object.keys(bc).forEach(function(k){if(k!=='totalRecords')keys[k]=1;});
  Object.keys(keys).forEach(function(k){modules[k]=(bc[k]||0)-(ac[k]||0);});
  return {
    perModule:modules,
    totalRecords:(bc.totalRecords||0)-(ac.totalRecords||0),
    plainBytes:(bMeta.plainBytes||0)-(aMeta.plainBytes||0),
    storedBytes:(bMeta.storedBytes||0)-(aMeta.storedBytes||0),
    sourceRevision:(bMeta.sourceRevision||0)-(aMeta.sourceRevision||0),
    schemaVersionChanged:aMeta.schemaVersion!==bMeta.schemaVersion,
    appVersionChanged:aMeta.appVersion!==bMeta.appVersion,
    createdAtDelta:(Number(bMeta.createdAtClient||0))-(Number(aMeta.createdAtClient||0)),
    limitation:'Yalnız net sayısal fark. changed kayıt sayısı ve duplicate id tespit edilemez; bunun için tam diff gerekir.'
  };
}

/* ── D4.6: backup seviyesi tam diff (Firestore erisimi burada) ───────────── */
async function loadBackupPayload(backupId){
  var v=await verifyBackup(backupId,{cache:false});
  if(['Corrupted','Incomplete','Unsupported Future Schema'].indexOf(v.status)>=0)
    throw new Error('Yedek karşılaştırmaya uygun değil: '+backupId+' ('+v.status+')');
  var uid=CLOUD.uid;
  var meta=(await backupsRef(uid).doc(backupId).get()).data()||{};
  var b=(await blobRef(uid,backupId).get()).data()||{};
  var text=await decompressPayload(storeToBytes(b.data),meta.encoding||b.encoding);
  return {meta:meta,payload:JSON.parse(text)};
}
async function diffBackups(sourceBackupId,targetBackupId,opts){
  opts=opts||{};
  console.log('[BACKUP:DIFF]',sourceBackupId,'->',targetBackupId);
  var s=await loadBackupPayload(sourceBackupId);
  var t=await loadBackupPayload(targetBackupId);
  return {source:{id:sourceBackupId,revision:s.meta.sourceRevision},
    target:{id:targetBackupId,revision:t.meta.sourceRevision},
    diff:diffPayloads(s.payload,t.payload,opts)};
}

/* ── D4.7: restore preview modeli (saf) ──────────────────────────────────── */
function moduleTotals(d){
  // d: diffArrayRecords sonucu VEYA diffObjects sonucu VEYA diffScalars
  var t={added:0,removed:0,changed:0,unchanged:0,uncertain:0};
  if(d.addedDetail!==undefined){ // dizi
    t.added=d.added;t.removed=d.removed;t.changed=d.changed;t.unchanged=d.unchanged;
    t.uncertain=d.missingIds.length+d.duplicateIds.reduce(function(a,x){
      return a+Math.max(x.sourceCount,x.targetCount);},0);
  }else if(d.changedKeys!==undefined){ // nesne
    t.added=d.addedKeys.length;t.removed=d.removedKeys.length;
    t.changed=d.changedKeys.length;t.unchanged=d.unchangedKeys.length;
  }else{ // skaler
    if(d.changed)t.changed=1;else t.unchanged=1;
  }
  return t;
}
function buildRestorePreview(currentPayload,backupPayload,opts){
  opts=opts||{};
  console.log('[BACKUP:PREVIEW] hesaplanıyor');
  // Restore: backup yeni state olur -> source=current, target=backup
  var diff=diffPayloads(currentPayload,backupPayload,opts);
  var affected=[],unchanged=[],perModule={};
  var totals={added:0,removed:0,changed:0,unchanged:0,uncertain:0};
  var dupWarn=[],missWarn=[];

  function acc(name,d,critical){
    var mt=moduleTotals(d);
    perModule[name]=mt;
    totals.added+=mt.added;totals.removed+=mt.removed;totals.changed+=mt.changed;
    totals.unchanged+=mt.unchanged;totals.uncertain+=mt.uncertain;
    if(d.duplicateIds&&d.duplicateIds.length)
      dupWarn.push({module:name,count:d.duplicateIds.length});
    if(d.missingIds&&d.missingIds.length)
      missWarn.push({module:name,count:d.missingIds.length});
    if(mt.added||mt.removed||mt.changed)affected.push(name);else unchanged.push(name);
  }
  DIFF_SCHEMA.arrays.forEach(function(a){acc(a.field,diff.arrays[a.field],a.critical);});
  DIFF_SCHEMA.objects.forEach(function(f){acc(f,diff.objects[f]);});
  DIFF_SCHEMA.scalars.forEach(function(f){acc(f,diff.scalars[f]);});

  // Confidence (kritik modul agirlikli)
  var critDupMiss=IMPACT_RULES.criticalModules.some(function(m){
    var d=diff.arrays[m];return d&&(d.duplicateIds.length>0||d.missingIds.length>0);});
  var anyDup=dupWarn.length>0, totalMiss=missWarn.reduce(function(a,x){return a+x.count;},0);
  var confidence='high';
  if(critDupMiss||anyDup)confidence='low';
  else if(totalMiss>DIFF_LIMITS.missingLow)confidence='low';
  else if(totalMiss>0)confidence='medium';

  // Kaynak toplam kayit (silme yuzdesi icin)
  var srcTotal=0;DIFF_SCHEMA.arrays.forEach(function(a){
    srcTotal+=(currentPayload&&Array.isArray(currentPayload[a.field]))?currentPayload[a.field].length:0;});
  var removedPct=srcTotal>0?totals.removed/srcTotal:0;

  // Destructive impact
  var criticalHit=IMPACT_RULES.criticalModules.some(function(m){
    var cur=(currentPayload&&Array.isArray(currentPayload[m]))?currentPayload[m].length:0;
    var mt=perModule[m]||{removed:0};
    return cur>0&&mt.removed>=cur*IMPACT_RULES.criticalDropPct;});
  var impact;
  if(totals.added===0&&totals.removed===0&&totals.changed===0)impact='none';
  else if(criticalHit)impact='critical';
  else if(removedPct>IMPACT_RULES.highDeletePct)impact='high';
  else if(totals.removed===0&&totals.changed===0)impact='low';
  else impact='medium';

  var schemaWarnings=[];
  if(diff.unknownFields.length)
    schemaWarnings.push({type:'unknownFields',fields:diff.unknownFields});

  var curBytes=safeLen(currentPayload), bakBytes=safeLen(backupPayload);
  var warnings=[];
  if(dupWarn.length)warnings.push('Çakışan kayıt kimlikleri var; bazı değişiklikler kesin sayılamıyor.');
  if(missWarn.length)warnings.push('Kimliksiz kayıtlar var; karşılaştırma güvenilirliği düştü.');
  if(diff.unknownFields.length)warnings.push('Bilinmeyen alan(lar): '+diff.unknownFields.join(', '));

  return {
    sourceRevision:opts.sourceRevision!==undefined?opts.sourceRevision:null,
    targetRevision:opts.targetRevision!==undefined?opts.targetRevision:null,
    affectedModules:affected, unchangedModules:unchanged,
    totals:totals, perModule:perModule,
    warnings:warnings, confidence:confidence,
    duplicateIdWarnings:dupWarn, missingIdWarnings:missWarn, schemaWarnings:schemaWarnings,
    sizeDifference:bakBytes-curBytes, recordDifference:totals.added-totals.removed,
    destructiveImpact:impact,
    detailLimit:opts.detailLimit||DIFF_LIMITS.detailLimit
  };
}
function safeLen(o){try{return new TextEncoder().encode(canonicalStringify(o)).length;}catch(e){return 0;}}

/* ── D4.9: suspect kayit duzeyi analizi (mevcut detectSuspect'e DOKUNMAZ) ── */
function analyzeSuspiciousChange(previousPayload,nextPayload){
  var diff=diffPayloads(previousPayload,nextPayload,{detailLimit:1});
  var prevTotal=0,nextTotal=0;
  DIFF_SCHEMA.arrays.forEach(function(a){
    prevTotal+=(previousPayload&&Array.isArray(previousPayload[a.field]))?previousPayload[a.field].length:0;
    nextTotal+=(nextPayload&&Array.isArray(nextPayload[a.field]))?nextPayload[a.field].length:0;
  });
  var catastrophicDrop=prevTotal>0&&nextTotal<prevTotal*0.5;
  var criticalModuleEmptied=IMPACT_RULES.criticalModules.some(function(m){
    var p=(previousPayload&&Array.isArray(previousPayload[m]))?previousPayload[m].length:0;
    var n=(nextPayload&&Array.isArray(nextPayload[m]))?nextPayload[m].length:0;
    return p>0&&n===0;});
  var dupDetected=false,missBefore=0,missAfter=0;
  DIFF_SCHEMA.arrays.forEach(function(a){
    var d=diff.arrays[a.field];
    if(d.duplicateIds.length)dupDetected=true;
    d.missingIds.forEach(function(m){if(m.side==='source')missBefore++;else missAfter++;});
  });
  var reasons=[];
  if(catastrophicDrop)reasons.push('toplam kayıt %50\'den fazla düştü');
  if(criticalModuleEmptied)reasons.push('kritik modül boşaldı');
  if(dupDetected)reasons.push('çakışan kayıt kimliği');
  if(missAfter>missBefore)reasons.push('kimliksiz kayıt arttı');
  return {catastrophicDrop:catastrophicDrop,criticalModuleEmptied:criticalModuleEmptied,
    duplicateIdDetected:dupDetected,missingIdIncrease:missAfter>missBefore,
    destructiveImpact:(catastrophicDrop||criticalModuleEmptied)?'critical':(reasons.length?'medium':'none'),
    reasons:reasons};
}
