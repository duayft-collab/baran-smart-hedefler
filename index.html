<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusUp Pro V6</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--s:#fff;--s2:#f0f0f2;--s3:#e5e5ea;
  --t:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --blue:#0071e3;--bl:rgba(0,113,227,.1);
  --green:#34c759;--gl:rgba(52,199,89,.1);
  --orange:#ff9500;--ol:rgba(255,149,0,.11);
  --red:#ff3b30;--rl:rgba(255,59,48,.1);
  --purple:#af52de;--pl:rgba(175,82,222,.1);
  --yellow:#ffcc00;--yl:rgba(255,204,0,.13);
  --sw:218px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
}
.dark{
  --bg:#000;--s:#1c1c1e;--s2:#2c2c2e;--s3:#3a3a3c;
  --t:#f5f5f7;--t2:#98989d;--t3:#636366;
  --blue:#0a84ff;--bl:rgba(10,132,255,.14);
  --green:#30d158;--gl:rgba(48,209,88,.12);
  --orange:#ff9f0a;--ol:rgba(255,159,10,.13);
  --red:#ff453a;--rl:rgba(255,69,58,.12);
  --purple:#bf5af2;--pl:rgba(191,90,242,.12);
  --yellow:#ffd60a;--yl:rgba(255,214,10,.12);
  --teal:#64d2ff;
  --sh:0 2px 8px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:99px;}
::-webkit-scrollbar-track{background:transparent;}

/* Layout */
#shell{display:flex;height:100vh;}
#sidebar{width:var(--sw);background:var(--s);border-right:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;padding:16px 10px 12px;flex-shrink:0;overflow-y:auto;}
.dark #sidebar{border-right-color:rgba(255,255,255,.09);}
#body{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#topbar{height:50px;background:var(--s);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
.dark #topbar{border-bottom-color:rgba(255,255,255,.09);}
#page{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg);}
#pinner{max-width:1040px;margin:0 auto;}

/* Logo */
.logo{display:flex;align-items:center;gap:9px;padding:4px 6px 16px;}
.logo-mark{width:26px;height:26px;border-radius:7px;background:var(--t);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-weight:700;font-size:14px;letter-spacing:-.3px;}

/* Nav */
.nsec{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;padding:3px 6px 4px;margin-top:7px;}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 7px;border-radius:7px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);text-align:left;transition:background .12s,color .12s;font-family:inherit;}
.nb:hover{background:var(--s2);color:var(--t);}
.nb.active{background:var(--bl);color:var(--blue);font-weight:600;}
.ni{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.8;}
.nb.active .ni{opacity:1;}
.nb-new{background:var(--orange);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;margin-left:auto;}

/* Cards */
.card{background:var(--s);border-radius:14px;box-shadow:var(--sh);}
.cp{padding:16px 18px;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .12s;white-space:nowrap;font-family:inherit;}
.btn-p{background:var(--blue);color:#fff;}
.btn-p:hover{filter:brightness(1.1);}
.btn-p:active{transform:scale(.98);}
.btn-s{background:var(--s2);color:var(--t);border:1px solid rgba(0,0,0,.08);}
.btn-s:hover{background:var(--s3);}
.dark .btn-s{border-color:rgba(255,255,255,.09);}
.btn-g{background:none;color:var(--t2);}
.btn-g:hover{background:var(--s2);color:var(--t);}
.btn-sm{padding:4px 9px;font-size:11.5px;border-radius:6px;}
.btn-ic{width:30px;height:30px;padding:0;justify-content:center;border-radius:7px;}
.btn-green{background:var(--green);color:#fff;}
.btn-orange{background:var(--orange);color:#fff;}

/* Inputs */
.inp{background:var(--s2);border:1px solid rgba(0,0,0,.08);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--t);font-family:inherit;width:100%;outline:none;transition:border .12s,box-shadow .12s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bl);background:var(--s);}
.inp::placeholder{color:var(--t3);}
textarea.inp{resize:none;}
select.inp{cursor:pointer;}
.dark .inp{border-color:rgba(255,255,255,.09);}

/* Pills */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;}
.p-blue{background:var(--bl);color:var(--blue);}
.p-green{background:var(--gl);color:var(--green);}
.p-orange{background:var(--ol);color:var(--orange);}
.p-red{background:var(--rl);color:var(--red);}
.p-purple{background:var(--pl);color:var(--purple);}
.p-gray{background:var(--s2);color:var(--t2);}
.p-yellow{background:var(--yl);color:#7a6000;}
.dark .p-yellow{color:var(--yellow);}

/* Progress */
.bar{height:4px;background:var(--s2);border-radius:99px;overflow:hidden;}
.barf{height:100%;border-radius:99px;transition:width .6s ease;}

/* Checkbox */
.cb{appearance:none;-webkit-appearance:none;width:16px;height:16px;border-radius:5px;border:1.5px solid rgba(0,0,0,.2);cursor:pointer;transition:all .12s;position:relative;flex-shrink:0;background:transparent;vertical-align:middle;}
.dark .cb{border-color:rgba(255,255,255,.25);}
.cb:checked{background:var(--blue);border-color:var(--blue);}
.cb:checked::after{content:'';position:absolute;left:4px;top:1.5px;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);}

/* Modal */
.ov{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;}
.mbox{background:var(--s);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:480px;overflow:hidden;}
.mh{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.06);}
.dark .mh{border-bottom-color:rgba(255,255,255,.08);}
.mb{padding:14px 20px;display:flex;flex-direction:column;gap:9px;max-height:60vh;overflow-y:auto;}
.mf{padding:12px 20px;display:flex;gap:8px;border-top:1px solid rgba(0,0,0,.06);}
.dark .mf{border-top-color:rgba(255,255,255,.08);}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid rgba(0,0,0,.06);}
.dark .tbl th{border-bottom-color:rgba(255,255,255,.08);}
.tbl td{padding:11px 14px;border-bottom:1px solid rgba(0,0,0,.05);font-size:13px;}
.dark .tbl td{border-bottom-color:rgba(255,255,255,.06);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--s2);}

/* Section header */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sh-t{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.sh-sub{font-size:13px;color:var(--t2);margin-top:2px;}

/* Grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.gas{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:48px 20px;color:var(--t3);font-size:13px;text-align:center;}

/* Step row */
.srow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.dark .srow{border-bottom-color:rgba(255,255,255,.06);}
.srow:last-child{border-bottom:none;}

/* Routine row */
.rrow{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;transition:background .1s;}
.rrow:hover{background:var(--s2);}
.rrow.done{opacity:.35;pointer-events:none;}

/* Label */
.lbl{font-size:10.5px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;}

/* Divider */
.div{height:1px;background:rgba(0,0,0,.07);margin:6px 2px;}
.dark .div{background:rgba(255,255,255,.08);}

/* Range */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:99px;background:var(--s2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid var(--s);box-shadow:0 1px 3px rgba(0,0,0,.2);}

/* Sound btn */
.snd{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.08);background:var(--s);cursor:pointer;text-align:left;transition:all .12s;width:100%;font-family:inherit;}
.dark .snd{border-color:rgba(255,255,255,.09);}
.snd:hover{border-color:var(--blue);}
.snd.on{background:var(--blue);border-color:var(--blue);color:#fff;}

/* KPI */
.kpi-n{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-top:6px;}
.kpi-l{font-size:11.5px;color:var(--t2);font-weight:500;margin-top:4px;}

/* Scratch */
.scratch{background:var(--yl);border:1.5px solid var(--yellow);border-radius:14px;padding:14px 16px;}

/* Star */
.star{cursor:pointer;font-size:14px;}

/* Print */
@media print{@page{size:A4;margin:0;}.no-print{display:none!important;}.for-print{display:flex!important;}}
.for-print{display:none;position:fixed;inset:0;background:#fff;z-index:9999;align-items:center;justify-content:center;padding:50mm;text-align:center;}

/* Mobile */
@media(max-width:768px){#sidebar{display:none;}#mob-nav{display:flex!important;}#page{padding:14px;}}
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid rgba(0,0,0,.08);padding:7px 4px 14px;z-index:40;}

/* Timer ring SVG */
#timer-ring{transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear;}

/* Fade */
.fade{animation:fin .2s ease;}
@keyframes fin{from{opacity:0}to{opacity:1}}

/* Book cat colors */
.bc0{background:#ff6b6b;}.bc1{background:#4ecdc4;}.bc2{background:#45b7d1;}.bc3{background:#96ceb4;}
.bc4{background:#ffeaa7;color:#555!important;}.bc5{background:#dda0dd;}.bc6{background:#98d8c8;}
.bc7{background:#f7dc6f;color:#555!important;}.bc8{background:#bb8fce;}.bc9{background:#85c1e9;}

/* SMART goal badge */
.smart-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:800;letter-spacing:0;text-transform:uppercase;flex-shrink:0;}
.sb-s{background:#0071e3;color:#fff;}.sb-m{background:#34c759;color:#fff;}.sb-a{background:#ff9500;color:#fff;}.sb-r{background:#af52de;color:#fff;}.sb-t{background:#ff3b30;color:#fff;}
.dark .sb-s{background:#0a84ff;}.dark .sb-m{background:#30d158;}.dark .sb-a{background:#ff9f0a;}.dark .sb-r{background:#bf5af2;}.dark .sb-t{background:#ff453a;}

/* ONE Thing highlight */
.one-thing-card{border:2px solid var(--orange)!important;background:linear-gradient(135deg,rgba(255,149,0,.06),transparent)!important;}

/* Habit streak */
.streak-dot{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;cursor:pointer;transition:all .15s;}
.streak-done{background:var(--green);color:#fff;}
.streak-miss{background:var(--s2);color:var(--t3);}
.streak-today{background:var(--blue);color:#fff;box-shadow:0 0 0 3px var(--bl);}

/* Deep Work mode overlay */
#dw-overlay{position:fixed;inset:0;z-index:9000;background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:28px;}
#dw-overlay.active{display:flex;}

/* Time block */
.tb-slot{height:48px;border-radius:8px;border:1.5px dashed var(--border2,rgba(0,0,0,.12));display:flex;align-items:center;padding:0 12px;cursor:pointer;transition:all .15s;font-size:12px;color:var(--t3);gap:8px;}
.tb-slot:hover{border-color:var(--blue);background:var(--bl);}
.tb-slot.filled{border-style:solid;border-color:transparent;color:var(--t);font-weight:500;}
.tb-slot.filled.pri-urgent{background:rgba(255,59,48,.1);border-color:rgba(255,59,48,.2);}
.tb-slot.filled.pri-high{background:rgba(255,149,0,.1);border-color:rgba(255,149,0,.2);}
.tb-slot.filled.pri-normal{background:var(--bl);border-color:rgba(0,113,227,.15);}

/* GTD inbox */
.gtd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.05);transition:background .1s;}
.gtd-item:hover{background:var(--s2);}
.dark .gtd-item{border-bottom-color:rgba(255,255,255,.06);}

/* Weekly review sections */
.review-section{border-radius:12px;padding:16px;margin-bottom:12px;}
.review-done{background:var(--gl);border:1px solid rgba(52,199,89,.2);}
.review-miss{background:var(--rl);border:1px solid rgba(255,59,48,.15);}
.review-next{background:var(--bl);border:1px solid rgba(0,113,227,.15);}

/* SOP template card */
.sop-step{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.dark .sop-step{border-bottom-color:rgba(255,255,255,.06);}
.sop-step:last-child{border-bottom:none;}
.sop-num{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}

/* V6 - Methodology System */
.method-card{padding:16px 18px;border-left:4px solid var(--blue);}
.method-card.green{border-left-color:var(--green);}
.method-card.orange{border-left-color:var(--orange);}
.method-card.purple{border-left-color:var(--purple);}
.method-card.red{border-left-color:var(--red);}
.smart-letter{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;}
.streak-chain{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;}
.streak-dot{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.streak-dot.done{background:var(--green);color:#fff;}
.streak-dot.miss{background:var(--s3);color:var(--t3);}
.streak-dot.today{background:var(--blue);color:#fff;box-shadow:0 0 0 2px var(--blue),0 0 0 4px var(--bl);}
.method-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:10.5px;font-weight:600;}
.mb-done{background:var(--gl);color:var(--green);}
.mb-todo{background:var(--ol);color:var(--orange);}
.mb-skip{background:var(--s2);color:var(--t3);}
.system-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:var(--s2);margin-bottom:6px;cursor:pointer;transition:background .12s;}
.system-row:hover{background:var(--s3);}
.system-row-num{width:26px;height:26px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.gtd-col{border-radius:12px;padding:14px;min-height:160px;}
.gtd-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s);border-radius:8px;margin-bottom:5px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
.gtd-item:last-child{margin-bottom:0;}
.info-box{border-radius:11px;padding:13px 16px;margin-bottom:14px;}
.info-box.blue{background:var(--bl);border-left:3px solid var(--blue);}
.info-box.green{background:var(--gl);border-left:3px solid var(--green);}
.info-box.orange{background:var(--ol);border-left:3px solid var(--orange);}
.info-box.purple{background:var(--pl);border-left:3px solid var(--purple);}
.dw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
.dw-overlay.active{display:flex;}
.dw-time-big{font-size:80px;font-weight:700;letter-spacing:-4px;color:#fff;font-variant-numeric:tabular-nums;line-height:1;}
.review-section{background:var(--s);border-radius:12px;padding:14px 16px;}
.sop-step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.sop-step:last-child{border-bottom:none;}
.sop-num{width:22px;height:22px;border-radius:99px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.dark .sop-step{border-bottom-color:rgba(255,255,255,.06);}

</style>
</head>
<body>
<div id="shell">
  <aside id="sidebar" class="no-print">
    <div class="logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg>
      </div>
      <span class="logo-name">FocusUp</span><span style="font-size:9px;font-weight:700;background:var(--orange);color:#fff;padding:1px 5px;border-radius:4px;margin-left:2px">V6</span>
    </div>
    <div id="nav-root"></div>
    <div class="div" style="margin-top:auto"></div>
    <div id="nav-bottom"></div>
    <p style="font-size:9.5px;color:var(--t3);text-align:center;padding-top:8px;letter-spacing:.04em">FocusUp Pro V6</p>
  </aside>
  <div id="body">
    <header id="topbar" class="no-print">
      <div style="display:flex;gap:7px;align-items:center">
        <span id="top-quarter" class="pill p-blue" style="font-size:10.5px"></span>
        <span id="top-week" class="pill p-gray" style="font-size:10.5px"></span>
        <span id="top-clock" style="font-size:11.5px;color:var(--t2);font-weight:500"></span>
      </div>
      <div style="display:flex;gap:7px;align-items:center">
        <div style="position:relative">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" style="position:absolute;left:9px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><path d="M21 21l-6-6"/></svg>
          <input id="search-inp" class="inp" type="text" placeholder="Ara..." style="padding-left:28px;width:150px;height:30px;font-size:12px">
        </div>
        <button id="dark-btn" class="btn btn-s btn-ic" title="Tema"></button>
        <button class="btn btn-s btn-ic" onclick="setTab('history')" title="Aktivite">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </button>
      </div>
    </header>
    <main id="page" class="no-print"><div id="pinner"></div></main>
    <nav id="mob-nav"></nav>
  </div>
</div>
<div id="modal-root"></div>
<div class="for-print" id="print-area"></div>
<div id="dw-overlay">
  <div style="text-align:center;color:#fff">
    <div style="font-size:48px;margin-bottom:8px">&#x1F9E0;</div>
    <h1 style="font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:8px" id="dw-title">Derin Calisma Modu</h1>
    <p style="font-size:16px;opacity:.6;margin-bottom:32px" id="dw-task">Odaklanma zamani</p>
    <div style="font-size:64px;font-weight:700;letter-spacing:-3px;font-variant-numeric:tabular-nums;margin-bottom:32px" id="dw-time">50:00</div>

function startTimer() {

  timerInterval = setInterval(function(){
    timerLeft--;

      timerLeft=0;timerOn=false;clearInterval(timerInterval);timerInterval=null;
      if(timerMode==='focus'){gainXP(50,'Pomodoro tamamlandi');D.stats.focus=(D.stats.focus||0)+25;save();}

    }

  },1000);
}

function updateKPI(id) {

function addToList(libId) {
  if((D.mybooks||[]).find(function(b){return b.libId===libId;})) return;
  var lb = LIB.find(function(b){return b.id===libId;}); if(!lb)return;
  snapshot();
  D.mybooks = [{id:Date.now(),libId:libId,title:lb.t,author:lb.a,pages:lb.pages,status:'queue',rating:0,pagesRead:0}].concat(D.mybooks||[]);
  addLog('Kitap eklendi: '+lb.t); gainXP(10,'Kitap eklendi'); save(); renderPage();
}

function updateBookStatus(id,status) {
  var prev = (D.mybooks||[]).find(function(b){return b.id===id;});

}

function activatePlan(planId) {
  var plan = RPLANS.find(function(p){return p.id===planId;}); if(!plan)return;
  if(!confirm(plan.name+' planini baslat?'))return;
  var today = new Date();
  var daysPerBook = Math.floor(90/plan.books.length);
  var planBooks = plan.books.map(function(bid,i){
    var lb = LIB.find(function(b){return b.id===bid;}); if(!lb)return null;
    var s = new Date(today); s.setDate(s.getDate()+i*daysPerBook);
    var e = new Date(s); e.setDate(e.getDate()+daysPerBook-2);
    return {libId:bid,title:lb.t,author:lb.a,start:s.toISOString().split('T')[0],end:e.toISOString().split('T')[0]};
  }).filter(Boolean);
  snapshot();
  D.readingPlan = {id:planId,name:plan.name,books:planBooks,startedAt:U.today()};
  addLog('Okuma plani basladi: '+plan.name); gainXP(30,'Okuma plani'); save(); renderPage();
}
window.activatePlan = activatePlan;

function goalDaysLeft(g) {
  if(!g.deadline) return null;
  return Math.ceil((new Date(g.deadline) - new Date()) / 864e5);
}
function goalStatus(g) {
  if(g.status) return g.status;
  var p = goalPct(g);
  if(p >= 100) return 'done';
  return 'active';
}
function goalPct(g) {
  if(!g.steps || !g.steps.length) return 0;
  return Math.round(g.steps.filter(function(s){return s.done;}).length / g.steps.length * 100);
}

function buildGoalCard(g) {

  var cbg = GOAL_CAT_BG[g.cat||'Diger'] || 'var(--s2)';

  html += '<p style="font-weight:700;font-size:14.5px;line-height:1.3;color:var(--t)">'+U.escape(g.title)+'</p>';
  html += '</div>';
  html += '<div style="display:flex;gap:4px;flex-shrink:0">';
  html += '<button class="btn btn-g btn-ic" style="width:27px;height:27px" onclick="event.stopPropagation();del('+g.id+',\'goal\')" title="Sil">'+ic('trash',12,'var(--t3)')+'</button>';
  html += '</div>';
  html += '</div>';

  // Description
  if(g.desc) {
    html += '<p style="font-size:12px;color:var(--t2);line-height:1.6;border-left:2px solid '+cc+';padding-left:9px;opacity:.8">'+U.escape(g.desc.length>100?g.desc.slice(0,100)+'...':g.desc)+'</p>';
  }

  // Measurable criterion
  if(g.measurable) {

      +ic('kpi',13,'var(--t2)')

      +'<span style="font-size:12px;font-weight:600">'+U.escape(g.measurable)+'</span></div>';
  }

  // Steps summary
  var doneSteps = g.steps.filter(function(s){return s.done;}).length;

  html += '</div></div>';
  return html;

function buildGoalCardKanban(g) {
  var p = goalPct(g);

  var cc = GOAL_CAT_COLORS[g.cat||'Diger'] || 'var(--t3)';
  var cbg = GOAL_CAT_BG[g.cat||'Diger'] || 'var(--s2)';
  var pColor = p>=100?'var(--green)':p>=60?'var(--blue)':'var(--orange)';

  html += '<span class="pill p-gray" style="font-size:9px">'+g.quarter+'</span>';
  html += '</div>';
  html += '<p style="font-weight:600;font-size:13px;line-height:1.3">'+U.escape(g.title)+'</p>';
  if(g.steps.length) {
    html += '<div style="display:flex;align-items:center;gap:7px">'

      +'<span style="font-size:10.5px;font-weight:700;color:'+pColor+'">'+p+'%</span></div>';
  }

function renderGoalModal(g) {

  var pColor = p>=100?'var(--green)':p>=60?'var(--blue)':p>=30?'var(--orange)':'var(--red)';

  var html = '<div style="max-width:620px;background:var(--s);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.2);overflow:hidden;width:100%;max-height:92vh;display:flex;flex-direction:column">';

    +'<p style="font-weight:700;font-size:16px;color:#fff;line-height:1.3">'+U.escape(g.title)+'</p>'

    +'<span style="background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px">'+(g.cat||'Diger')+'</span>'
    +'<span style="background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px">'+g.quarter+'</span>'
    +'</div></div>';
  html += '</div>';
  html += '<button class="btn" style="background:rgba(255,255,255,.2);color:#fff;width:30px;height:30px;padding:0;justify-content:center;border-radius:8px" onclick="closeModal()">'+ic('x',15,'#fff')+'</button>';
  html += '</div>';

  // Body
  html += '<div style="flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:16px">';

  // Progress ring + stats
  html += '<div style="display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center">';

    +'<svg viewBox="0 0 88 88" style="width:100%;height:100%">'

    +' style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .6s ease"/>'
    +'</svg>'
    +'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">'
    +'<span style="font-size:18px;font-weight:800;color:'+pColor+'">'+p+'%</span></div></div>';

  // Stats grid
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  var doneSteps = g.steps.filter(function(s){return s.done;}).length;
  [
    {l:'Adim',v:doneSteps+'/'+g.steps.length,c:'var(--blue)'},
    {l:'Deadline',v:dl===null?'Yok':dl<0?'Gecti':dl+'g',c:dlColor},
    {l:'Basari Kriteri',v:g.measurable||'&mdash;',c:'var(--t2)'},
    {l:'Durum',v:goalStatus(g)==='done'?'Tamamlandi':'Devam Ediyor',c:goalStatus(g)==='done'?'var(--green)':'var(--orange)'},
  ].forEach(function(s){
    html += '<div style="background:var(--s2);border-radius:8px;padding:8px 10px">'
      +'<p style="font-size:10px;color:var(--t3);font-weight:600;margin-bottom:3px">'+s.l+'</p>'
      +'<p style="font-size:13px;font-weight:700;color:'+s.c+'">'+s.v+'</p>'
      +'</div>';
  });
  html += '</div></div>';

  // Description
  if(g.desc) {
    html += '<div style="padding:12px 14px;background:var(--s2);border-radius:10px;border-left:3px solid '+cc+'">'
      +'<p style="font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Hedef Tanimi</p>'
      +'<p style="font-size:13px;color:var(--t2);line-height:1.7">'+U.escape(g.desc)+'</p>'
      +'</div>';
  }

  // Action steps
  html += '<div>';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<p style="font-weight:700;font-size:13px">Aksiyon Plani</p>'
    +'<button class="btn btn-s btn-sm" onclick="openAddStep('+g.id+')">'+ic('plus',12)+' Adim Ekle</button>'
    +'</div>';

  if(!g.steps.length) {
    html += '<div style="padding:16px;border:2px dashed var(--s3);border-radius:10px;text-align:center;color:var(--t3);font-size:12px">Henuz aksiyon adimi yok. Bir adim ekleyerek basla.</div>';
  } else {
    html += '<div style="display:flex;flex-direction:column;gap:4px">';
    g.steps.forEach(function(s,i){
      html += '<div style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;background:'+(s.done?'var(--gl)':'var(--s2)')+';transition:background .12s">'

        +'<span style="font-size:12.5px;font-weight:500;text-decoration:'+(s.done?'line-through':'none')+';color:'+(s.done?'var(--t3)':'var(--t)')+';flex:1">'+U.escape(s.t)+'</span>'
        +'<button class="btn btn-g btn-ic" style="width:22px;height:22px;opacity:.5;flex-shrink:0" onclick="delStep('+g.id+','+s.id+')">'+ic('x',10,'var(--t3)')+'</button>'
        +'</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Notes
  html += '<div>'
    +'<p style="font-weight:700;font-size:13px;margin-bottom:8px">Notlar</p>'
    +'<textarea class="inp" id="goal-notes-'+g.id+'" placeholder="Bu hedef hakkinda notlar, fikirler, engeller..." rows="3" style="font-size:13px" onchange="saveGoalNote('+g.id+')">'+U.escape(g.notes||'')+'</textarea>'
    +'</div>';

  // Tracy 6 kuralı kontrol listesi
  html += '<div style="padding:12px 14px;background:var(--ol);border-radius:10px;border-left:3px solid var(--orange)">'
    +'<p style="font-weight:700;font-size:12px;color:var(--orange);margin-bottom:8px">Brian Tracy\'nin 6 Kurali</p>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">';
  [
    {l:'Hedef yazili',done:true},
    {l:'Net deadline',done:!!g.deadline},
    {l:'Alt parcalara bolundu',done:g.steps.length>0},
    {l:'Onceliklendirildi',done:!!g.frog||!!g.cat},
    {l:'Baslanildi',done:g.steps.some(function(s){return s.done;})},
    {l:'Ilerleme kaydi',done:p>0},
  ].forEach(function(rule){
    html += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0">'
      +'<span style="color:'+(rule.done?'var(--green)':'var(--t3)');font-size:13px">'+(rule.done?'&#10003;':'&#9675;')+'</span>'
      +'<span style="font-size:11.5px;color:'+(rule.done?'var(--t)':'var(--t3)')+'">'+rule.l+'</span>'
      +'</div>';
  });
  html += '</div></div>';

  html += '</div>';

  // Footer actions
  html += '<div style="padding:12px 20px;border-top:1px solid var(--s2);display:flex;gap:8px">';
  if(goalStatus(g) !== 'done') {
    html += '<button class="btn btn-green" style="flex:1;justify-content:center" onclick="markGoalDone('+g.id+')">'+ic('chk',13)+' Hedefi Tamamla (+100 XP)</button>';
  } else {
    html += '<button class="btn btn-s" style="flex:1;justify-content:center" onclick="markGoalActive('+g.id+')">Tekrar Aktif Et</button>';
  }
  html += '<button class="btn btn-s" onclick="closeModal()">Kapat</button>';
  html += '</div>';

  html += '</div>';

  showModal(html, null);
}

function submitAddStep(goalId) {
  var inp = $('step-inp');
  if(!inp || !inp.value.trim()) { alert('Adim adi zorunlu!'); return; }
  snapshot();
  D.goals = D.goals.map(function(g){
    return g.id===goalId ? Object.assign({},g,{steps:g.steps.concat([{id:Date.now(),t:inp.value.trim(),done:false}])}) : g;
  });
  addLog('Adim eklendi'); save(); closeModal();
  openGoalDetail(goalId);
}

function saveGoalNote(goalId) {

  save();
}

function markGoalDone(goalId) {

// Keep backward compat
function addGoalStep(goalId){openAddStep(goalId);}
function toggleStep(goalId,stepId){
  snapshot();
  D.goals=D.goals.map(function(g){
    if(g.id!==goalId)return g;
    var wasDone=g.steps.find(function(s){return s.id===stepId;});
    if(wasDone&&!wasDone.done) gainXP(10,'Adim tamamlandi');
    return Object.assign({},g,{steps:g.steps.map(function(s){return s.id===stepId?Object.assign({},s,{done:!s.done}):s;})});
  });
  addLog('Adim'); save();
  // Re-render modal if open
  var g = D.goals.find(function(x){return x.id===goalId;});
  if(g && openGoalId===goalId) renderGoalModal(g);
  else renderPage();
}
function delStep(goalId,stepId){
  snapshot();
  D.goals=D.goals.map(function(g){return g.id===goalId?Object.assign({},g,{steps:g.steps.filter(function(s){return s.id!==stepId;})}):g;});
  addLog('Adim silindi'); save();
  var g = D.goals.find(function(x){return x.id===goalId;});
  if(g && openGoalId===goalId) renderGoalModal(g);
  else renderPage();
}
window.addGoalStep=addGoalStep;window.toggleStep=toggleStep;window.delStep=delStep;

        html+='<div title="'+title+'" style="width:24px;height:24px;border-radius:5px;background:'+bg+';'+(isT?'box-shadow:0 0 0 2px var(--blue)':'')+';display:flex;align-items:center;justify-content:center;font-size:9px;color:'+(done?'rgba(255,255,255,.8)':'var(--t3)')+';">'+(done?'&#x2713;':'')+'</div>';
      });

      html+='<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'

        +'</div>';

}
function calcStreak(checkins){
  if(!checkins||!checkins.length)return 0;
  var sorted=checkins.slice().sort();var streak=0;var d=new Date();
  while(true){var ds=d.toISOString().split('T')[0];if(sorted.indexOf(ds)>=0){streak++;}else if(streak>0)break;d.setDate(d.getDate()-1);if(streak>365)break;}
  return streak;
}
function checkHabit(id){
  var today=U.today();

    return Object.assign({},h,{checkins:cis});
  });
  addLog('Aliskanlik tamamlandi');gainXP(15,'Aliskanlik');save();renderPage();
}

      +'<button class="btn btn-g btn-ic" style="width:26px;height:26px" onclick="del('+sop.id+','sop')">'+ic('trash',12,'var(--t3)')+'</button>'

function addSOPStep(sopId){
  var t=prompt('Adim adi?');if(!t)return;
  snapshot();
  D.sops=(D.sops||[]).map(function(s){return s.id===sopId?Object.assign({},s,{steps:(s.steps||[]).concat([t])}):s;});
  addLog('SOP adim eklendi');save();renderPage();
}
function delSOPStep(sopId,idx){
  snapshot();
  D.sops=(D.sops||[]).map(function(s){if(s.id!==sopId)return s;var steps=s.steps.filter(function(_,i){return i!==idx;});return Object.assign({},s,{steps:steps});});
  save();renderPage();
}
window.addSOPStep=addSOPStep;window.delSOPStep=delSOPStep;

      var criteria = [
        {k:'smart_s',l:'S',tip:'Spesifik'},

        +'<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:'+barC+'">'+sc+'/5</div>'

function saveSMART() {
  var title = $('sg_title') && $('sg_title').value;
  if(!title){alert('Hedef basligi zorunlu');return;}
  snapshot();
  var item = {
    id:Date.now(), title:title,
    desc: ($('sg_measure')&&$('sg_measure').value)||'',
    whyImportant: ($('sg_why')&&$('sg_why').value)||'',
    deadline: ($('sg_deadline')&&$('sg_deadline').value)||'',
    quarter: ($('sg_quarter')&&$('sg_quarter').value)||'Q1',
    frog: $('sg_frog')&&$('sg_frog').checked,
    steps:[],
    smart_s:!!(title&&title.length>5), smart_m:!!($('sg_measure')&&$('sg_measure').value),
    smart_a:true, smart_r:!!($('sg_why')&&$('sg_why').value),
    smart_t:!!($('sg_deadline')&&$('sg_deadline').value)
  };
  D.goals = [item].concat(D.goals||[]);
  addLog('SMART hedef eklendi: '+title); gainXP(25,'SMART hedef'); save(); closeModal(); renderPage();
}
function toggleSMART(goalId, key) {
  snapshot();
  D.goals = (D.goals||[]).map(function(g){
    if(g.id!==goalId) return g;
    var upd = {}; upd[key] = !g[key]; return Object.assign({},g,upd);
  });
  save(); renderPage();
}
function setGoalDeadline(goalId) {
  var d = prompt('Deadline (YYYY-MM-DD):');
  if(!d) return;
  snapshot();
  D.goals = (D.goals||[]).map(function(g){return g.id===goalId?Object.assign({},g,{deadline:d,smart_t:true}):g;});
  addLog('Deadline eklendi'); save(); renderPage();
}

    case 'challenges': renderChallenges(); break;
    case 'tools': renderTools(); break;
    case 'vault': renderGenericList('vault','Bilgi Kasasi','vault','arc',['title','text']); break;
    case 'quotes': renderGenericList('quotes','Ozlu Sozler','quote','qt',['text','author']); break;
    case 'journal': renderGenericList('journal','Gunluk','journal','pen',['text','cat']); break;
    case 'principles': renderGenericList('principles','Prensipler','principle','sh',['text','type']); break;
    case 'coaching': renderGenericList('coaching','Kocluk','coaching','us',['title','text']); break;
    case 'questions': renderGenericList('questions','Sorular','question','hlp',['text']); break;
    case 'history': renderHistory(); break;
    case 'habits': renderHabits(); break;
    case 'smart': renderSMART(); break;
    case 'onething': renderOneThingPage(); break;
    case 'frog': renderFrogPage(); break;
    case 'gtd': renderGTD(); break;
    case 'timeblock': renderTimeBlock(); break;
    case 'weeklyreview': renderWeeklyReview(); break;
    case 'deepwork': renderDeepWork(); break;
    case 'sop': renderSOP(); break;
    default: renderDashboard();
  }
  renderNav();
}

function render() { renderPage(); }

// --- Init ---
applyTheme();
renderNav();
renderPage();

$('dark-btn').addEventListener('click', function(){ toggleDark(); renderPage(); });
$('search-inp').addEventListener('input', function(e){ searchQ=e.target.value; renderPage(); });
</script>
