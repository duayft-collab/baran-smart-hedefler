*{box-sizing:border-box;margin:0;padding:0}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:99px}
#shell{display:flex;height:100vh}
#sidebar{width:var(--sw);background:var(--s);border-right:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;padding:14px 8px 10px;flex-shrink:0;overflow-y:auto}
.dark #sidebar{border-right-color:rgba(255,255,255,.09)}
#body{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:50px;background:var(--s);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}

#pinner{max-width:1060px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;padding:4px 6px 14px}

.logo-v{font-size:9px;font-weight:700;background:var(--orange);color:#fff;padding:1px 5px;border-radius:4px;margin-left:2px}
.nsec{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;padding:3px 6px 4px;margin-top:6px}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 7px;border-radius:7px;border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--t2);text-align:left;transition:background .12s,color .12s;font-family:inherit}
.nb:hover{background:var(--s2);color:var(--t)}
.nb.on{background:var(--bl);color:var(--blue);font-weight:600}
.ni{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card{background:var(--s);border-radius:14px;box-shadow:var(--sh)}
.cp{padding:16px 18px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .12s;white-space:nowrap;font-family:inherit;text-decoration:none}
.btn-p{background:var(--blue);color:#fff}
.btn-p:hover{filter:brightness(1.1)}
.btn-s{background:var(--s2);color:var(--t);border:1px solid rgba(0,0,0,.08)}

.dark .btn-s{border-color:rgba(255,255,255,.09)}
.btn-g{background:none;color:var(--t2)}
.btn-g:hover{background:var(--s2);color:var(--t)}
.btn-sm{padding:4px 9px;font-size:11.5px;border-radius:6px}
.btn-ic{width:30px;height:30px;padding:0;justify-content:center;border-radius:7px}
.inp{background:var(--s2);border:1px solid rgba(0,0,0,.08);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--t);font-family:inherit;width:100%;outline:none;transition:border .12s,box-shadow .12s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bl);background:var(--s)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical}
select.inp{cursor:pointer}
.dark .inp{border-color:rgba(255,255,255,.09)}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.p-blue{background:var(--bl);color:var(--blue)}.p-green{background:var(--gl);color:var(--green)}

.barf{height:100%;border-radius:99px;transition:width .6s}
.cb{appearance:none;-webkit-appearance:none;width:16px;height:16px;border-radius:5px;border:1.5px solid rgba(0,0,0,.2);cursor:pointer;transition:all .12s;position:relative;flex-shrink:0;background:transparent}
.dark .cb{border-color:rgba(255,255,255,.25)}
.cb:checked{background:var(--blue);border-color:var(--blue)}
.cb:checked::after{content:'';position:absolute;left:4px;top:1.5px;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.ov{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px}

.dark .mh{border-bottom-color:rgba(255,255,255,.08)}
.mb{padding:14px 20px;display:flex;flex-direction:column;gap:9px;overflow-y:auto}
.mf{padding:12px 20px;display:flex;gap:8px;border-top:1px solid rgba(0,0,0,.06);flex-shrink:0}
.dark .mf{border-top-color:rgba(255,255,255,.08)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh-t{font-size:20px;font-weight:700;letter-spacing:-.3px}
.sh-sub{font-size:12.5px;color:var(--t2);margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.gas{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}

.snd-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
@media print{.no-print{display:none!important}}

function rndQuote(cat){
  var pool = cat ? D.quotes.filter(function(q){return q.cat===cat;}) : D.quotes;
  if(!pool.length) pool = D.quotes;
  return pool.length ? pool[Math.floor(Math.random()*pool.length)] : null;
}
function quoteWidget(cat, accent){
  var q = rndQuote(cat);
  if(!q) return '';
  var ac = accent || 'var(--blue)';
  return '<div style="padding:14px 18px;border-radius:12px;background:var(--s2);border-left:3px solid '+ac+';margin-bottom:16px">'
    + '<p style="font-size:13px;font-style:italic;line-height:1.7;color:var(--t)">&ldquo;'+U.esc(q.text)+'&rdquo;</p>'
    + (q.author ? '<p style="font-size:11px;font-weight:700;color:'+ac+';margin-top:6px">&mdash; '+U.esc(q.author)+'</p>' : '')
    + '<p style="font-size:10px;color:var(--t3);margin-top:3px">'+U.esc(q.cat)+'</p></div>';
}

function fil(list,keys){
  if(!searchQ||!list)return list||[];
  var lq=searchQ.toLowerCase();
  return list.filter(function(i){return keys.some(function(k){return i[k]&&String(i[k]).toLowerCase().indexOf(lq)>=0;});});
}

function del(id,type){

function smartScore(g){
  var s=0;
  if(g.title&&g.title.length>8)s++;
  if(g.measurable)s++;
  if(g.steps&&g.steps.length>0)s++;
  if(g.notes||g.desc)s++;
  if(g.deadline)s++;
  return s;
}
function goalPct(g){if(!g.steps||!g.steps.length)return 0;return Math.round(g.steps.filter(function(s){return s.done;}).length/g.steps.length*100);}
function pct(cur,tgt){return Math.min(100,Math.round((parseFloat(cur)||0)/(parseFloat(tgt)||1)*100));}
function progBar(p,color){
  var c=color||(p>=100?'var(--green)':p>=60?'var(--blue)':p>=30?'var(--orange)':'var(--red)');
  return '<div class="bar"><div class="barf" style="width:'+Math.min(100,p)+'%;background:'+c+'"></div></div>';
}
function statCard(label,val,icon,color){
  return '<div class="card" style="padding:14px 16px">'+
    '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">'+ic(icon,14,color)+
    '<span style="font-size:11px;color:var(--t2);font-weight:600">'+label+'</span></div>'+
    '<div class="kn" style="color:'+color+'">'+val+'</div></div>';
}
function calcStreak(checkins){
  if(!checkins||!checkins.length)return 0;
  var streak=0,d=new Date();
  for(var i=0;i<90;i++){
    var ds=d.toISOString().split('T')[0];
    if(checkins.indexOf(ds)>=0){streak++;d.setDate(d.getDate()-1);}
    else if(i===0){d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

function submitForm(type){
  var defs=FDEFS[type]||[],vals={},ok=true;
  for(var i=0;i<defs.length;i++){
    var p=defs[i].split(':'),n=p[0],tp=p[2],req=p[3]==='1';
    var el=ge('f_'+n);if(!el)continue;
    vals[n]=tp==='cb'?el.checked:el.value;
    if(req&&!vals[n])ok=false;
  }
  if(!ok){alert('Zorunlu alanlari doldurun.');return;}
  snap();var id=Date.now();
  if(type==='routine'){
    var per=vals.period||'daily';
    D.routines[per]=(D.routines[per]||[]).concat([{id:id,t:vals.t,last:null}]);
    log('Rutin eklendi');xp(10,'Rutin');closeModal();renderPage();return;
  }
  if(type==='sop'){D.sops=[{id:id,title:vals.title,steps:[]}].concat(D.sops||[]);log('SOP eklendi');closeModal();renderPage();return;}
  if(type==='gtd'){D.gtdInbox=[{id:id,text:vals.text,status:'inbox',addedAt:U.today()}].concat(D.gtdInbox||[]);log('GTD eklendi');closeModal();renderPage();return;}
  var km={goal:'goals',todo:'todos',kpi:'kpis',habit:'habits',quote:'quotes',journal:'journal',principle:'principles',coaching:'coaching',vault:'vault',question:'questions'};
  var item=Object.assign({id:id},vals);
  if(type==='goal'){item.frog=false;item.steps=[];item.notes='';item.status='active';item.createdAt=U.today();}
  if(type==='todo')item.done=false;
  if(type==='kpi'){item.target=parseFloat(vals.target)||0;item.current=parseFloat(vals.current)||0;item.hist=[parseFloat(vals.current)||0];}
  if(type==='journal')item.date=U.today();
  if(km[type])D[km[type]]=[item].concat(D[km[type]]||[]);
  log(type+' eklendi');xp(20,'Yeni '+type);closeModal();renderPage();
}
window.submitForm=submitForm;


function startTm(){
  if(tmInt)clearInterval(tmInt);tmOn=true;
  tmInt=setInterval(function(){
    tmLeft--;
    if(tmLeft<=0){tmLeft=0;tmOn=false;clearInterval(tmInt);tmInt=null;if(tmMode==='focus'){xp(50,'Pomodoro');D.stats.totalFocus=(D.stats.totalFocus||0)+25;save();}}
    renderTm();
  },1000);
}
function stopTm(){tmOn=false;if(tmInt){clearInterval(tmInt);tmInt=null;}renderTm();}
function resetTm(){stopTm();tmLeft=TDUR[tmMode];renderTm();}
function setTmMode(m){tmMode=m;tmLeft=TDUR[m];stopTm();}
window.setTmMode=setTmMode;

function renderTm(){
  var el=ge('timer-block');if(!el)return;
  var C=2*Math.PI*50,p=tmLeft/TDUR[tmMode],off=C*(1-p);
  var sc=tmMode==='focus'?'var(--blue)':'var(--green)';
  var modeLabels={focus:'Odak',short:'Kisa Mola',long:'Uzun Mola'};
  var h='<div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px">';
  h+='<div style="display:flex;gap:4px">';
  ['focus','short','long'].forEach(function(m){
    var a=tmMode===m;
    h+='<button class="btn btn-sm" style="background:'+(a?'var(--blue)':'var(--s2)')+';color:'+(a?'#fff':'var(--t2)')+'" data-m="'+m+'" onclick="setTmMode(this.dataset.m);renderTm()">'+modeLabels[m]+'</button>';
  });
  h+='</div>';
  h+='<div style="position:relative;width:110px;height:110px">';
  h+='<svg viewBox="0 0 108 108" style="position:absolute;inset:0;width:100%;height:100%">';
  h+='<circle cx="54" cy="54" r="50" fill="none" stroke="var(--s2)" stroke-width="5"/>';
  h+='<circle cx="54" cy="54" r="50" fill="none" stroke="'+sc+'" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'" style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear"/>';
  h+='</svg>';
  h+='<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">';
  h+='<span style="font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1">'+U.fmt(tmLeft)+'</span>';
  h+='<span style="font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em">'+modeLabels[tmMode]+'</span>';
  h+='</div></div>';
  h+='<div style="display:flex;gap:7px">';
  if(tmOn){h+='<button class="btn btn-p" onclick="stopTm()">'+ic('pause',12)+' Durdur</button>';}
  else{h+='<button class="btn btn-p" onclick="startTm()">'+ic('play',12)+' Baslat</button>';}
  h+='<button class="btn btn-s btn-ic" onclick="resetTm()">'+ic('rst',13)+'</button>';
  h+='</div></div>';
  el.innerHTML=h;
}

function startChallenge(tplId){
  var tpl=CH_TPLS.find(function(t){return t.id===tplId;});if(!tpl)return;
  snap();D.challenges=[{id:Date.now(),tplId:tplId,name:tpl.name,desc:tpl.desc,cat:tpl.cat,diff:tpl.diff,xp:tpl.xp,start:U.today(),end:null,checkins:[],status:'active'}].concat(D.challenges||[]);
  xp(10,'Mucadele basladi');save();closeModal();renderPage();
}
function checkChallenge(id){
  var today4=U.today();
  D.challenges=(D.challenges||[]).map(function(c){
    if(c.id!==id)return c;
    if((c.checkins||[]).indexOf(today4)>=0)return c;
    var checkins=(c.checkins||[]).concat([today4]);
    var elapsed=Math.ceil((new Date()-new Date(c.start))/864e5);
    var status=elapsed>=90?'done':c.status;
    if(status==='done')xp(c.xp||100,'Mucadele tamamlandi!');
    return Object.assign({},c,{checkins:checkins,status:status});
  });
  xp(5,'Mucadele gunluk');save();renderPage();
}

function addTimeBlock(hr){
  var hour=hr!==undefined?hr:parseInt(prompt('Saat (6-22):',new Date().getHours())||new Date().getHours());
  if(isNaN(hour)||hour<6||hour>22)return;
  var task=prompt('Gorev:');if(!task||!task.trim())return;
  snap();
  var today=U.today();D.timeblocks[today]=D.timeblocks[today]||[];
  D.timeblocks[today]=D.timeblocks[today].filter(function(b){return b.hour!==hour;});
  D.timeblocks[today].push({hour:hour,task:task.trim(),priority:'normal'});
  xp(5,'Zaman blok');save();renderPage();
}
function removeTimeBlock(hr){snap();var today=U.today();D.timeblocks[today]=(D.timeblocks[today]||[]).filter(function(b){return b.hour!==hr;});save();renderPage();}
window.addTimeBlock=addTimeBlock;window.removeTimeBlock=removeTimeBlock;

function saveWeeklyReview(){
  snap();
  var fields=['done','missed','why','learn','next','oneThingNext'];
  fields.forEach(function(f){var el=ge('wr_'+f);if(el)D.weeklyReview[f]=el.value;});
  D.weeklyReview.updatedAt=U.today();
  xp(35,'Haftalik review');save();renderPage();
}
window.saveWeeklyReview=saveWeeklyReview;

    h+='<div style="display:flex;align-items:center;gap:8px"><div style="width:20px;height:20px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">'+(i+1)+'</div><span style="font-size:12px">'+r+'</span></div>';

function renderSOP(){
  var sops=D.sops||[];
  var h='<div class="fade"><div class="sh"><div><h1 class="sh-t">SOP Sablonlari</h1><p class="sh-sub">Standart islem prosedUrleri</p></div><button class="btn btn-p" data-type="sop" onclick="openForm(this.dataset.type)">'+ic('plus',13)+' SOP Ekle</button></div>';
  if(!sops.length)h+='<div class="empty">'+ic('layers',32,'var(--t3)')+'<p>SOP eklenmedi</p></div>';
  else{
    h+='<div class="ga">';
    sops.forEach(function(sop){
      h+='<div class="card cp" style="display:flex;flex-direction:column;gap:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><p style="font-weight:700;font-size:14px">'+U.esc(sop.title)+'</p><button class="btn btn-g btn-ic" style="width:26px;height:26px" data-sid="'+sop.id+'" data-dtype="sop" onclick="del(+this.dataset.sid,this.dataset.dtype)">'+ic('trash',12,'var(--t3)')+'</button></div>';
      if(sop.steps&&sop.steps.length){
        h+='<div style="display:flex;flex-direction:column;gap:6px">';
        sop.steps.forEach(function(step,i){h+='<div style="display:flex;align-items:flex-start;gap:8px"><div style="width:20px;height:20px;border-radius:99px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">'+(i+1)+'</div><span style="font-size:12.5px;padding-top:1px">'+U.esc(step)+'</span></div>';});
        h+='</div>';
      }
      h+='<button class="btn btn-s btn-sm" data-sid="'+sop.id+'" onclick="addSOPStep(+this.dataset.sid)">'+ic('plus',11)+' Adim Ekle</button></div>';
    });
    h+='</div>';
  }
  h+='</div>';sh('pinner',h);
}
function addSOPStep(id){
  var step=prompt('Yeni adim:');if(!step||!step.trim())return;
  snap();D.sops=(D.sops||[]).map(function(s){return s.id===id?Object.assign({},s,{steps:(s.steps||[]).concat([step.trim()])}):s;});save();renderPage();
}
window.addSOPStep=addSOPStep;

function renderHistory(){
  var logs=D.logs||[];
  var h='<div class="fade"><div class="sh"><h1 class="sh-t">Aktivite Gecmisi</h1></div>';

}

  var fn=pages[tab];
