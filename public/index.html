<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FocusUp Pro V7</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css?v=2026.07-d10-5-1">
<link rel="stylesheet" href="css/responsive.css?v=2026.07-d10-5-1">
<link rel="stylesheet" href="css/print.css?v=2026.07-d10-5-1">
</head>
<body>
<div id="shell">
  <div id="nav-scrim" onclick="toggleNav()"></div>
  <aside id="sidebar" class="no-print">
    <div class="logo">
      <div class="logo-mark"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <span class="logo-name">FocusUp</span><span class="logo-v">V7</span>
    </div>
    <div class="lang-sw">
      <button data-lang="tr" class="on" onclick="setLang('tr')">🇹🇷 Türkçe</button>
      <button data-lang="en" onclick="setLang('en')">🇬🇧 English</button>
    </div>
    <div id="nav-root"></div>
    <div style="flex:1"></div>
    <div id="nav-bot"></div>
    <p style="font-size:9px;color:var(--t3);text-align:center;padding-top:8px">FocusUp Pro V7 &mdash; 2026</p>
  </aside>
  <div id="body">
    <header id="topbar" class="no-print">
      <div style="display:flex;gap:7px;align-items:center">
        <button id="hamburger" type="button" onclick="toggleNav()" aria-label="Menü"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <span id="top-q" class="pill p-blue" style="font-size:10.5px"></span>
        <span id="top-w" class="pill p-gray" style="font-size:10.5px"></span>
        <span id="top-cl" style="font-size:11px;color:var(--t2)"></span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <div style="position:relative">
          <input id="srch" class="inp" type="text" placeholder="Ara..." style="padding-left:26px;width:140px;height:30px;font-size:12px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" style="position:absolute;left:8px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><path d="M21 21l-6-6"/></svg>
        </div>
        <button id="google-auth-btn" class="btn btn-s" type="button" title="Google hesabına bağlan" style="height:30px;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Google ile bağla</button>
        <button id="theme-btn" class="btn btn-s btn-ic"></button>
      </div>
    </header>
    <main id="page" class="no-print"><div id="pinner"></div></main>
  </div>
</div>
<div id="modal-root"></div>
<div id="wisdom-float"></div>
<div class="dw-ov" id="dw-ov">
  <p style="color:#fff;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:12px">Derin Çalışma</p>
  <h2 id="dw-title" style="color:#fff;font-size:22px;font-weight:700;margin-bottom:20px"></h2>
  <div id="dw-time" style="font-size:80px;font-weight:800;letter-spacing:-4px;color:#fff;line-height:1;margin-bottom:28px;font-variant-numeric:tabular-nums">00:00</div>
  <div style="display:flex;gap:10px">
    <button id="dw-btn" onclick="dwToggle()" style="padding:10px 24px;border-radius:10px;border:none;background:#fff;color:#000;font-weight:700;font-size:14px;cursor:pointer">Baslat</button>
    <button onclick="exitDW()" style="padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,.3);background:none;color:#fff;font-size:13px;cursor:pointer">Çıkış (Esc)</button>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore-compat.js"></script>
<script src="js/00-config.js?v=2026.07-d10-5-1"></script>
<script src="js/01-state.js?v=2026.07-d10-5-1"></script>
<script src="js/02-sync.js?v=2026.07-d10-5-1"></script>
<script src="js/03-auth.js?v=2026.07-d10-5-1"></script>
<script src="js/04-backup.js?v=2026.07-d10-5-1"></script>
<script src="js/05-diff.js?v=2026.07-d10-5-1"></script>
<script src="js/06-restore-engine.js?v=2026.07-d10-5-1"></script>
<script src="js/07-smart-coach.js?v=2026.07-d10-5-1"></script>
<script src="js/08-ui-core.js?v=2026.07-d10-5-1"></script>
<script src="js/09-goals.js?v=2026.07-d10-5-1"></script>
<script src="js/10-general-notes.js?v=2026.07-d10-5-1"></script>
<script src="js/11-restore-ui.js?v=2026.07-d10-5-1"></script>
<script src="js/11a-wisdom-quotes.js?v=2026.07-d10-5-1"></script>
<script src="js/11b-wisdom-display.js?v=2026.07-d10-5-1"></script>
<script src="js/11c-wisdom-io.js?v=2026.07-d10-5-1"></script>
<script src="js/11d-principles.js?v=2026.07-d10-5-1"></script>
<script src="js/12-render-boot.js?v=2026.07-d10-5-1"></script>
</body>
</html>
